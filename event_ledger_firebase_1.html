<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional Events Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1EE;
    --surface:#FFFFFF;
    --ink:#1B2A32;
    --ink-soft:#57666C;
    --ink-faint:#8B9A9F;
    --accent:#2F7A78;
    --accent-dark:#20585A;
    --accent-soft:#DCEBEA;
    --amber:#B5791F;
    --amber-soft:#F6E9D2;
    --blue:#3B6EA5;
    --blue-soft:#E1EAF4;
    --green:#3E7C59;
    --green-soft:#E2EFE7;
    --red:#AD4A4D;
    --red-soft:#F5E3E3;
    --slate:#6B7785;
    --slate-soft:#E7E9EC;
    --border:#D9DED6;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:var(--font-body);
    color:var(--ink);
    min-height:100vh;
  }
  #root{min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- Header ---------- */
  .header{
    background:var(--ink);
    color:#F2F4F1;
    padding:22px 28px 0 28px;
  }
  .header-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:16px;
    padding-bottom:18px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .brand-eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:#9FC7C5;
    margin-bottom:4px;
  }
  .brand-title{
    font-family:var(--font-display);
    font-size:28px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }
  .header-stats{
    display:flex;
    gap:26px;
    flex-wrap:wrap;
    align-items:center;
  }
  .pending-approval-badge{
    font-family:var(--font-mono);
    font-weight:700;
    font-size:13px;
    color:#fff;
    background:var(--red);
    border:none;
    border-radius:20px;
    padding:8px 16px;
    cursor:pointer;
    align-self:center;
    animation:pending-pulse 2.2s ease-in-out infinite;
  }
  .pending-approval-badge:hover{ filter:brightness(1.1); }
  @keyframes pending-pulse{
    0%, 100% { box-shadow:0 0 0 0 rgba(173,74,77,0.55); }
    50% { box-shadow:0 0 0 7px rgba(173,74,77,0); }
  }
  .stat{
    text-align:right;
  }
  .stat-label{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#9BB0AE;
    margin-bottom:3px;
  }
  .stat-value{
    font-family:var(--font-mono);
    font-size:19px;
    font-weight:600;
    color:#F2F4F1;
  }

  /* ---------- Region Tabs (ledger folder tabs) ---------- */
  .sp-warning-banner{
    background:var(--red-soft);
    border-bottom:1px solid var(--red);
    padding:10px 28px;
    font-family:var(--font-body);
    font-size:13px;
    color:var(--red);
  }
  .sp-warning-banner code{
    font-family:var(--font-mono);
    background:rgba(0,0,0,0.06);
    padding:1px 5px;
    border-radius:4px;
  }
  .name-banner{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    background:var(--accent-soft);
    border-bottom:1px solid var(--accent);
    padding:10px 28px;
    font-family:var(--font-body);
    font-size:13px;
    color:var(--accent-dark);
  }
  .name-banner input{
    font-family:var(--font-body);
    font-size:13px;
    padding:6px 10px;
    border:1px solid var(--accent);
    border-radius:6px;
    background:var(--surface);
    color:var(--ink);
    max-width:200px;
  }
  .tab-strip{
    display:flex;
    gap:4px;
    padding-top:14px;
    overflow-x:auto;
    scrollbar-width:thin;
  }
  .tab-strip::-webkit-scrollbar{height:5px;}
  .tab-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px;}
  .region-tab{
    position:relative;
    flex:0 0 auto;
    padding:9px 18px 9px 16px;
    font-family:var(--font-mono);
    font-size:12.5px;
    letter-spacing:0.02em;
    color:#B7C6C4;
    background:rgba(255,255,255,0.05);
    border:none;
    border-radius:8px 8px 0 0;
    cursor:pointer;
    white-space:nowrap;
    transition:background 0.15s, color 0.15s, transform 0.15s;
    clip-path:polygon(0 0, 100% 0, 92% 100%, 8% 100%);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .region-tab:hover{background:rgba(255,255,255,0.11);color:#EAF2F1;}
  .region-tab.active{
    background:var(--bg);
    color:var(--ink);
    transform:translateY(2px);
    font-weight:600;
    box-shadow:inset 0 3px 0 0 var(--region-color, transparent);
  }
  .region-tab-dot{
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    flex-shrink:0;
    vertical-align:middle;
    box-shadow:0 0 0 1px rgba(0,0,0,0.15);
  }
  .region-tab .tab-count{
    font-size:10px;
    color:inherit;
    opacity:0.65;
  }
  .region-tab.overview-tab{
    background:rgba(159,199,197,0.18);
    color:#CDE7E5;
    font-weight:600;
  }
  .region-tab.overview-tab:hover{background:rgba(159,199,197,0.28);color:#EAF7F6;}
  .region-tab.overview-tab.active{background:var(--bg);color:var(--accent-dark);}
  .region-tab.master-tab{
    background:rgba(224,122,95,0.18);
    color:#F4CFC2;
    font-weight:600;
  }
  .region-tab.master-tab:hover{background:rgba(224,122,95,0.28);color:#FBE3DA;}
  .region-tab.master-tab.active{background:var(--bg);color:var(--accent-dark);}
  .week-group{ margin-bottom:22px; }
  .week-group-header{
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    padding-bottom:8px;
    margin-bottom:10px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .week-group-count{
    font-weight:400;
    color:var(--ink-faint);
    text-transform:none;
    letter-spacing:normal;
  }
  .tab-divider{
    flex:0 0 auto;
    width:1px;
    background:rgba(255,255,255,0.15);
    margin:6px 6px 8px 6px;
  }

  /* ---------- Overview ---------- */
  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:12px;
    margin-bottom:22px;
  }
  .kpi-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px 16px;
    border-top:3px solid var(--ink-faint);
  }
  .kpi-card.researching{border-top-color:var(--amber);}
  .kpi-card.execute{border-top-color:var(--blue);}
  .kpi-card.submitted{border-top-color:var(--green);}
  .kpi-card.declined{border-top-color:var(--red);}
  .kpi-card.not_pursuing{border-top-color:var(--slate);}
  .kpi-card.total{border-top-color:var(--accent);}
  .kpi-label{
    font-family:var(--font-mono);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-faint);
    margin-bottom:6px;
  }
  .kpi-value{
    font-family:var(--font-display);
    font-size:26px;
    font-weight:600;
    color:var(--ink);
  }
  .kpi-sub{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-faint);
    margin-top:2px;
  }

  .overview-section-title{
    font-family:var(--font-body);
    font-weight:700;
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--accent-dark);
    margin:26px 0 12px 0;
  }
  .collapsible-section-title{
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    margin:18px 0 0 -10px;
    border-radius:7px;
    user-select:none;
  }
  .collapsible-section-title:hover{ background:var(--surface); }
  .section-chevron{
    display:inline-block;
    font-size:10px;
    color:var(--ink-faint);
    transition:transform 0.15s;
  }
  .section-chevron.open{ transform:rotate(90deg); }
  .region-bars{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px 18px;
  }
  .region-table-wrap{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    overflow-x:auto;
  }
  .region-table{
    width:100%;
    border-collapse:collapse;
    font-family:var(--font-mono);
    font-size:12.5px;
  }
  .region-table thead th{
    text-align:right;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-faint);
    font-weight:600;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  .region-table thead th:first-child{ text-align:left; }
  .region-table tbody td{
    text-align:right;
    padding:9px 14px;
    border-bottom:1px solid var(--border);
    color:var(--ink);
  }
  .region-table tbody tr:last-child td{ border-bottom:none; }
  .region-table tbody tr{ cursor:pointer; }
  .region-table tbody tr:hover{ background:#FBFCFA; }
  .region-table-name{
    text-align:left !important;
    font-family:var(--font-body);
    font-weight:600;
    color:var(--ink);
  }
  .region-table-chevron{
    display:inline-block;
    font-size:10px;
    color:var(--ink-faint);
    margin-right:8px;
    transition:transform 0.15s;
  }
  .region-table-chevron.open{ transform:rotate(90deg); }
  .region-table-subrow{ cursor:default; background:#FBFCFA; }
  .region-table-subrow:hover{ background:#FBFCFA; }
  .region-table-subrow td{ font-family:var(--font-mono); font-size:12px; }
  .region-table-value{
    font-weight:700;
    color:var(--accent-dark);
  }
  .region-bar-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 0;
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .region-bar-row:last-child{border-bottom:none;}
  .region-bar-row:hover .region-bar-name{color:var(--accent-dark);}
  .region-bar-name{
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--ink);
    width:150px;
    flex-shrink:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .region-bar-track{
    flex:1;
    height:16px;
    background:var(--bg);
    border-radius:4px;
    overflow:hidden;
    display:flex;
  }
  .region-bar-seg{height:100%;}
  .region-bar-seg.researching{background:var(--amber);}
  .region-bar-seg.execute{background:var(--blue);}
  .region-bar-seg.submitted{background:var(--green);}
  .region-bar-seg.declined{background:var(--red);}
  .region-bar-value{
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:600;
    color:var(--ink);
    width:100px;
    text-align:right;
    flex-shrink:0;
  }
  .region-bar-count{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-faint);
    width:56px;
    text-align:right;
    flex-shrink:0;
  }
  .legend{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--border);
  }
  .legend-item{
    display:flex;align-items:center;gap:6px;
    font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);
  }
  .legend-dot{width:9px;height:9px;border-radius:2px;}
  .legend-dot.researching{background:var(--amber);}
  .legend-dot.execute{background:var(--blue);}
  .legend-dot.submitted{background:var(--green);}
  .legend-dot.declined{background:var(--red);}

  .needs-decision-list{
    display:flex;flex-direction:column;gap:8px;
  }
  .needs-decision-row{
    background:var(--surface);
    border:1px solid var(--border);
    border-left:4px solid var(--amber);
    border-radius:8px;
    padding:11px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    cursor:pointer;
    flex-wrap:wrap;
  }
  .needs-decision-row:hover{background:#FBFCFA;}
  .needs-decision-main{display:flex;flex-direction:column;gap:2px;}
  .needs-decision-name{font-family:var(--font-display);font-size:14.5px;font-weight:600;color:var(--ink);}
  .needs-decision-meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);}

  /* ---------- Main content ---------- */
  .main{
    flex:1;
    padding:24px 28px 60px 28px;
    max-width:1180px;
    width:100%;
    margin:0 auto;
  }
  .region-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    gap:12px;
    flex-wrap:wrap;
  }
  .search-sort-bar{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .search-box{
    position:relative;
    flex:1;
    min-width:220px;
  }
  .search-box input{
    width:100%;
    font-family:var(--font-body);
    font-size:13px;
    padding:8px 32px 8px 12px;
    border:1px solid var(--border);
    border-radius:7px;
    background:var(--surface);
    color:var(--ink);
  }
  .search-box input:focus{
    outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);
  }
  .search-clear{
    position:absolute;
    right:8px;top:50%;transform:translateY(-50%);
    background:none;border:none;
    color:var(--ink-faint);
    font-size:13px;
    cursor:pointer;
    padding:2px 4px;
  }
  .search-clear:hover{ color:var(--ink); }
  .search-sort-bar select{
    font-family:var(--font-body);
    font-size:13px;
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:7px;
    background:var(--surface);
    color:var(--ink);
  }
  .search-result-count{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-faint);
    white-space:nowrap;
  }
  .filter-row{
    margin-top:-4px;
  }
  .filter-row select{
    font-family:var(--font-body);
    font-size:12.5px;
    padding:7px 10px;
    border:1px solid var(--border);
    border-radius:7px;
    background:var(--surface);
    color:var(--ink);
  }
  .filter-date-label{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .filter-date-label input{
    font-family:var(--font-body);
    font-size:12.5px;
    padding:6px 8px;
    border:1px solid var(--border);
    border-radius:7px;
    background:var(--surface);
    color:var(--ink);
  }
  .region-name-wrap{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .region-name-input{
    font-family:var(--font-display);
    font-size:22px;
    font-weight:600;
    color:var(--ink);
    background:transparent;
    border:none;
    border-bottom:1px dashed transparent;
    padding:2px 0;
    width:auto;
    min-width:120px;
  }
  .region-name-input:hover, .region-name-input:focus{
    border-bottom:1px dashed var(--ink-faint);
    outline:none;
  }
  .region-sub{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--ink-faint);
  }
  .btn{
    font-family:var(--font-body);
    font-weight:600;
    font-size:13.5px;
    border-radius:7px;
    padding:9px 16px;
    cursor:pointer;
    border:1px solid transparent;
    transition:filter 0.12s, transform 0.05s;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-outline{background:transparent;color:var(--ink);border-color:var(--border);}
  .btn-outline:hover{background:var(--surface);}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-blue:hover{filter:brightness(1.08);}
  .btn-red{background:transparent;color:var(--red);border-color:var(--red);}
  .btn-red:hover{background:var(--red-soft);}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{filter:brightness(1.08);}
  .btn-sm{padding:6px 12px;font-size:12.5px;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}

  /* ---------- Empty state ---------- */
  .empty{
    background:var(--surface);
    border:1px dashed var(--border);
    border-radius:12px;
    padding:48px 24px;
    text-align:center;
    color:var(--ink-soft);
  }
  .empty-title{
    font-family:var(--font-display);
    font-size:19px;
    color:var(--ink);
    margin-bottom:6px;
  }

  /* ---------- Event cards ---------- */
  .event-list{display:flex;flex-direction:column;gap:10px;}
  .event-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    display:flex;
  }
  .status-rail{width:5px;flex-shrink:0;}
  .status-rail.researching{background:var(--amber);}
  .status-rail.execute{background:var(--blue);}
  .status-rail.declined{background:var(--red);}
  .status-rail.not_pursuing{background:var(--slate);}
  .status-rail.submitted{background:var(--green);}

  .event-card-body{flex:1;min-width:0;}
  .event-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    padding:14px 16px;
    cursor:pointer;
    flex-wrap:wrap;
  }
  .event-row-main{display:flex;flex-direction:column;gap:3px;min-width:220px;}
  .event-name{font-family:var(--font-display);font-size:16.5px;font-weight:600;color:var(--ink);}
  .event-meta{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-faint);}
  .event-row-right{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .event-total{font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--ink);}
  .event-total-label{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:0.06em;display:block;}
  .event-financials-mini{
    display:flex;
    align-items:flex-end;
    gap:13px;
    flex-wrap:wrap;
    padding:4px 12px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
  }
  .mini-stat{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    min-width:44px;
  }
  .mini-stat-label{
    font-family:var(--font-mono);
    font-size:8.5px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-faint);
    white-space:nowrap;
  }
  .mini-stat-value{
    font-family:var(--font-mono);
    font-size:12.5px;
    font-weight:600;
    color:var(--ink);
    white-space:nowrap;
  }
  .mini-stat-total{
    padding-left:12px;
    border-left:1px solid var(--border);
  }
  .mini-stat-total .mini-stat-value{
    font-size:14.5px;
    color:var(--accent-dark);
  }
  .badge{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:20px;
    font-weight:600;
    white-space:nowrap;
  }
  .badge.researching{background:var(--amber-soft);color:var(--amber);}
  .badge.execute{background:var(--blue-soft);color:var(--blue);}
  .badge.declined{background:var(--red-soft);color:var(--red);}
  .badge.not_pursuing{background:var(--slate-soft);color:var(--slate);}

/* ============================================================================
   FIREBASE STORAGE ADAPTER
   ----------------------------------------------------------------------------
   This dashboard was originally built to run inside Claude.ai, which provides
   a built-in window.storage API. Hosted elsewhere (e.g. GitHub Pages), that API
   doesn't exist, so this block REPLACES window.storage with a version backed by
   a free Firebase Firestore database instead. Everything else in the app below
   this block calls window.storage.get/set exactly as before and doesn't need to
   know the difference.

   ONE-TIME SETUP REQUIRED BEFORE THIS WILL WORK:
   1. Create a free Firebase project at https://console.firebase.google.com
      (no credit card required for the Spark/free plan).
   2. In the project, go to Build -> Firestore Database -> Create database.
      Start in "test mode" for now (see the setup guide for what to do instead
      once this is working, since test mode allows open read/write to anyone
      with the URL).
   3. Go to Project settings (gear icon) -> General -> "Your apps" -> click the
      </> (Web) icon to register a new web app -> copy the firebaseConfig
      object it gives you.
   4. Paste your real values into FIREBASE_CONFIG below, replacing every
      "PASTE_..." placeholder.
   ============================================================================ */
const FIREBASE_CONFIG = {
  apiKey: "PASTE_YOUR_API_KEY_HERE",
  authDomain: "PASTE_YOUR_AUTH_DOMAIN_HERE",
  projectId: "PASTE_YOUR_PROJECT_ID_HERE",
  storageBucket: "PASTE_YOUR_STORAGE_BUCKET_HERE",
  messagingSenderId: "PASTE_YOUR_SENDER_ID_HERE",
  appId: "PASTE_YOUR_APP_ID_HERE"
};

const FIREBASE_CONFIGURED = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith('PASTE_');
const FS_COLLECTION = 'dashboardStorage';

// Personal, per-user values (currently just the display name) are kept in this browser's
// localStorage rather than round-tripped to Firestore -- simpler, and perfectly fine here since
// this page (unlike the Claude.ai version) is a normal, unsandboxed browser page.
const FB_PERSONAL_KEYS = new Set(['user-display-name']);

let _fbDb = null;
function fbDb(){
  if(_fbDb) return _fbDb;
  firebase.initializeApp(FIREBASE_CONFIG);
  _fbDb = firebase.firestore();
  return _fbDb;
}

if(FIREBASE_CONFIGURED){
  window.storage = {
    async get(key, shared){
      if(FB_PERSONAL_KEYS.has(key)){
        const v = localStorage.getItem('dash-' + key);
        return v !== null ? { key, value: v, shared: false } : null;
      }
      try{
        const doc = await fbDb().collection(FS_COLLECTION).doc(key).get();
        if(!doc.exists) return null;
        return { key, value: doc.data().value, shared: !!shared };
      }catch(e){
        console.error('Firestore read failed for', key, e);
        return null;
      }
    },
    async set(key, value, shared){
      if(FB_PERSONAL_KEYS.has(key)){
        localStorage.setItem('dash-' + key, value);
        return { key, value, shared: false };
      }
      try{
        await fbDb().collection(FS_COLLECTION).doc(key).set({ value, updatedAt: Date.now() });
        return { key, value, shared: !!shared };
      }catch(e){
        console.error('Firestore write failed for', key, e);
        return null;
      }
    },
    async delete(key, shared){
      if(FB_PERSONAL_KEYS.has(key)){
        localStorage.removeItem('dash-' + key);
        return { key, deleted: true, shared: false };
      }
      try{
        await fbDb().collection(FS_COLLECTION).doc(key).delete();
        return { key, deleted: true, shared: !!shared };
      }catch(e){
        console.error('Firestore delete failed for', key, e);
        return null;
      }
    },
    async list(prefix, shared){
      try{
        const snap = await fbDb().collection(FS_COLLECTION).get();
        const keys = snap.docs.map(d=>d.id).filter(k => !prefix || k.startsWith(prefix));
        return { keys, prefix, shared };
      }catch(e){
        console.error('Firestore list failed', e);
        return null;
      }
    }
  };
}
/* ============================================================================
   END FIREBASE STORAGE ADAPTER -- everything below this line is unchanged

// Submission cutoff = last day of the month before the event's start date.
function getSubmissionCutoff(startDate){
  if(!startDate) return null;
  const d = new Date(startDate + 'T00:00:00');
  if(isNaN(d.getTime())) return null;
  const cutoff = new Date(d.getFullYear(), d.getMonth(), 0); // day 0 = last day of previous month
  cutoff.setHours(0,0,0,0);
  return cutoff;
}

// Flags a Researching event as stale: no start date, the event date itself has passed, or the
// submission cutoff (last day of the prior month) has passed while the event is still upcoming.
// Returns null for anything not Researching or not stale.
function getStalenessFlag(ev){
  if(ev.status !== STATUS.RESEARCHING) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if(!ev.startDate) return 'missing_date';
  const eventDate = new Date(ev.startDate + 'T00:00:00');
  if(isNaN(eventDate.getTime())) return 'missing_date';
  if(eventDate < today) return 'event_passed';
  const cutoff = getSubmissionCutoff(ev.startDate);
  if(cutoff && cutoff < today) return 'cutoff_passed';
  return null;
}

function isPlainNumeric(v){
  if(v===undefined || v===null) return false;
  const s = String(v).trim().replace(/[$,]/g,'');
  return s!=='' && !isNaN(parseFloat(s)) && isFinite(s);
}

function moneyOrText(v){
  if(v===undefined || v===null || String(v).trim()==='') return money(0);

}
// Shows a quantity field with its unit suffix when numeric (e.g. "120 mi"), or the raw

function withUnit(v, unit){
  if(v===undefined || v===null || String(v).trim()==='') return '0' + unit;
  return isPlainNumeric(v) ? (String(v).trim() + unit) : escapeHtml(String(v).trim());
}

function branchLabel(b){ return `${b.code} - ${b.name}`; }

function renderBranchOptions(regionIdx, selectedBranch){
  const regionName = state.regionNames[regionIdx];
  const branches = BRANCHES.filter(b=>b.region===regionName);
  let html = `<option value="">Select branch…</option>`;
  html += branches.map(b=>{
    const label = branchLabel(b);
    const sel = label===selectedBranch ? 'selected' : '';
    return `<option value="${escapeHtml(label)}" ${sel}>${escapeHtml(label)}</option>`;
  }).join('');
  if(branches.length===0){
    html += `<option value="" disabled>No branches mapped to this region</option>`;
  }
  return html;
}

function laborDollars(ev){ return num(ev.laborHours) * LABOR_RATE; }
function mileageDollars(ev){ return Math.max(0, num(ev.mileage) - MILEAGE_FREE_MILES) * MILEAGE_RATE; }
function perDiemDollars(ev){ return num(ev.hotelNights) * PER_DIEM_RATE; }
function hotelDollars(ev){ return num(ev.hotelNights) * HOTEL_RATE; }
function totalCost(ev){
  return num(ev.contractCost) + laborDollars(ev) + mileageDollars(ev) + hotelDollars(ev) + perDiemDollars(ev) + num(ev.miscCosts);
}

// Cost per opp = Total Costs / Target Opps. Returns null when opps isn't a positive number
// (can't divide by zero or by free-text like "TBD").
function costPerOpp(ev){
  const opps = num(ev.forecastedOpps);
  if(opps <= 0) return null;
  return totalCost(ev) / opps;
}
function costPerOppDisplay(ev){
  const cpo = costPerOpp(ev);
  return cpo===null ? '—' : money(cpo);
}

const REQUIRED_FIELDS = [
  ['eventName','Event Name'],
  ['branch','Branch'],
  ['zip','Location Zip Code'],
  ['startDate','Start Date'],
  ['endDate','End Date'],
  ['contractCost','Contract Cost'],
  ['laborHours','Forecasted Labor Hours'],
  ['mileage','Forecasted Mileage'],
  ['hotelNights','# of Hotel Nights'],
  ['miscCosts','Misc. Costs'],
  ['forecastedOpps','Target Opps'],
  ['organizer','Event Organizer'],
  ['contactName','Name of Contact'],
  ['contactPhone','Phone'],
  ['contactEmail','Email'],
  ['website','Website']
];

function getMissingFields(ev){
  return REQUIRED_FIELDS
    .filter(([key])=>{
      const v = ev[key];
      return v===undefined || v===null || String(v).trim()==='';
    })
    .map(([, label])=>label);
}

function getMissingApprovalFields(ev){
  const missing = [];
  const blank = (v) => v===undefined || v===null || String(v).trim()==='';

  if(ev.verifiedServiceArea !== 'yes') missing.push('Verified serviceable area (Map Viewer) — must confirm Yes');
  if(ev.confirmedAcceptance !== 'yes') missing.push('Confirmed acceptance with show promoter — must confirm Yes');
  if(blank(ev.supervisorEmail)) missing.push("Supervisor's Email");
  if(blank(ev.submissionType)) missing.push('Show Submission Type');
  if(ev.submissionType === 'renewal' && blank(ev.historicalShowCode)) missing.push('Historical Show Code');
  if(blank(ev.priorityLevel)) missing.push('Priority Level');
  if(blank(ev.organizer)) missing.push('Event Organizer Company Name');
  if(blank(ev.venueName)) missing.push('Venue Name');
  if(!hasVenueAddress(ev)) missing.push('Venue Address (Street, City, State)');
  if(blank(ev.registrationLink) && blank(ev.contractFileName)){
    missing.push('Show Registration Link or Contract Document Upload (at least one required)');
  }
  if(blank(ev.paymentDueDate)) missing.push('Payment Due Date');
  if(blank(ev.paymentMethod)) missing.push('Payment Method');
  if(ev.paymentMethod === 'credit_card' && blank(ev.creditCardLink)) missing.push('Credit Card Payment Link');
  if(ev.paymentMethod === 'phone_payment' && blank(ev.paymentPhoneNumber)) missing.push('Payment Phone Number');
  if(blank(ev.coiRequired)) missing.push('Certificate of Insurance required? (Yes/No)');
  if(ev.coiRequired === 'yes' && blank(ev.coiAddress)) missing.push('COI Address');
  if(blank(ev.thirdPartyPayment)) missing.push('3rd Party Payment Requests? (Yes/No)');
  if(ev.thirdPartyPayment === 'yes'){
    if(blank(ev.thirdPartyName)) missing.push('3rd Party Name');
    if(blank(ev.thirdPartyPhone)) missing.push('3rd Party Phone');
    if(blank(ev.thirdPartyPaymentInfo)) missing.push('3rd Party Payment Information');
  }

  return missing;
}

async function loadData(){
  try{
    const res = await window.storage.get('event-ledger-data', true);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.regionNames = parsed.regionNames && parsed.regionNames.length===REGION_COUNT ? parsed.regionNames : state.regionNames;
      state.events = parsed.events || [];
    }
  }catch(e){
    console.log('No existing data yet, starting fresh.');
  }

  try{
    const webhookRes = await window.storage.get('teams-webhook-url', true);
    if(webhookRes && webhookRes.value){
      state.teamsWebhookUrl = webhookRes.value;
    }
  }catch(e){
    // no webhook configured yet
  }

  try{
    const nameRes = await window.storage.get('teams-alert-name', true);
    if(nameRes && nameRes.value){
      state.teamsAlertName = nameRes.value;
    }
  }catch(e){
    // use default name
  }

  try{
    const userNameRes = await window.storage.get('user-display-name', false);
    if(userNameRes && userNameRes.value){
      state.userName = userNameRes.value;
    }
  }catch(e){
    // no name saved yet for this person
  }

  try{
    const logRes = await window.storage.get('activity-log', true);
    if(logRes && logRes.value){
      state.activityLog = JSON.parse(logRes.value) || [];
    }
  }catch(e){
    state.activityLog = [];
  }

  // One-time merge of the imported SA / SA-2 event research data. Guarded by a flag
  // so this only ever runs once, even if the dashboard is reloaded many times.
  let alreadyImported = false;
  try{
    const flag = await window.storage.get('import-v1-flag', true);
    alreadyImported = !!(flag && flag.value === 'done');
  }catch(e){
    alreadyImported = false;
  }
  if(!alreadyImported){
    state.events = state.events.concat(IMPORTED_EVENTS_V1);
    try{
      await window.storage.set('import-v1-flag', 'done', true);
    }catch(e){
      console.error('Could not set import flag', e);
    }
    await persist();
  }

  // One-time merge of the imported NE event research data.
  let alreadyImportedV2 = false;
  try{
    const flag2 = await window.storage.get('import-v2-flag', true);
    alreadyImportedV2 = !!(flag2 && flag2.value === 'done');
  }catch(e){
    alreadyImportedV2 = false;
  }
  if(!alreadyImportedV2){
    state.events = state.events.concat(IMPORTED_EVENTS_V2);
    try{

// Reads a "#event=<id>" hash (added to links in approval emails) and jumps straight to that
// event's region tab, expanded, so a supervisor clicking the email link lands on it directly.
function applyDeepLinkFromHash(){
  const hash = window.location.hash || '';
  const match = hash.match(/#event=([a-z0-9_]+)/i);
  if(!match) return;
  const targetId = match[1];
  const ev = state.events.find(e=>e.id===targetId);
  if(ev){
    state.activeRegion = ev.region;
    state.expandedEventId = ev.id;
  }
}

function getEventDeepLink(ev){

// Records one entry in the shared, dashboard-wide activity feed, and (when an eventId is given)
// mirrors a lighter version onto that event's own history for its detail-view timeline.
function logActivity(eventId, eventName, action, details){
  const entry = {
    ts: Date.now(),
    user: state.userName || 'Someone',
    action,
    eventId: eventId || null,
    eventName: eventName || null,
    details: details || ''
  };
  state.activityLog.unshift(entry);
  if(state.activityLog.length > 500) state.activityLog.length = 500;
  persistActivityLog();

  if(eventId){
    const ev = state.events.find(e=>e.id===eventId);
    if(ev){
      if(!ev.history) ev.history = [];
      ev.history.unshift({ ts: entry.ts, user: entry.user, action, details: entry.details });
      if(ev.history.length > 100) ev.history.length = 100;
    }
  }
}

function humanizeFieldKey(key){
  return key.replace(/([A-Z])/g, ' $1').replace(/^./, c=>c.toUpperCase()).trim();
}

const DIFF_IGNORE_KEYS = new Set([
  'id','history','createdAt','submittedAt','deniedAt','deniedBySupervisor','notPursuingAt',
  'contractFileData','contractFileType','status'
]);

// Compares two event objects and returns a short, human-readable list of which fields changed --
// used to summarize an edit in the activity log without dumping every old/new value.
function diffEventFields(oldEv, newEv){
  const changed = [];
  const keys = new Set([...Object.keys(oldEv||{}), ...Object.keys(newEv||{})]);
  keys.forEach(k=>{
    if(DIFF_IGNORE_KEYS.has(k)) return;
    const a = oldEv ? oldEv[k] : undefined;
    const b = newEv ? newEv[k] : undefined;
    if(JSON.stringify(a) !== JSON.stringify(b)) changed.push(humanizeFieldKey(k));
  });
  return changed;
}

    return;
  }
  state.draft = Object.assign({}, ev);

const REQUIRED_BASE_FIELDS = [
  ['eventName', 'Event Name'],
  ['branch', 'Branch'],
  ['zip', 'Location Zip Code'],
  ['startDate', 'Start Date'],
  ['endDate', 'End Date']
];

function saveDraft(){
  const d = state.draft;
  const missing = REQUIRED_BASE_FIELDS
    .filter(([key])=> !d[key] || !String(d[key]).trim())
    .map(([, label])=>label);
  if(missing.length>0){
    alert('Please complete the following before saving this event:\n\n' + missing.join('\n'));
    return;
  }
  if(state.editingEventId){
    const idx = state.events.findIndex(e=>e.id===state.editingEventId);
    const before = state.events[idx];
    const changedFields = diffEventFields(before, d);
    d.history = before ? before.history : [];
    state.events[idx] = d;
    if(changedFields.length>0){
      logActivity(d.id, d.eventName, 'Edited event', changedFields.join(', '));
    }
  } else {
    d.id = uid();
    d.history = [];
    state.events.push(d);
    logActivity(d.id, d.eventName, 'Created event');
  }
  persist();
  closePanel();
  render();
}

function deleteEvent(id){
  const ev = state.events.find(e=>e.id===id);
  if(ev && ev.status===STATUS.SUBMITTED){
    alert('This event has already been submitted for contract processing and can no longer be deleted.');
    return;
  }
  if(!confirm('Delete this event from the ledger? This cannot be undone.')) return;
  logActivity(null, ev ? ev.eventName : 'Unknown event', 'Deleted event');
  state.events = state.events.filter(e=>e.id!==id);
  persist();
  render();
}

function setDecision(id, newStatus){

function denyBySupervisor(id){

function submitForApproval(id){
  const ev = state.events.find(e=>e.id===id);
  const missing = getMissingApprovalFields(ev);
  if(missing.length>0){
    alert('This event is missing information required before it can be submitted for approval:\n\n' + missing.join('\n'));

  ev.status = STATUS.EXECUTE;
  logActivity(ev.id, ev.eventName, 'Submitted for Approval');
  persist();
  render();
  generateApprovalPDF(ev);
  // Email and Teams no longer fire automatically -- too many moving parts for a submitter who
  // just wants to hit one button. They're available as optional actions on the Approved card.
}

// Posts an Adaptive-Card-style notification to a Teams Incoming Webhook. Sent with mode:'no-cors'
// since Teams' webhook endpoint doesn't reliably return CORS headers for browser-side calls --
// that means we can send the request but can't read whether it actually succeeded, which is why
// there's a "Send Test Message" button in Settings to confirm delivery once, up front.
async function notifyTeams(ev){
  if(!state.teamsWebhookUrl) return;
  const region = state.regionNames[ev.region];
  const senderName = state.teamsAlertName || 'Regional Events Dashboard';
  const payload = {
    "@type": "MessageCard",
    "@context": "http://schema.org/extensions",
    "summary": `Approval needed: ${ev.eventName}`,
    "themeColor": "2F7A78",
    "title": `Approval Request: ${ev.eventName}`,
    "sections": [{
      "activityTitle": senderName,
      "activitySubtitle": `Approval Request — ${region}`,
      "facts": [
        { "name": "Region / Branch", "value": `${region} / ${ev.branch || '—'}` },
        { "name": "Dates", "value": `${ev.startDate || '—'} to ${ev.endDate || '—'}` },
        { "name": "Total Estimated Cost", "value": money(totalCost(ev)) },
        { "name": "Priority", "value": ev.priorityLevel ? ev.priorityLevel.charAt(0).toUpperCase()+ev.priorityLevel.slice(1) : '—' },
        { "name": "Supervisor Email", "value": ev.supervisorEmail || '—' }
      ],
      "text": "This event has cleared the pre-approval checklist and is ready for review."
    }]
  };
  try{
    await fetch(state.teamsWebhookUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
  }catch(e){
    console.error('Teams webhook request failed to send', e);
  }
}

function generateApprovalPDF(ev){
  if(!(window.jspdf && window.jspdf.jsPDF)){
    console.error('jsPDF failed to load; skipping PDF generation.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'letter' });
  const marginX = 48;
  const pageHeight = doc.internal.pageSize.getHeight();
  const pageWidth = doc.internal.pageSize.getWidth();
  const maxWidth = pageWidth - marginX*2;
  let y = 56;

  function ensureSpace(lines){
    if(y + lines*13 > pageHeight - 48){
      doc.addPage();
      y = 56;
    }
  }
  function addTitle(text){
    ensureSpace(2);
    doc.setFont('helvetica','bold'); doc.setFontSize(18);
    doc.text(text, marginX, y);
    y += 22;
  }
  function addSubtitle(text){
    ensureSpace(1);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(100);
    doc.text(text, marginX, y);
    doc.setTextColor(0);
    y += 20;
  }
  function addSectionHeader(text){
    ensureSpace(2);
    y += 6;
    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text(text.toUpperCase(), marginX, y);
    y += 4;
    doc.setDrawColor(180);
    doc.line(marginX, y, pageWidth-marginX, y);
    y += 14;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
  }
  function addRow(label, value){
    const text = label ? `${label}: ${(value===undefined||value===null||value==='') ? '—' : value}` : (value || '');
    if(!text) return;
    const wrapped = doc.splitTextToSize(text, maxWidth);
    ensureSpace(wrapped.length);
    doc.text(wrapped, marginX, y);
    y += wrapped.length * 13;
  }

  const region = state.regionNames[ev.region];

  addTitle('Event Approval Summary');
  addSubtitle(`Generated ${new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})}`);

  addSectionHeader('Event Overview');
  addRow('Event Name', ev.eventName);
  addRow('Region', region);
  addRow('Branch', ev.branch);
  addRow('Venue Name', ev.venueName);
  addRow('Venue Address', venueAddressDisplay(ev));
  addRow('Location Zip Code', ev.zip);
  addRow('Start Date', ev.startDate);
  addRow('End Date', ev.endDate);
  addRow('Event Organizer Company Name', ev.organizer);
  addRow('Website', ev.website);
  addRow('Target Opps', ev.forecastedOpps);

  addSectionHeader('Financials');
  addRow('Contract Cost', moneyOrText(ev.contractCost));
  addRow('Forecasted Labor Hours', ev.laborHours);
  addRow('Labor Cost (@ $20/hr)', money(laborDollars(ev)));
  addRow('Forecasted Mileage', withUnit(ev.mileage, ' mi'));
  addRow('Mileage Cost (@ $0.725/mi after 30 free)', money(mileageDollars(ev)));
  addRow('Hotel Nights', ev.hotelNights);
  addRow('Hotel Cost (@ $150/night)', money(hotelDollars(ev)));
  addRow('Per Diem (@ $43/night)', money(perDiemDollars(ev)));
  addRow('Misc. Costs', moneyOrText(ev.miscCosts));
  addRow('Total Costs', money(totalCost(ev)));

  addSectionHeader('Contact');
  addRow('Name of Contact', ev.contactName);
  addRow('Phone', ev.contactPhone);
  addRow('Email', ev.contactEmail);

  addSectionHeader('Pre-Approval Checklist');
  addRow('Verified Serviceable Area (Map Viewer)', ev.verifiedServiceArea==='yes'?'Yes':ev.verifiedServiceArea==='no'?'No':'');
  addRow('Confirmed Acceptance w/ Promoter', ev.confirmedAcceptance==='yes'?'Yes':ev.confirmedAcceptance==='no'?'No':'');
  addRow("Supervisor's Email", ev.supervisorEmail);
  addRow('Priority Level', ev.priorityLevel ? ev.priorityLevel.charAt(0).toUpperCase()+ev.priorityLevel.slice(1) : '');
  addRow('Submission Type', ev.submissionType==='new'?'New Show':ev.submissionType==='renewal'?'Show Renewal':'');
  if(ev.submissionType==='renewal') addRow('Historical Show Code', ev.historicalShowCode);
  addRow('Show Registration Link', ev.registrationLink);
  addRow('Contract Document', ev.contractFileName ? `${ev.contractFileName} (attached to approval email)` : '');

  addSectionHeader('Payment Information');
  addRow('Due Date', ev.paymentDueDate);
  addRow('Payment Method', ev.paymentMethod==='credit_card'?'Credit Card':ev.paymentMethod==='pay_at_gate'?'Pay at the Gate':ev.paymentMethod==='phone_payment'?'Phone Payment':ev.paymentMethod==='check'?'Check (not preferred)':ev.paymentMethod==='other'?'Other':'');
  if(ev.paymentMethod==='credit_card') addRow('Credit Card Payment Link', ev.creditCardLink);
  if(ev.paymentMethod==='phone_payment') addRow('Payment Phone Number', ev.paymentPhoneNumber);
  addRow('Payment Notes', ev.paymentNotes);
  addRow('COI Required', ev.coiRequired==='yes'?'Yes':ev.coiRequired==='no'?'No':'');
  if(ev.coiRequired==='yes') addRow('COI Address', ev.coiAddress);
  addRow('3rd Party Payment Requests', ev.thirdPartyPayment==='yes'?'Yes':ev.thirdPartyPayment==='no'?'No':'');

    addRow('3rd Party Name', ev.thirdPartyName);

  const filename = `approval-summary_${(ev.eventName||'event').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.pdf`;
  doc.save(filename);

function autoLink(value){
  const v = value ? String(value).trim() : '';
  if(!v) return '—';
  let href = null;
  if(/^https?:\/\//i.test(v)) href = v;
  else if(/^www\./i.test(v)) href = 'https://' + v;
  if(href){
    return `<a href="${escapeHtml(href)}" style="color:var(--accent-dark,#20585A);">${escapeHtml(v)}</a>`;
  }
  return escapeHtml(v); // not a URL (e.g. a filed-location note) -- shown as plain text
}

function sanitizeHeader(v){
  return String(v||'').replace(/[\r\n]+/g,' ').trim();
}

// Wraps a base64 string at 76 chars/line, as required by the MIME spec for attachment bodies.
function wrapBase64(b64){
  return b64.replace(/.{76}/g, '$&\r\n');
}

function generateApprovalEmail(ev){
  const region = state.regionNames[ev.region];
  const to = sanitizeHeader(ev.supervisorEmail);
  const subject = sanitizeHeader(`Approval Request: ${ev.eventName}`);

  const priorityLabel = ev.priorityLevel ? ev.priorityLevel.charAt(0).toUpperCase()+ev.priorityLevel.slice(1) : '—';
  const submissionLabel = ev.submissionType==='renewal'
    ? `Show Renewal (historical code: ${ev.historicalShowCode || '—'})`
    : 'New Show';
  const paymentMethodLabel = ev.paymentMethod==='credit_card' ? 'Credit Card'
    : ev.paymentMethod==='pay_at_gate' ? 'Pay at the Gate'
    : ev.paymentMethod==='phone_payment' ? `Phone Payment (${ev.paymentPhoneNumber || '—'})`
    : ev.paymentMethod==='check' ? 'Check (not preferred)'
    : ev.paymentMethod==='other' ? 'Other' : '—';
  const coiLabel = ev.coiRequired==='yes' ? `Yes — ${ev.coiAddress || 'address on file'}` : 'No';
  const hasAttachment = !!(ev.contractFileName && ev.contractFileData);

  // mailto can't carry file attachments, so download the contract document (if any) alongside
  // the approval PDF, and just point to both in the email body.
  if(hasAttachment){
    downloadContractFile(ev);
  }

  const attachmentNote = hasAttachment
    ? `${ev.contractFileName} (downloaded separately — please attach before sending)`
    : '—';

  let bodyLines = [
    'Hi,',
    '',
    'The following event has cleared the pre-approval checklist and is ready for review:',
    '',
    `Event: ${ev.eventName}`,
    `Region / Branch: ${region} / ${ev.branch || '—'}`,
    `Venue: ${ev.venueName || '—'} — ${venueAddressDisplay(ev) || '—'}`,
    `Dates: ${ev.startDate || '—'} to ${ev.endDate || '—'}`,
    `Priority: ${priorityLabel}`,
    `Submission Type: ${submissionLabel}`,
    '',
    `Contract Cost: ${moneyOrText(ev.contractCost)}`,
    `Total Estimated Cost: ${money(totalCost(ev))}`,
    `Payment Due: ${ev.paymentDueDate || '—'} via ${paymentMethodLabel}`,
    ev.paymentMethod==='credit_card' ? `Credit Card Payment Link: ${ev.creditCardLink || '—'}` : '',
    `COI Required: ${coiLabel}`,
    '',
    `Show Registration Link: ${ev.registrationLink || '—'}`,
    `Contract Document: ${attachmentNote}`,
    '',
    ev.finalNotes ? `Notes: ${ev.finalNotes}` : '',
    '',
    'A full PDF summary was downloaded alongside this email — please attach it too.',
    '',
    'Thanks,'
  ].filter((line, i, arr) => !(line === '' && arr[i-1] === ''));

  let bodyText = bodyLines.join('\n');

  // Keep the mailto URL within safe length limits across mail clients (~1900 chars for the body).
  const MAX_BODY_CHARS = 1900;
  if(bodyText.length > MAX_BODY_CHARS){
    bodyText = bodyText.slice(0, MAX_BODY_CHARS) + '\n\n[Message truncated — see the downloaded PDF for full details.]';
  }

  const mailtoUrl = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyText)}`;
  window.location.href = mailtoUrl;
}

function downloadContractFile(ev){
  if(!(ev.contractFileName && ev.contractFileData)) return;
  const mime = ev.contractFileType || 'application/octet-stream';
  const blob = (function(){
    const byteChars = atob(ev.contractFileData);
    const byteNumbers = new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) byteNumbers[i] = byteChars.charCodeAt(i);
    return new Blob([new Uint8Array(byteNumbers)], { type: mime });
  })();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = ev.contractFileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  </style></head><body>

  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `contract-summary_${(ev.eventName||'event').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.html`;
  document.body.appendChild(a);

  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escapeHtml(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function renameRegion(idx, newName){
  state.regionNames[idx] = newName || `Region ${idx+1}`;
  persist();
}

function render(){
  const root = document.getElementById('root');
  if(!state.loaded){
    root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:var(--font-mono);color:var(--ink-soft);">Loading ledger…</div>`;
    return;
  }

  const allEvents = state.events;
  const totalPipeline = allEvents.filter(e=>e.status!==STATUS.DECLINED && e.status!==STATUS.NOT_PURSUING).reduce((s,e)=>s+totalCost(e),0);
  const activeCount = allEvents.length;
  const submittedCount = allEvents.filter(e=>e.status===STATUS.SUBMITTED).length;
  const pendingApprovalCount = allEvents.filter(e=>e.status===STATUS.EXECUTE).length;

  const regionTabsHtml = state.regionNames.map((name, idx)=>{
    const count = allEvents.filter(e=>e.region===idx).length;
    return `<button class="region-tab ${idx===state.activeRegion?'active':''}" data-region="${idx}" style="--region-color:${regionColor(idx)};">
      <span class="region-tab-dot" style="background:${regionColor(idx)};"></span>${escapeHtml(name)} <span class="tab-count">${count}</span>
    </button>`;
  }).join('');

  const tabsHtml = `<button class="region-tab overview-tab ${state.activeRegion==='overview'?'active':''}" data-region="overview">◆ Overview</button><button class="region-tab master-tab ${state.activeRegion==='master'?'active':''}" data-region="master">▦ All Events</button><div class="tab-divider"></div>` + regionTabsHtml;

  const isOverview = state.activeRegion === 'overview';
  const isMaster = state.activeRegion === 'master';
  const regionEventsAll = isOverview ? [] : (isMaster ? allEvents : allEvents.filter(e=>e.region===state.activeRegion));

  const SORT_OPTIONS = [
    ['startDateAsc', 'Start Date (soonest)'],
    ['startDateDesc', 'Start Date (latest)'],
    ['nameAsc', 'Event Name (A–Z)'],
    ['branchAsc', 'Branch (A–Z)'],
    ['costDesc', 'Total Cost (high–low)'],
    ['costAsc', 'Total Cost (low–high)'],
    ['statusAsc', 'Status']
  ];
  const STATUS_SORT_ORDER = {researching:0, execute:1, submitted:2, declined:3, not_pursuing:4};

  function applySearchAndSort(events){
    let out = events;
    const q = state.searchQuery.trim().toLowerCase();
    if(q){
      out = out.filter(ev=>{
        const haystack = [ev.eventName, ev.venueName, ev.organizer, ev.branch]
          .filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }
    if(state.filterBranch){
      out = out.filter(ev => ev.branch === state.filterBranch);
    }
    if(state.filterStatus){
      out = out.filter(ev => ev.status === state.filterStatus);
    }
    if(state.filterDateFrom){
      out = out.filter(ev => ev.startDate && ev.startDate >= state.filterDateFrom);
    }
    if(state.filterDateTo){
      out = out.filter(ev => ev.startDate && ev.startDate <= state.filterDateTo);
    }
    if(isMaster && state.filterRegion !== ''){
      out = out.filter(ev => ev.region === parseInt(state.filterRegion,10));
    }
    out = out.slice().sort((a,b)=>{
      switch(state.sortBy){
        case 'startDateDesc': return (b.startDate||'').localeCompare(a.startDate||'');
        case 'nameAsc': return (a.eventName||'').localeCompare(b.eventName||'');
        case 'branchAsc': {
          // events with no branch assigned sort to the bottom, then alphabetical within each branch
          const ba = a.branch && a.branch.trim() ? a.branch.trim() : '\uffff';
          const bb = b.branch && b.branch.trim() ? b.branch.trim() : '\uffff';
          return ba.localeCompare(bb) || (a.eventName||'').localeCompare(b.eventName||'');
        }
        case 'costDesc': return totalCost(b) - totalCost(a);
        case 'costAsc': return totalCost(a) - totalCost(b);
        case 'statusAsc': return (STATUS_SORT_ORDER[a.status]??9) - (STATUS_SORT_ORDER[b.status]??9);
        case 'startDateAsc':
        default: return (a.startDate||'9999').localeCompare(b.startDate||'9999');
      }
    });
    return out;
  }

  const regionEvents = isOverview ? [] : applySearchAndSort(regionEventsAll);

  let mainContentHtml = '';
  if(isOverview){
    mainContentHtml = renderOverview(allEvents);
  } else if(isMaster){
    const masterEvents = regionEvents;
    let eventListHtml = '';
    if(regionEventsAll.length===0){
      eventListHtml = `<div class="empty">
        <div class="empty-title">No events logged yet</div>
        <div>Add events from any region tab and they'll show up here too.</div>
      </div>`;
    } else if(masterEvents.length===0){
      const titleText = state.searchQuery ? `No events match "${escapeHtml(state.searchQuery)}"` : 'No events match these filters';
      eventListHtml = `<div class="empty">
        <div class="empty-title">${titleText}</div>
        <div>Try different search or filter criteria, or clear them to see all ${regionEventsAll.length} events.</div>
      </div>`;
    } else {
      const groupByWeek = state.sortBy === 'startDateAsc' || state.sortBy === 'startDateDesc';
      eventListHtml = groupByWeek
        ? renderWeekGroupedEvents(masterEvents, state.sortBy === 'startDateDesc')
        : '<div class="event-list">' + masterEvents.map(ev=>renderEventCard(ev, true)).join('') + '</div>';
    }
    const branchSourceEvents = state.filterRegion !== ''
      ? allEvents.filter(e=>e.region===parseInt(state.filterRegion,10))
      : allEvents;
    const distinctBranchesMaster = Array.from(new Set(branchSourceEvents.map(e=>e.branch).filter(b=>b && b.trim())))
      .sort((a,b)=>a.localeCompare(b));
    const hasActiveFiltersMaster = state.filterBranch || state.filterStatus || state.filterDateFrom || state.filterDateTo || state.filterRegion !== '';
    const searchSortBarHtmlMaster = regionEventsAll.length===0 ? '' : `
      <div class="search-sort-bar">
        <div class="search-box">
          <input type="text" id="regionSearchInput" placeholder="Search by name, venue, organizer, or branch…" value="${escapeHtml(state.searchQuery)}"/>
          ${state.searchQuery ? `<button class="search-clear" id="clearSearchBtn" title="Clear search">✕</button>` : ''}
        </div>
        <select id="regionSortSelect">
          ${SORT_OPTIONS.map(([val,label])=>`<option value="${val}" ${state.sortBy===val?'selected':''}>${label}</option>`).join('')}
        </select>
        <span class="search-result-count">${masterEvents.length} of ${regionEventsAll.length} shown</span>
      </div>
      <div class="search-sort-bar filter-row">
        <select id="regionFilterRegion">
          <option value="">All Regions</option>
          ${state.regionNames.map((n,i)=>`<option value="${i}" ${state.filterRegion===String(i)?'selected':''}>${escapeHtml(n)}</option>`).join('')}
        </select>
        <select id="regionFilterBranch">
          <option value="">All Branches</option>
          ${distinctBranchesMaster.map(b=>`<option value="${escapeHtml(b)}" ${state.filterBranch===b?'selected':''}>${escapeHtml(b)}</option>`).join('')}
        </select>
        <select id="regionFilterStatus">
          <option value="">All Statuses</option>
          ${Object.keys(STATUS_LABEL).map(s=>`<option value="${s}" ${state.filterStatus===s?'selected':''}>${STATUS_LABEL[s]}</option>`).join('')}
        </select>
        <label class="filter-date-label">From <input type="date" id="regionFilterDateFrom" value="${escapeHtml(state.filterDateFrom)}"/></label>
        <label class="filter-date-label">To <input type="date" id="regionFilterDateTo" value="${escapeHtml(state.filterDateTo)}"/></label>
        ${hasActiveFiltersMaster ? `<button class="btn btn-outline btn-sm" id="clearFiltersBtn">Clear Filters</button>` : ''}
      </div>
    `;
    mainContentHtml = `
      <div class="region-header">
        <div class="region-name-wrap">
          <h1 style="font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--ink);margin:0;">▦ All Events — Master View</h1>
        </div>
      </div>
      <div class="hint" style="margin:-6px 0 12px 2px;">Every region combined — opens scoped to the current week onward (past events hidden by default). Adjust or clear the date range below to see more.</div>
      ${searchSortBarHtmlMaster}
      ${eventListHtml}
    `;
  } else {
    let eventListHtml = '';
    if(regionEventsAll.length===0){
      eventListHtml = `<div class="empty">
        <div class="empty-title">No events logged yet</div>
        <div>Start tracking research for this region by adding your first event.</div>
      </div>`;
    } else if(regionEvents.length===0){
      const titleText = state.searchQuery ? `No events match "${escapeHtml(state.searchQuery)}"` : 'No events match these filters';
      eventListHtml = `<div class="empty">
        <div class="empty-title">${titleText}</div>
        <div>Try different search or filter criteria, or clear them to see all ${regionEventsAll.length} events.</div>
      </div>`;
    } else {
      const groupByWeek = state.sortBy === 'startDateAsc' || state.sortBy === 'startDateDesc';
      eventListHtml = groupByWeek
        ? renderWeekGroupedEvents(regionEvents, state.sortBy === 'startDateDesc', false)
        : '<div class="event-list">' + regionEvents.map(ev=>renderEventCard(ev)).join('') + '</div>';
    }
    const distinctBranches = Array.from(new Set(regionEventsAll.map(e=>e.branch).filter(b=>b && b.trim())))
      .sort((a,b)=>a.localeCompare(b));
    const hasActiveFilters = state.filterBranch || state.filterStatus || state.filterDateFrom || state.filterDateTo;
    const searchSortBarHtml = regionEventsAll.length===0 ? '' : `
      <div class="search-sort-bar">
        <div class="search-box">
          <input type="text" id="regionSearchInput" placeholder="Search by name, venue, organizer, or branch…" value="${escapeHtml(state.searchQuery)}"/>
          ${state.searchQuery ? `<button class="search-clear" id="clearSearchBtn" title="Clear search">✕</button>` : ''}
        </div>
        <select id="regionSortSelect">
          ${SORT_OPTIONS.map(([val,label])=>`<option value="${val}" ${state.sortBy===val?'selected':''}>${label}</option>`).join('')}
        </select>
        <span class="search-result-count">${regionEvents.length} of ${regionEventsAll.length} shown</span>
      </div>
      <div class="search-sort-bar filter-row">
        <select id="regionFilterBranch">
          <option value="">All Branches</option>
          ${distinctBranches.map(b=>`<option value="${escapeHtml(b)}" ${state.filterBranch===b?'selected':''}>${escapeHtml(b)}</option>`).join('')}
        </select>
        <select id="regionFilterStatus">
          <option value="">All Statuses</option>
          ${Object.keys(STATUS_LABEL).map(s=>`<option value="${s}" ${state.filterStatus===s?'selected':''}>${STATUS_LABEL[s]}</option>`).join('')}
        </select>
        <label class="filter-date-label">From <input type="date" id="regionFilterDateFrom" value="${escapeHtml(state.filterDateFrom)}"/></label>
        <label class="filter-date-label">To <input type="date" id="regionFilterDateTo" value="${escapeHtml(state.filterDateTo)}"/></label>
        ${hasActiveFilters ? `<button class="btn btn-outline btn-sm" id="clearFiltersBtn">Clear Filters</button>` : ''}
      </div>
    `;
    mainContentHtml = `
      <div class="region-header">
        <div class="region-name-wrap">
          <span class="region-tab-dot" style="background:${regionColor(state.activeRegion)};width:12px;height:12px;"></span>
          <input class="region-name-input" id="regionNameInput" value="${escapeHtml(state.regionNames[state.activeRegion])}" />

      <div class="hint" style="margin:-6px 0 12px 2px;">Opens scoped to the current week onward (past events hidden by default). Adjust or clear the date range below to see more.</div>
      ${searchSortBarHtml}
      ${eventListHtml}
    `;
  }

  root.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="brand-eyebrow">Field Research &amp; Contracting</div>
          <h1 class="brand-title">Regional Events Dashboard</h1>
        </div>
        <div class="header-stats">
          <div class="stat"><div class="stat-label">Events Logged</div><div class="stat-value">${activeCount}</div></div>
          <div class="stat"><div class="stat-label">Submitted</div><div class="stat-value">${submittedCount}</div></div>
          <div class="stat"><div class="stat-label">Est. Pipeline Value</div><div class="stat-value">${money(totalPipeline)}</div></div>

      </div>

    </div>

    ${!FIREBASE_CONFIGURED ? `
    <div class="sp-warning-banner">
      ⚠ Firebase isn't configured yet — saving and loading data will not work. Open this file in a text editor, find <code>FIREBASE_CONFIG</code> near the top of the script, and paste in your real Firebase project values (see the setup guide).
    </div>` : ''}

    ${!state.userName ? `
    <div class="name-banner">
      <span>👋 What should we call you? Actions you take will be logged under this name in the activity history.</span>
      <input type="text" id="userNameInput" placeholder="Your name" value="${escapeHtml(state.userNameDraft)}"/>
      <button class="btn btn-primary btn-sm" id="saveUserNameBtn">Save</button>
    </div>` : ''}

    <div class="main">
      ${mainContentHtml}
    </div>

    <div class="overlay ${state.panelOpen?'open':''}" id="overlay">
      <div class="panel" id="panelStop">
        ${state.panelOpen ? renderPanel() : ''}
      </div>
    </div>

    <div class="overlay ${state.settingsOpen?'open':''}" id="settingsOverlay">
      <div class="panel" id="settingsPanelStop" style="max-width:480px;">
        ${state.settingsOpen ? renderSettingsPanel() : ''}

  attachHandlers();
}

function renderOverview(allEvents){
  const byStatus = {researching:[],execute:[],declined:[],submitted:[],not_pursuing:[]};
  allEvents.forEach(e=> byStatus[e.status].push(e));

  const submittedValue = byStatus.submitted.reduce((s,e)=>s+totalCost(e),0);
  const pipelineValue = allEvents.filter(e=>e.status!==STATUS.DECLINED && e.status!==STATUS.NOT_PURSUING).reduce((s,e)=>s+totalCost(e),0);

  const kpiHtml = `
    <div class="kpi-grid">
      <div class="kpi-card total">
        <div class="kpi-label">Total Events</div>
        <div class="kpi-value">${allEvents.length}</div>
        <div class="kpi-sub">Across ${state.regionNames.length} regions</div>
      </div>
      <div class="kpi-card researching">
        <div class="kpi-label">Researching</div>
        <div class="kpi-value">${byStatus.researching.length}</div>
        <div class="kpi-sub">Awaiting determination</div>
      </div>
      <div class="kpi-card execute">
        <div class="kpi-label">Approved</div>
        <div class="kpi-value">${byStatus.execute.length}</div>
        <div class="kpi-sub">Awaiting contract submission</div>
      </div>
      <div class="kpi-card submitted">
        <div class="kpi-label">Submitted</div>
        <div class="kpi-value">${byStatus.submitted.length}</div>
        <div class="kpi-sub">${money(submittedValue)} contracted</div>
      </div>
      <div class="kpi-card declined">
        <div class="kpi-label">Declined</div>
        <div class="kpi-value">${byStatus.declined.length}</div>
        <div class="kpi-sub">Not moving forward</div>
      </div>
      <div class="kpi-card not_pursuing">
        <div class="kpi-label">Not Pursuing</div>
        <div class="kpi-value">${byStatus.not_pursuing.length}</div>
        <div class="kpi-sub">Decided not to pursue</div>
      </div>
      <div class="kpi-card total">
        <div class="kpi-label">Est. Pipeline Value</div>
        <div class="kpi-value" style="font-size:22px;">${money(pipelineValue)}</div>
        <div class="kpi-sub">Excludes declined &amp; not-pursuing events</div>
      </div>
    </div>
  `;

  // Per-region rollup, sorted by total value desc
  const regionRollups = state.regionNames.map((name, idx)=>{
    const evs = allEvents.filter(e=>e.region===idx);
    const total = evs.reduce((s,e)=>s+totalCost(e),0);
    const counts = {
      researching: evs.filter(e=>e.status===STATUS.RESEARCHING).length,
      execute: evs.filter(e=>e.status===STATUS.EXECUTE).length,
      submitted: evs.filter(e=>e.status===STATUS.SUBMITTED).length,
      declined: evs.filter(e=>e.status===STATUS.DECLINED).length,
      notPursuing: evs.filter(e=>e.status===STATUS.NOT_PURSUING).length
    };
    const pipelineTotal = evs.filter(e=>e.status!==STATUS.DECLINED && e.status!==STATUS.NOT_PURSUING).reduce((s,e)=>s+totalCost(e),0);
    return {idx, name, total, count:evs.length, counts, pipelineTotal};
  }).sort((a,b)=>b.total-a.total);

  // Full per-region breakdown table -- same stats as the top KPIs, split out per region,
  // with a click-to-expand branch-level breakdown underneath each region row.
  function branchRollupForRegion(regionIdx){
    const evs = allEvents.filter(e=>e.region===regionIdx);
    const groups = {};
    evs.forEach(e=>{
      const key = (e.branch && e.branch.trim()) ? e.branch.trim() : '(No branch assigned)';
      if(!groups[key]){
        groups[key] = {branch:key, count:0, researching:0, execute:0, submitted:0, declined:0, notPursuing:0, pipelineTotal:0};
      }
      const g = groups[key];
      g.count++;
      if(e.status===STATUS.RESEARCHING) g.researching++;
      else if(e.status===STATUS.EXECUTE) g.execute++;
      else if(e.status===STATUS.SUBMITTED) g.submitted++;
      else if(e.status===STATUS.DECLINED) g.declined++;
      else if(e.status===STATUS.NOT_PURSUING) g.notPursuing++;
      if(e.status!==STATUS.DECLINED && e.status!==STATUS.NOT_PURSUING) g.pipelineTotal += totalCost(e);
    });
    return Object.values(groups).sort((a,b)=>b.pipelineTotal-a.pipelineTotal);
  }

  const regionTableHtml = `
    <div class="region-table-wrap">
      <table class="region-table">
        <thead>
          <tr>
            <th style="text-align:left;">Region</th>
            <th>Total</th>
            <th>Researching</th>
            <th>Approved</th>
            <th>Submitted</th>
            <th>Declined</th>
            <th>Not Pursuing</th>
            <th>Pipeline Value</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${regionRollups.map(r=>{
            const isOpen = state.expandedOverviewRegion === r.idx;
            const rowHtml = `
              <tr data-toggle-region="${r.idx}">
                <td class="region-table-name">
                  <span class="region-table-chevron ${isOpen?'open':''}">▶</span><span class="region-tab-dot" style="background:${regionColor(r.idx)};margin-right:6px;"></span>${escapeHtml(r.name)}
                </td>
                <td>${r.count}</td>
                <td>${r.counts.researching}</td>
                <td>${r.counts.execute}</td>
                <td>${r.counts.submitted}</td>
                <td>${r.counts.declined}</td>
                <td>${r.counts.notPursuing}</td>
                <td class="region-table-value">${money(r.pipelineTotal)}</td>
                <td><button class="btn btn-outline btn-sm" data-goto-region="${r.idx}">Open →</button></td>
              </tr>`;
            let subRowsHtml = '';
            if(isOpen){
              const branches = branchRollupForRegion(r.idx);
              if(branches.length===0){
                subRowsHtml = `<tr class="region-table-subrow"><td colspan="9" style="text-align:center;color:var(--ink-faint);">No events in this region yet.</td></tr>`;
              } else {
                subRowsHtml = branches.map(b=>`
                  <tr class="region-table-subrow">
                    <td class="region-table-name" style="padding-left:32px;font-weight:400;color:var(--ink-soft);">${escapeHtml(b.branch)}</td>
                    <td>${b.count}</td>
                    <td>${b.researching}</td>
                    <td>${b.execute}</td>
                    <td>${b.submitted}</td>
                    <td>${b.declined}</td>
                    <td>${b.notPursuing}</td>
                    <td class="region-table-value">${money(b.pipelineTotal)}</td>
                    <td></td>
                  </tr>
                `).join('');
              }
            }
            return rowHtml + subRowsHtml;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Events needing a decision (status = researching) with a start date in the next 45 days,
  // soonest first. Undated or out-of-window events are counted but not listed here.
  const DECISION_WINDOW_DAYS = 45;
  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const windowEnd = new Date(todayMidnight);
  windowEnd.setDate(windowEnd.getDate() + DECISION_WINDOW_DAYS);

  function isWithinDecisionWindow(dateStr){
    if(!dateStr) return false;
    const d = new Date(dateStr + 'T00:00:00');
    if(isNaN(d.getTime())) return false;
    return d >= todayMidnight && d <= windowEnd;
  }

  const allResearching = allEvents.filter(e=>e.status===STATUS.RESEARCHING);
  const needsDecision = allResearching
    .filter(e=>isWithinDecisionWindow(e.startDate))
    .sort((a,b)=> (a.startDate||'9999').localeCompare(b.startDate||'9999'));
  const excludedCount = allResearching.length - needsDecision.length;

  const needsDecisionHtml = needsDecision.length===0
    ? `<div class="empty" style="padding:28px;"><div class="empty-title" style="font-size:16px;">Nothing awaiting a decision in the next ${DECISION_WINDOW_DAYS} days</div><div>${excludedCount>0 ? `${excludedCount} researching event${excludedCount===1?'':'s'} ${excludedCount===1?'has':'have'} no date or falls outside this window.` : 'Every logged event has been approved, declined, or submitted.'}</div></div>`
    : `<div class="needs-decision-list">` + needsDecision.map(ev=>`
        <div class="needs-decision-row" data-goto-event="${ev.id}" data-goto-event-region="${ev.region}">
          <div class="needs-decision-main">
            <div class="needs-decision-name">${escapeHtml(ev.eventName)}</div>
            <div class="needs-decision-meta">${escapeHtml(state.regionNames[ev.region])} · ${escapeHtml(ev.startDate)||'No start date'} · Est. ${money(totalCost(ev))}</div>
          </div>
          <span class="badge researching">${STATUS_LABEL.researching}</span>
        </div>
      `).join('') + `</div>`;

  const awaitingContract = allEvents
    .filter(e=>e.status===STATUS.EXECUTE)
    .sort((a,b)=> (a.startDate||'9999').localeCompare(b.startDate||'9999'));

  const awaitingContractHtml = awaitingContract.length===0
    ? `<div class="empty" style="padding:28px;"><div class="empty-title" style="font-size:16px;">Nothing awaiting contract processing</div><div>Events show up here once they clear the pre-approval checklist and are Submitted for Approval.</div></div>`
    : `<div class="needs-decision-list">` + awaitingContract.map(ev=>{
        const missing = getMissingFields(ev);
        return `
        <div class="needs-decision-row" data-goto-event="${ev.id}" data-goto-event-region="${ev.region}" style="border-left-color:var(--blue);">
          <div class="needs-decision-main">
            <div class="needs-decision-name">${escapeHtml(ev.eventName)}</div>
            <div class="needs-decision-meta">${escapeHtml(state.regionNames[ev.region])} · ${escapeHtml(ev.startDate)||'No start date'} · Est. ${money(totalCost(ev))}${missing.length>0 ? ` · <span style="color:var(--red);">${missing.length} field${missing.length===1?'':'s'} missing</span>` : ''}</div>
          </div>
          <span class="badge execute">${STATUS_LABEL.execute}</span>
        </div>
      `;}).join('') + `</div>`;

  const STALE_SEVERITY = { event_passed: 0, cutoff_passed: 1, missing_date: 2 };
  const staleResearch = allResearching
    .map(ev=>({ ev, flag: getStalenessFlag(ev) }))
    .filter(x=>x.flag)
    .sort((a,b)=> STALE_SEVERITY[a.flag]-STALE_SEVERITY[b.flag] || (a.ev.startDate||'9999').localeCompare(b.ev.startDate||'9999'));

  const staleResearchHtml = staleResearch.length===0
    ? `<div class="empty" style="padding:28px;"><div class="empty-title" style="font-size:16px;">Nothing stale</div><div>Every researching event has a start date, a valid submission window, and hasn't already happened.</div></div>`
    : `<div class="needs-decision-list">` + staleResearch.map(({ev,flag})=>{
        const railColor = flag==='event_passed' ? 'var(--red)' : flag==='cutoff_passed' ? 'var(--amber)' : 'var(--slate)';
        return `
        <div class="needs-decision-row" data-goto-event="${ev.id}" data-goto-event-region="${ev.region}" style="border-left-color:${railColor};">
          <div class="needs-decision-main">
            <div class="needs-decision-name">${escapeHtml(ev.eventName)}</div>
            <div class="needs-decision-meta">${escapeHtml(state.regionNames[ev.region])} · ${escapeHtml(ev.startDate)||'No start date'} · Est. ${money(totalCost(ev))}</div>
          </div>
          <span class="badge stale-${flag}">⚠ ${STALENESS_LABEL[flag]}</span>
        </div>
      `;}).join('') + `</div>`;

  function sectionHeader(key, title, anchorId){
    const isOpen = state.overviewSectionsOpen[key];
    return `<div class="overview-section-title collapsible-section-title" data-toggle-overview-section="${key}" ${anchorId?`id="${anchorId}"`:''}>
      <span class="section-chevron ${isOpen?'open':''}">▶</span> ${title}
    </div>`;
  }

  return `
    ${kpiHtml}
    ${sectionHeader('regionSummary', 'Full Summary by Region')}
    ${state.overviewSectionsOpen.regionSummary ? `
      <div class="hint" style="margin:-6px 0 10px 2px;">Click a region to see its branch-level breakdown.</div>
      ${regionTableHtml}
    ` : ''}

    ${sectionHeader('awaitingContract', `Awaiting Contract Processing — Submitted for Approval (${awaitingContract.length})`, 'pendingApprovalSection')}
    ${state.overviewSectionsOpen.awaitingContract ? awaitingContractHtml : ''}

    ${sectionHeader('staleResearch', `Stale Research — Needs Attention (${staleResearch.length})`)}
    ${state.overviewSectionsOpen.staleResearch ? `
      <div class="hint" style="margin:-6px 0 10px 2px;">Researching events with no start date, a passed submission cutoff, or a start date already behind us.</div>
      ${staleResearchHtml}
    ` : ''}

    ${sectionHeader('needsDecision', `Needs a Decision — next ${DECISION_WINDOW_DAYS} days (${needsDecision.length})`)}
    ${state.overviewSectionsOpen.needsDecision ? `
      ${needsDecisionHtml}
      ${excludedCount>0 && needsDecision.length>0 ? `<div class="hint" style="margin:8px 0 0 2px;">${excludedCount} more researching event${excludedCount===1?'':'s'} not shown — no date set or starting beyond ${DECISION_WINDOW_DAYS} days out.</div>` : ''}
    ` : ''}

    ${sectionHeader('activity', 'Recent Activity')}
    ${state.overviewSectionsOpen.activity ? renderActivityFeed(20) : ''}
  `;
}

// Groups events into Monday-Sunday weeks by Start Date, for the master cross-region view.
function toDateInputValue(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function getCurrentWeekRange(){
  const now = new Date();
  const day = now.getDay();
  const diffToMonday = (day===0 ? 6 : day-1);
  const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate()-diffToMonday);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate()+6);
  return { from: toDateInputValue(monday), to: toDateInputValue(sunday) };
}

function getWeekStart(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d.getTime())) return null;
  const day = d.getDay();
  const diffToMonday = (day===0 ? 6 : day-1);
  const monday = new Date(d);
  monday.setDate(d.getDate() - diffToMonday);
  monday.setHours(0,0,0,0);
  return monday;
}
function formatWeekLabel(monday){
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const startStr = monday.toLocaleDateString(undefined, {month:'short', day:'numeric'});
  const endStr = sunday.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
  return `Week of ${startStr} – ${endStr}`;
}
function renderWeekGroupedEvents(events, descending, showRegion){
  if(showRegion === undefined) showRegion = true;
  const groups = new Map();
  const noDate = [];
  events.forEach(ev=>{
    const monday = getWeekStart(ev.startDate);
    if(!monday){ noDate.push(ev); return; }
    const key = monday.getTime();
    if(!groups.has(key)) groups.set(key, {monday, events:[]});
    groups.get(key).events.push(ev);
  });
  const keys = Array.from(groups.keys()).sort((a,b)=> descending ? b-a : a-b);
  let html = keys.map(key=>{
    const g = groups.get(key);
    return `<div class="week-group">
      <div class="week-group-header">${formatWeekLabel(g.monday)}<span class="week-group-count">${g.events.length} event${g.events.length===1?'':'s'}</span></div>
      <div class="event-list">${g.events.map(ev=>renderEventCard(ev, showRegion)).join('')}</div>
    </div>`;
  }).join('');
  if(noDate.length>0){
    html += `<div class="week-group">
      <div class="week-group-header">No Start Date<span class="week-group-count">${noDate.length} event${noDate.length===1?'':'s'}</span></div>
      <div class="event-list">${noDate.map(ev=>renderEventCard(ev, showRegion)).join('')}</div>
    </div>`;
  }
  return html;
}
