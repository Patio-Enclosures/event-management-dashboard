// Reads the current form field values directly from the DOM (not state.draft, so it works
// mid-edit without needing a full re-render) and refreshes every piece of conditional
// formatting in the Pre-Approval Checklist / Financials sections.
function refreshLiveFormValidation(){
  const g = id => document.getElementById(id);
  const val = id => g(id) ? g(id).value : '';
  if(!g('f_eventName')) return; // panel isn't open

  const live = {
    verifiedServiceArea: val('f_verifiedServiceArea'),
    confirmedAcceptance: val('f_confirmedAcceptance'),
    supervisorEmail: val('f_supervisorEmail'),
    submissionType: val('f_submissionType'),
    historicalShowCode: val('f_historicalShowCode'),
    priorityLevel: val('f_priorityLevel'),
    organizer: val('f_organizer'),
    venueName: val('f_venueName'),
    venueStreet: val('f_venueStreet'),
    venueCity: val('f_venueCity'),
    venueState: val('f_venueState'),
    venueAddress: state.draft ? state.draft.venueAddress : '',
    registrationLink: val('f_registrationLink'),
    contractFileName: state.draft ? state.draft.contractFileName : '',
    paymentDueDate: val('f_paymentDueDate'),
    paymentMethod: val('f_paymentMethod'),
    creditCardLink: val('f_creditCardLink'),
    paymentPhoneNumber: val('f_paymentPhoneNumber'),
    coiRequired: val('f_coiRequired'),
    coiAddress: val('f_coiAddress'),
    thirdPartyPayment: val('f_thirdPartyPayment'),
    thirdPartyName: val('f_thirdPartyName'),
    thirdPartyPhone: val('f_thirdPartyPhone'),
    thirdPartyPaymentInfo: val('f_thirdPartyPaymentInfo')
  };

  // 1. Checklist progress counter
  const missing = getMissingApprovalFields(live);
  const progressEl = g('checklistProgress');
  if(progressEl){
    progressEl.classList.remove('state-red','state-amber','state-green');
    if(missing.length===0){
      progressEl.classList.add('state-green');
      progressEl.textContent = '✓ Ready to submit for approval';
    } else {
      progressEl.classList.add(missing.length>=6 ? 'state-red' : 'state-amber');
      progressEl.textContent = `${missing.length} item${missing.length===1?'':'s'} remaining before approval`;
    }
  }

  // 2. Yes/No compliance highlighting
  if(g('f_verifiedServiceArea')) g('f_verifiedServiceArea').classList.toggle('field-invalid', live.verifiedServiceArea==='no');
  if(g('f_confirmedAcceptance')) g('f_confirmedAcceptance').classList.toggle('field-invalid', live.confirmedAcceptance==='no');

  // 3. Either/or satisfied indicator
  const regNote = g('regOrContractNote');
  if(regNote){
    regNote.innerHTML = (live.registrationLink || live.contractFileName)
      ? `<div class="field-note-ok">✓ Requirement satisfied</div>` : '';
  }

  // 4. Free-text cost field warning
  const ccInput = g('f_contractCost'), mcInput = g('f_miscCosts');
  const ccWarn = ccInput && ccInput.value && !isPlainNumeric(ccInput.value);
  const mcWarn = mcInput && mcInput.value && !isPlainNumeric(mcInput.value);
  if(ccInput) ccInput.classList.toggle('field-warning', !!ccWarn);
  if(mcInput) mcInput.classList.toggle('field-warning', !!mcWarn);
  const costWarnEl = g('costFieldWarning');
  if(costWarnEl){
    costWarnEl.innerHTML = (ccWarn || mcWarn)
      ? `<div class="field-note-warn" style="color:var(--amber);">Non-numeric cost entries (like "TBD") won't count toward Total Costs until replaced with a number.</div>` : '';
  }

  // 5. Date sanity check
  const sd = val('f_startDate'), ed = val('f_endDate');
  const dateBad = !!(sd && ed && ed < sd);
  if(g('f_startDate')) g('f_startDate').classList.toggle('field-invalid', dateBad);
  if(g('f_endDate')) g('f_endDate').classList.toggle('field-invalid', dateBad);
  const dateWarnEl = g('dateSanityWarning');
  if(dateWarnEl){
    dateWarnEl.innerHTML = dateBad ? `<div class="field-note-warn">End Date is before Start Date — double-check these.</div>` : '';
  }

  // 6. Priority color coding
  const prioritySelect = g('f_priorityLevel');
  if(prioritySelect){
    prioritySelect.classList.remove('priority-high','priority-medium','priority-low');
    if(live.priorityLevel) prioritySelect.classList.add('priority-'+live.priorityLevel);
  }

  // 7. Conditional sub-field grouping boxes are static (CSS class always applied); their
  // show/hide is already handled by toggleWrap() elsewhere.
}

function attachHandlers(){
  document.querySelectorAll('[data-region]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const raw = btn.getAttribute('data-region');
      const newRegion = (raw==='overview' || raw==='master') ? raw : parseInt(raw,10);
      const isRegionOrMaster = raw==='master' || raw!=='overview';
      if(isRegionOrMaster && newRegion !== state.activeRegion){
        // Region tabs and All Events always open scoped to the current week onward (no future cutoff)
        const range = getCurrentWeekRange();
        state.filterDateFrom = range.from;
        state.filterDateTo = '';
        state.sortBy = 'startDateAsc';
      }
      state.activeRegion = newRegion;
      state.expandedEventId = null;
      render();
    });
  });

  document.querySelectorAll('[data-goto-region]').forEach(row=>{
    row.addEventListener('click', (e)=>{
      e.stopPropagation();
      state.activeRegion = parseInt(row.getAttribute('data-goto-region'),10);
      state.expandedEventId = null;
      render();
    });
  });

  document.querySelectorAll('[data-toggle-region]').forEach(row=>{
    row.addEventListener('click', ()=>{
      const idx = parseInt(row.getAttribute('data-toggle-region'),10);
      state.expandedOverviewRegion = state.expandedOverviewRegion === idx ? null : idx;
      render();
    });
  });

  document.querySelectorAll('[data-goto-event]').forEach(row=>{
    row.addEventListener('click', ()=>{
      state.activeRegion = parseInt(row.getAttribute('data-goto-event-region'),10);
      state.expandedEventId = row.getAttribute('data-goto-event');
      render();
    });
  });

  const regionInput = document.getElementById('regionNameInput');
  if(regionInput){
    regionInput.addEventListener('change', ()=>{
      renameRegion(state.activeRegion, regionInput.value.trim());
      render();
    });
  }

  const searchInput = document.getElementById('regionSearchInput');
  if(searchInput){
    searchInput.addEventListener('input', ()=>{
      const cursorPos = searchInput.selectionStart;
      state.searchQuery = searchInput.value;
      render();
      const newInput = document.getElementById('regionSearchInput');
      if(newInput){
        newInput.focus();
        newInput.setSelectionRange(cursorPos, cursorPos);
      }
    });
  }
  const clearSearchBtn = document.getElementById('clearSearchBtn');
  if(clearSearchBtn){
    clearSearchBtn.addEventListener('click', ()=>{
      state.searchQuery = '';
      render();
    });
  }
  const sortSelect = document.getElementById('regionSortSelect');
  if(sortSelect){
    sortSelect.addEventListener('change', ()=>{
      state.sortBy = sortSelect.value;
      render();
    });
  }
  const filterBranchSelect = document.getElementById('regionFilterBranch');
  if(filterBranchSelect){
    filterBranchSelect.addEventListener('change', ()=>{
      state.filterBranch = filterBranchSelect.value;
      render();
    });
  }
  const filterRegionSelect = document.getElementById('regionFilterRegion');
  if(filterRegionSelect){
    filterRegionSelect.addEventListener('change', ()=>{
      state.filterRegion = filterRegionSelect.value;
      state.filterBranch = ''; // branch options change with region, so the old selection may no longer apply
      render();
    });
  }
  const filterStatusSelect = document.getElementById('regionFilterStatus');
  if(filterStatusSelect){
    filterStatusSelect.addEventListener('change', ()=>{
      state.filterStatus = filterStatusSelect.value;
      render();
    });
  }
  const filterDateFromInput = document.getElementById('regionFilterDateFrom');
  if(filterDateFromInput){
    filterDateFromInput.addEventListener('change', ()=>{
      state.filterDateFrom = filterDateFromInput.value;
      render();
    });
  }
  const filterDateToInput = document.getElementById('regionFilterDateTo');
  if(filterDateToInput){
    filterDateToInput.addEventListener('change', ()=>{
      state.filterDateTo = filterDateToInput.value;
      render();
    });
  }
  const clearFiltersBtn = document.getElementById('clearFiltersBtn');
  if(clearFiltersBtn){
    clearFiltersBtn.addEventListener('click', ()=>{
      state.filterBranch = '';
      state.filterStatus = '';
      state.filterDateFrom = '';
      state.filterDateTo = '';
      state.filterRegion = '';
      render();
    });
  }

  const userNameInput = document.getElementById('userNameInput');
  const saveUserNameBtn = document.getElementById('saveUserNameBtn');
  if(userNameInput){
    userNameInput.addEventListener('input', ()=>{
      state.userNameDraft = userNameInput.value;
    });
    userNameInput.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' && userNameInput.value.trim()){
        saveUserName(userNameInput.value).then(render);
      }
    });
  }
  if(saveUserNameBtn){
    saveUserNameBtn.addEventListener('click', ()=>{
      const val = userNameInput ? userNameInput.value.trim() : '';
      if(!val){ alert('Please enter a name first.'); return; }
      saveUserName(val).then(render);
    });
  }

  const pendingApprovalBadge = document.getElementById('pendingApprovalBadge');
  if(pendingApprovalBadge){
    pendingApprovalBadge.addEventListener('click', ()=>{
      const goToSection = () => {
        const el = document.getElementById('pendingApprovalSection');
        if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
      };
      state.overviewSectionsOpen.awaitingContract = true;
      if(state.activeRegion === 'overview'){
        render();
        setTimeout(goToSection, 50);
      } else {
        state.activeRegion = 'overview';
        render();
        setTimeout(goToSection, 50);
      }
    });
  }

  document.querySelectorAll('[data-toggle-overview-section]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const key = el.getAttribute('data-toggle-overview-section');
      state.overviewSectionsOpen[key] = !state.overviewSectionsOpen[key];
      render();
    });
  });

  const settingsBtn = document.getElementById('settingsBtn');
  if(settingsBtn){
    settingsBtn.addEventListener('click', ()=>{
      state.settingsOpen = true;
      state.teamsWebhookStatus = '';
      render();
    });
  }
  const closeSettingsBtn = document.getElementById('closeSettingsBtn');
  if(closeSettingsBtn){
    closeSettingsBtn.addEventListener('click', ()=>{
      state.settingsOpen = false;
      render();
    });
  }
  const settingsOverlay = document.getElementById('settingsOverlay');
  if(settingsOverlay){
    settingsOverlay.addEventListener('click', (e)=>{
      if(e.target.id==='settingsOverlay'){
        state.settingsOpen = false;
        render();
      }
    });
  }
  const saveWebhookBtn = document.getElementById('saveWebhookBtn');
  if(saveWebhookBtn){
    saveWebhookBtn.addEventListener('click', async ()=>{
      const input = document.getElementById('f_teamsWebhook');
      const nameInput = document.getElementById('f_teamsAlertName');
      state.teamsWebhookUrl = input ? input.value.trim() : '';
      state.teamsAlertName = (nameInput && nameInput.value.trim()) ? nameInput.value.trim() : 'Regional Events Dashboard';
      try{
        await window.storage.set('teams-webhook-url', state.teamsWebhookUrl, true);
        await window.storage.set('teams-alert-name', state.teamsAlertName, true);
        state.teamsWebhookStatus = 'Saved.';
      }catch(e){
        state.teamsWebhookStatus = 'Could not save — please try again.';
      }
      render();
    });
  }
  const testWebhookBtn = document.getElementById('testWebhookBtn');
  if(testWebhookBtn){
    testWebhookBtn.addEventListener('click', async ()=>{
      const input = document.getElementById('f_teamsWebhook');
      const url = input ? input.value.trim() : '';
      if(!url){
        state.teamsWebhookStatus = 'Enter a webhook URL first.';
        render();
        return;
      }
      state.teamsWebhookStatus = 'Sending test message…';
      render();
      try{
        await fetch(url, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "summary": "Test message",
            "themeColor": "2F7A78",
            "title": "Regional Events Dashboard — Test Message",
            "sections": [{
              "activityTitle": (document.getElementById('f_teamsAlertName')?.value.trim()) || state.teamsAlertName || 'Regional Events Dashboard',
              "text": "If you can see this in Teams, the webhook is working."
            }]
          })
        });
        state.teamsWebhookStatus = 'Test message sent — check the Teams channel now. (Browser CORS rules mean we can\'t confirm delivery here, so if it doesn\'t show up, the tenant is likely blocking direct browser requests.)';
      }catch(e){
        console.error('Teams webhook test failed:', e);
        state.teamsWebhookStatus = `Request failed: "${e.message}". This usually means the browser itself is blocking the outbound call (often a Content Security Policy restriction in this environment), not a bad URL. Open your browser's Developer Console (F12) and try again to see the full error.`;
      }
      render();
    });
  }
  document.querySelectorAll('[data-notify-teams]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const ev = state.events.find(x=>x.id===b.getAttribute('data-notify-teams'));
      notifyTeams(ev);
      alert('Notification sent to Teams (delivery can\'t be confirmed from the browser — check the channel).');
    });
  });

  const addBtn = document.getElementById('addEventBtn');
  if(addBtn) addBtn.addEventListener('click', openAddPanel);

  document.querySelectorAll('[data-toggle]').forEach(row=>{
    row.addEventListener('click', ()=>{
      const id = row.getAttribute('data-toggle');
      state.expandedEventId = state.expandedEventId===id ? null : id;
      render();
    });
  });

  document.querySelectorAll('[data-edit]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const ev = state.events.find(x=>x.id===b.getAttribute('data-edit'));
      openEditPanel(ev);
    });
  });
  document.querySelectorAll('[data-delete]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      deleteEvent(b.getAttribute('data-delete'));
    });
  });
  document.querySelectorAll('[data-decline]').forEach(b=>{
    b.addEventListener('click', (e)=>{ e.stopPropagation(); setDecision(b.getAttribute('data-decline'), STATUS.DECLINED); });
  });
  document.querySelectorAll('[data-execute]').forEach(b=>{
    b.addEventListener('click', (e)=>{ e.stopPropagation(); submitForApproval(b.getAttribute('data-execute')); });
  });
  document.querySelectorAll('[data-research]').forEach(b=>{
    b.addEventListener('click', (e)=>{ e.stopPropagation(); setDecision(b.getAttribute('data-research'), STATUS.RESEARCHING); });
  });
  document.querySelectorAll('[data-deny]').forEach(b=>{
    b.addEventListener('click', (e)=>{ e.stopPropagation(); denyBySupervisor(b.getAttribute('data-deny')); });
  });
  document.querySelectorAll('[data-notpursuing]').forEach(b=>{
    b.addEventListener('click', (e)=>{ e.stopPropagation(); markNotPursuing(b.getAttribute('data-notpursuing')); });
  });
  document.querySelectorAll('[data-submit]').forEach(b=>{
    b.addEventListener('click', (e)=>{ e.stopPropagation(); submitContract(b.getAttribute('data-submit')); });
  });
  document.querySelectorAll('[data-redownload]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const ev = state.events.find(x=>x.id===b.getAttribute('data-redownload'));
      downloadContractSummary(ev);
    });
  });
  document.querySelectorAll('[data-regen]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const ev = state.events.find(x=>x.id===b.getAttribute('data-regen'));
      generateApprovalPDF(ev);
    });
  });
  document.querySelectorAll('[data-email-supervisor]').forEach(b=>{
    b.addEventListener('click', (e)=>{
      e.stopPropagation();
      const ev = state.events.find(x=>x.id===b.getAttribute('data-email-supervisor'));
      generateApprovalEmail(ev);
    });
  });

  const overlay = document.getElementById('overlay');
  if(overlay){
    overlay.addEventListener('click', (e)=>{
      if(e.target.id==='overlay') closePanel();
    });
  }
  const closeBtn = document.getElementById('closePanelBtn');
  if(closeBtn) closeBtn.addEventListener('click', closePanel);
  const cancelBtn = document.getElementById('cancelPanelBtn');
  if(cancelBtn) cancelBtn.addEventListener('click', closePanel);
  const saveBtn = document.getElementById('savePanelBtn');
  if(saveBtn) saveBtn.addEventListener('click', ()=>{ readDraftFromForm(); saveDraft(); });

  const regionSelect = document.getElementById('f_region');
  if(regionSelect){
    regionSelect.addEventListener('change', ()=>{
      const branchSelect = document.getElementById('f_branch');
      if(branchSelect){
        branchSelect.innerHTML = renderBranchOptions(parseInt(regionSelect.value,10), '');
      }
    });
  }

  // conditional pre-approval checklist fields
  const toggleWrap = (wrapId, show) => {
    const el = document.getElementById(wrapId);
    if(el) el.style.display = show ? '' : 'none';
  };
  const submissionTypeSelect = document.getElementById('f_submissionType');
  if(submissionTypeSelect){
    submissionTypeSelect.addEventListener('change', ()=>{
      toggleWrap('wrap_historicalShowCode', submissionTypeSelect.value === 'renewal');
    });
  }
  const coiSelect = document.getElementById('f_coiRequired');
  if(coiSelect){
    coiSelect.addEventListener('change', ()=>{
      toggleWrap('wrap_coiAddress', coiSelect.value === 'yes');
    });
  }
  const thirdPartySelect = document.getElementById('f_thirdPartyPayment');
  if(thirdPartySelect){
    thirdPartySelect.addEventListener('change', ()=>{
      toggleWrap('wrap_thirdPartyDetails', thirdPartySelect.value === 'yes');
    });
  }
  const paymentMethodSelect = document.getElementById('f_paymentMethod');
  if(paymentMethodSelect){
    paymentMethodSelect.addEventListener('change', ()=>{
      toggleWrap('wrap_creditCardLink', paymentMethodSelect.value === 'credit_card');
      toggleWrap('wrap_paymentPhone', paymentMethodSelect.value === 'phone_payment');
    });
  }
  const openMapViewerBtn = document.getElementById('openMapViewerBtn');
  if(openMapViewerBtn){
    openMapViewerBtn.addEventListener('click', ()=>{
      window.open('https://www.mapbusinessonline.com/Viewer.aspx/bb28373f-2608-42e4-b4e9-92821dae27f9', '_blank', 'noopener');
    });
  }
  const zipInputForMapHint = document.getElementById('f_zip');
  const mapViewerZipHint = document.getElementById('mapViewerZipHint');
  if(zipInputForMapHint && mapViewerZipHint){
    zipInputForMapHint.addEventListener('input', ()=>{
      mapViewerZipHint.textContent = zipInputForMapHint.value.trim() || '— enter a zip above first';
    });
  }

  const panelBodyEl = document.querySelector('#panelStop .panel-body');
  if(panelBodyEl){
    panelBodyEl.addEventListener('input', refreshLiveFormValidation);
    panelBodyEl.addEventListener('change', refreshLiveFormValidation);
  }

  const paymentPhoneInput = document.getElementById('f_paymentPhoneNumber');
  if(paymentPhoneInput){
    paymentPhoneInput.addEventListener('input', ()=>{
      // Only digits, spaces, parentheses, dashes, and a leading + are allowed
      const cursorPos = paymentPhoneInput.selectionStart;
      const before = paymentPhoneInput.value;
      const cleaned = before.replace(/[^\d\s()+-]/g, '');
      if(cleaned !== before){
        paymentPhoneInput.value = cleaned;
        const diff = before.length - cleaned.length;
        paymentPhoneInput.setSelectionRange(cursorPos-diff, cursorPos-diff);
      }
    });
  }

  const MAX_ATTACHMENT_BYTES = 1.5 * 1024 * 1024; // 1.5MB raw -- all events share one 5MB storage bucket
  const contractFileInput = document.getElementById('f_contractFile');
  if(contractFileInput){
    contractFileInput.addEventListener('change', ()=>{
      const file = contractFileInput.files && contractFileInput.files[0];
      if(!file) return;
      if(file.size > MAX_ATTACHMENT_BYTES){
        alert(`"${file.name}" is ${(file.size/1024/1024).toFixed(1)}MB, which is over the 4MB limit for an emailed attachment. Please choose a smaller file.`);
        contractFileInput.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result; // "data:<mime>;base64,<data>"
        const commaIdx = dataUrl.indexOf(',');
        readDraftFromForm(); // preserve any other in-progress field edits before re-rendering
        state.draft.contractFileName = file.name;
        state.draft.contractFileType = file.type || 'application/octet-stream';
        state.draft.contractFileData = dataUrl.slice(commaIdx + 1);
        render();
      };
      reader.onerror = () => {
        alert('Could not read that file. Please try again.');
      };
      reader.readAsDataURL(file);
    });
  }
  const removeContractFileLink = document.getElementById('removeContractFile');
  if(removeContractFileLink){
    removeContractFileLink.addEventListener('click', (e)=>{
      e.preventDefault();
      readDraftFromForm();
      state.draft.contractFileName = '';
      state.draft.contractFileType = '';
      state.draft.contractFileData = '';
      render();
    });
  }

  // live-update computed breakdown
  ['f_contractCost','f_laborHours','f_mileage','f_hotelNights','f_miscCosts','f_forecastedOpps'].forEach(id=>{
    const el = document.getElementById(id);
    if(el){
      el.addEventListener('input', ()=>{
        const g = x => num(document.getElementById(x)?.value);
        const draftLike = {
          contractCost: g('f_contractCost'),
          laborHours: g('f_laborHours'),
          mileage: g('f_mileage'),
          hotelNights: g('f_hotelNights'),
          miscCosts: g('f_miscCosts'),
          forecastedOpps: g('f_forecastedOpps')
        };
        const setText = (id,v)=>{ const out=document.getElementById(id); if(out) out.textContent = money(v); };
        setText('calc_labor', laborDollars(draftLike));
        setText('calc_mileage', mileageDollars(draftLike));
        setText('calc_hotel', hotelDollars(draftLike));
        setText('calc_perdiem', perDiemDollars(draftLike));
        setText('calc_misc', draftLike.miscCosts);
        setText('computedTotal', totalCost(draftLike));
        const cpoOut = document.getElementById('calc_cpo');
        if(cpoOut) cpoOut.textContent = costPerOppDisplay(draftLike);
      });
    }
  });
}

loadData();
</script>
</body>
</html>
