function renderOverview(allEvents){
  const byStatus = {researching:[],execute:[],declined:[],submitted:[],not_pursuing:[]};
  allEvents.forEach(e=> byStatus[e.status].push(e));

  const submittedValue = byStatus.submitted.reduce((s,e)=>s+totalCost(e),0);
  const pipelineValue = allEvents.filter(e=>e.status!==STATUS.DECLINED && e.status!==STATUS.NOT_PURSUING).reduce((s,e)=>s+totalCost(e),0);

  const kpiHtml = `
    <div class="kpi-grid">
      <div class="kpi-card hero">
        <div class="kpi-label">💰 Est. Pipeline Value</div>
        <div class="kpi-value">${money(pipelineValue)}</div>
        <div class="kpi-sub">Excludes declined &amp; not-pursuing events</div>
      </div>
      <div class="kpi-card total">
        <div class="kpi-label">📁 Total Events</div>
        <div class="kpi-value">${allEvents.length}</div>
        <div class="kpi-sub">Across ${state.regionNames.length} regions</div>
      </div>
      <div class="kpi-card researching">
        <div class="kpi-label">🔎 Researching</div>
        <div class="kpi-value">${byStatus.researching.length}</div>
        <div class="kpi-sub">Awaiting determination</div>
      </div>
      <div class="kpi-card execute">
        <div class="kpi-label">📨 Approved</div>
        <div class="kpi-value">${byStatus.execute.length}</div>
        <div class="kpi-sub">Awaiting contract submission</div>
      </div>
      <div class="kpi-card submitted">
        <div class="kpi-label">✅ Submitted</div>
        <div class="kpi-value">${byStatus.submitted.length}</div>
        <div class="kpi-sub">${money(submittedValue)} contracted</div>
      </div>
      <div class="kpi-card declined">
        <div class="kpi-label">✕ Declined</div>
        <div class="kpi-value">${byStatus.declined.length}</div>
        <div class="kpi-sub">Not moving forward</div>
      </div>
      <div class="kpi-card not_pursuing">
        <div class="kpi-label">– Not Pursuing</div>
        <div class="kpi-value">${byStatus.not_pursuing.length}</div>
        <div class="kpi-sub">Decided not to pursue</div>
      </div>
    </div>
  `;

  // Per-region rollup, sorted by total value desc -- scoped to the selected month/quarter period
  const periodFilteredEvents = allEvents.filter(ev => eventMatchesPeriod(ev, state.regionSummaryPeriodType, state.regionSummaryPeriod));
  const regionRollups = state.regionNames.map((name, idx)=>{
    const evs = periodFilteredEvents.filter(e=>e.region===idx);
    const total = evs.reduce((s,e)=>s+totalCost(e),0);
    const counts = {
      researching: evs.filter(e=>e.status===STATUS.RESEARCHING).length,
      execute: evs.filter(e=>e.status===STATUS.EXECUTE).length,
      submitted: evs.filter(e=>e.status===STATUS.SUBMITTED).length,
      declined: evs.filter(e=>e.status===STATUS.DECLINED).length,
      notPursuing: evs.filter(e=>e.status===STATUS.NOT_PURSUING).length
    };
    const pipelineTotal = evs.filter(e=>e.status!==STATUS.DECLINED && e.status!==STATUS.NOT_PURSUING).reduce((s,e)=>s+totalCost(e),0);
    return {idx, name, total, count:evs.length, counts, pipelineTotal};
  }).sort((a,b)=>b.total-a.total);

  // Full per-region breakdown table -- same stats as the top KPIs, split out per region,
  // with a click-to-expand branch-level breakdown underneath each region row.
  function branchRollupForRegion(regionIdx){
    const evs = periodFilteredEvents.filter(e=>e.region===regionIdx);
    const groups = {};
    evs.forEach(e=>{
      const key = (e.branch && e.branch.trim()) ? e.branch.trim() : '(No branch assigned)';
      if(!groups[key]){
        groups[key] = {branch:key, count:0, researching:0, execute:0, submitted:0, declined:0, notPursuing:0, pipelineTotal:0};
      }
      const g = groups[key];
      g.count++;
      if(e.status===STATUS.RESEARCHING) g.researching++;
      else if(e.status===STATUS.EXECUTE) g.execute++;
      else if(e.status===STATUS.SUBMITTED) g.submitted++;
      else if(e.status===STATUS.DECLINED) g.declined++;
      else if(e.status===STATUS.NOT_PURSUING) g.notPursuing++;
      if(e.status!==STATUS.DECLINED && e.status!==STATUS.NOT_PURSUING) g.pipelineTotal += totalCost(e);
    });
    return Object.values(groups).sort((a,b)=>b.pipelineTotal-a.pipelineTotal);
  }

  function mixBarHtml(counts, total){
    if(!total) return `<div class="mix-bar"></div>`;
    const closed = counts.declined + counts.notPursuing;
    const segs = [
      ['researching', counts.researching],
      ['execute', counts.execute],
      ['submitted', counts.submitted],
      ['declined', closed]
    ];
    return `<div class="mix-bar">` + segs.map(([cls,n])=> n>0 ? `<div class="mix-seg ${cls}" style="width:${(n/total*100).toFixed(1)}%;"></div>` : '').join('') + `</div>`;
  }

  const regionTableHtml = `
    <div class="region-table-wrap">
      <table class="region-table">
        <thead>
          <tr>
            <th style="text-align:left;">Region</th>
            <th style="text-align:left;">Mix</th>
            <th>Total</th>
            <th>Researching</th>
            <th>Approved</th>
            <th>Submitted</th>
            <th>Declined</th>
            <th>Not Pursuing</th>
            <th>Pipeline Value</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${regionRollups.map(r=>{
            const isOpen = state.expandedOverviewRegion === r.idx;
            const rowHtml = `
              <tr data-toggle-region="${r.idx}">
                <td class="region-table-name">
                  <span class="region-table-chevron ${isOpen?'open':''}">▶</span><span class="region-tab-dot" style="background:${regionColor(r.idx)};margin-right:6px;"></span>${escapeHtml(r.name)}
                </td>
                <td style="text-align:left;">${mixBarHtml(r.counts, r.count)}</td>
                <td>${r.count}</td>
                <td>${r.counts.researching}</td>
                <td>${r.counts.execute}</td>
                <td>${r.counts.submitted}</td>
                <td>${r.counts.declined}</td>
                <td>${r.counts.notPursuing}</td>
                <td class="region-table-value">${money(r.pipelineTotal)}</td>
                <td><button class="btn btn-outline btn-sm" data-goto-region="${r.idx}">Open →</button></td>
              </tr>`;
            let subRowsHtml = '';
            if(isOpen){
              const branches = branchRollupForRegion(r.idx);
              if(branches.length===0){
                subRowsHtml = `<tr class="region-table-subrow"><td colspan="10" style="text-align:center;color:var(--ink-faint);">No events in this region yet.</td></tr>`;
              } else {
                subRowsHtml = branches.map(b=>`
                  <tr class="region-table-subrow">
                    <td class="region-table-name" style="padding-left:32px;font-weight:400;color:var(--ink-soft);">${escapeHtml(b.branch)}</td>
                    <td style="text-align:left;">${mixBarHtml({researching:b.researching,execute:b.execute,submitted:b.submitted,declined:b.declined,notPursuing:b.notPursuing}, b.count)}</td>
                    <td>${b.count}</td>
                    <td>${b.researching}</td>
                    <td>${b.execute}</td>
                    <td>${b.submitted}</td>
                    <td>${b.declined}</td>
                    <td>${b.notPursuing}</td>
                    <td class="region-table-value">${money(b.pipelineTotal)}</td>
                    <td></td>
                  </tr>
                `).join('');
              }
            }
            return rowHtml + subRowsHtml;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Events needing a decision (status = researching) with a start date in the next 45 days,
  // soonest first. Undated or out-of-window events are counted but not listed here.
  const DECISION_WINDOW_DAYS = 45;
  const now = new Date();
  const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const windowEnd = new Date(todayMidnight);
  windowEnd.setDate(windowEnd.getDate() + DECISION_WINDOW_DAYS);

  function isWithinDecisionWindow(dateStr){
    if(!dateStr) return false;
    const d = new Date(dateStr + 'T00:00:00');
    if(isNaN(d.getTime())) return false;
    return d >= todayMidnight && d <= windowEnd;
  }

  const allResearching = allEvents.filter(e=>e.status===STATUS.RESEARCHING);
  const needsDecision = allResearching
    .filter(e=>isWithinDecisionWindow(e.startDate))
    .sort((a,b)=> (a.startDate||'9999').localeCompare(b.startDate||'9999'));
  const excludedCount = allResearching.length - needsDecision.length;

  const needsDecisionHtml = needsDecision.length===0
    ? `<div class="empty" style="padding:28px;"><div class="empty-title" style="font-size:16px;">Nothing awaiting a decision in the next ${DECISION_WINDOW_DAYS} days</div><div>${excludedCount>0 ? `${excludedCount} researching event${excludedCount===1?'':'s'} ${excludedCount===1?'has':'have'} no date or falls outside this window.` : 'Every logged event has been approved, declined, or submitted.'}</div></div>`
    : `<div class="needs-decision-list">` + needsDecision.map(ev=>`
        <div class="needs-decision-row" data-goto-event="${ev.id}" data-goto-event-region="${ev.region}">
          <div class="needs-decision-main">
            <div class="needs-decision-name">${escapeHtml(ev.eventName)}</div>
            <div class="needs-decision-meta">${escapeHtml(state.regionNames[ev.region])} · ${escapeHtml(ev.startDate)||'No start date'} · Est. ${money(totalCost(ev))}</div>
          </div>
          ${relativeTimeBadgeHtml(ev.startDate)}
          <span class="badge researching">${STATUS_LABEL.researching}</span>
        </div>
      `).join('') + `</div>`;

  const awaitingContract = allEvents
    .filter(e=>e.status===STATUS.EXECUTE)
    .sort((a,b)=> (a.startDate||'9999').localeCompare(b.startDate||'9999'));

  const awaitingContractHtml = awaitingContract.length===0
    ? `<div class="empty" style="padding:28px;"><div class="empty-title" style="font-size:16px;">Nothing awaiting contract processing</div><div>Events show up here once they clear the pre-approval checklist and are Submitted for Approval.</div></div>`
    : `<div class="needs-decision-list">` + awaitingContract.map(ev=>{
        const missing = getMissingFields(ev);
        return `
        <div class="needs-decision-row" data-goto-event="${ev.id}" data-goto-event-region="${ev.region}" style="border-left-color:var(--blue);">
          <div class="needs-decision-main">
            <div class="needs-decision-name">${escapeHtml(ev.eventName)}</div>
            <div class="needs-decision-meta">${escapeHtml(state.regionNames[ev.region])} · ${escapeHtml(ev.startDate)||'No start date'} · Est. ${money(totalCost(ev))}${missing.length>0 ? ` · <span style="color:var(--red);">${missing.length} field${missing.length===1?'':'s'} missing</span>` : ''}</div>
          </div>
          ${relativeTimeBadgeHtml(ev.startDate)}
          <span class="badge execute">${STATUS_LABEL.execute}</span>
        </div>
      `;}).join('') + `</div>`;

  const STALE_SEVERITY = { event_passed: 0, cutoff_passed: 1, cutoff_soon: 2, missing_date: 3 };
  const staleResearch = allResearching
    .map(ev=>({ ev, flag: getStalenessFlag(ev) }))
    .filter(x=>x.flag)
    .sort((a,b)=> STALE_SEVERITY[a.flag]-STALE_SEVERITY[b.flag] || (a.ev.startDate||'9999').localeCompare(b.ev.startDate||'9999'));

  const staleResearchHtml = staleResearch.length===0
    ? `<div class="empty" style="padding:28px;"><div class="empty-title" style="font-size:16px;">Nothing stale</div><div>Every researching event has a start date, a valid submission window, and hasn't already happened.</div></div>`
    : `<div class="needs-decision-list">` + staleResearch.map(({ev,flag})=>{
        const railColor = flag==='event_passed' ? 'var(--red)' : flag==='cutoff_passed' ? 'var(--amber)' : flag==='cutoff_soon' ? 'var(--blue)' : 'var(--slate)';
        return `
        <div class="needs-decision-row" style="border-left-color:${railColor};">
          <div class="needs-decision-main" data-goto-event="${ev.id}" data-goto-event-region="${ev.region}" style="cursor:pointer;">
            <div class="needs-decision-name">${escapeHtml(ev.eventName)}</div>
            <div class="needs-decision-meta">${escapeHtml(state.regionNames[ev.region])} · ${escapeHtml(ev.startDate)||'No start date'} · Est. ${money(totalCost(ev))}</div>
          </div>
          <span class="badge stale-${flag}">⚠ ${STALENESS_LABEL[flag]}</span>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" data-stale-edit="${ev.id}" data-stale-edit-region="${ev.region}">Edit</button>
            <button class="btn btn-outline btn-sm" data-notpursuing="${ev.id}">Not Pursuing</button>
          </div>
        </div>
      `;}).join('') + `</div>`;
  const eventPassedCount = staleResearch.filter(x=>x.flag==='event_passed').length;

  function sectionHeader(key, title, anchorId, icon){
    const isOpen = state.overviewSectionsOpen[key];
    return `<div class="overview-section-title collapsible-section-title" data-toggle-overview-section="${key}" ${anchorId?`id="${anchorId}"`:''}>
      <span class="section-chevron ${isOpen?'open':''}">▶</span> ${icon?icon+' ':''}${title}
    </div>`;
  }

  const availablePeriods = getAvailablePeriods(allEvents, state.regionSummaryPeriodType);
  const periodFilterHtml = `
    <div class="search-sort-bar" style="margin:-2px 0 10px 0;">
      <select id="regionSummaryPeriodType">
        <option value="all" ${state.regionSummaryPeriodType==='all'?'selected':''}>All Time</option>
        <option value="month" ${state.regionSummaryPeriodType==='month'?'selected':''}>Monthly</option>
        <option value="quarter" ${state.regionSummaryPeriodType==='quarter'?'selected':''}>Quarterly</option>
      </select>
      ${state.regionSummaryPeriodType!=='all' ? `
      <select id="regionSummaryPeriod">
        <option value="">Select a ${state.regionSummaryPeriodType}…</option>
        ${availablePeriods.map(p=>`<option value="${p}" ${state.regionSummaryPeriod===p?'selected':''}>${state.regionSummaryPeriodType==='month'?monthKeyLabel(p):p}</option>`).join('')}
      </select>` : ''}
      <span class="search-result-count">${periodFilteredEvents.length} of ${allEvents.length} events in view</span>
    </div>
  `;

  const actionStripHtml = `
    <div class="action-strip">
      ${awaitingContract.length>0 ? `<div class="action-pill urgent" data-action-pill="pendingApprovalSection" data-action-open="awaitingContract"><span class="dot"></span> ${awaitingContract.length} Pending Approval</div>` : ''}
      ${needsDecision.length>0 ? `<div class="action-pill warn" data-action-pill="needsDecisionSection" data-action-open="needsDecision"><span class="dot"></span> ${needsDecision.length} Need a Decision</div>` : ''}
      ${staleResearch.length>0 ? `<div class="action-pill info" data-action-pill="staleResearchSection" data-action-open="staleResearch"><span class="dot"></span> ${staleResearch.length} Stale Research</div>` : ''}
    </div>
  `;

  // Year-over-year rollup, grouped by each event's Start Date year (events with no date are
  // excluded, since they can't be placed on a timeline). Sorted most recent year first.
  const yearGroups = {};
  allEvents.forEach(ev=>{
    if(!ev.startDate) return;
    const year = ev.startDate.slice(0,4);
    if(!/^\d{4}$/.test(year)) return;
    if(!yearGroups[year]) yearGroups[year] = { year, count:0, submittedCount:0, submittedValue:0, pipelineValue:0 };
    const g = yearGroups[year];
    g.count++;
    if(ev.status===STATUS.SUBMITTED){ g.submittedCount++; g.submittedValue += totalCost(ev); }
    if(ev.status!==STATUS.DECLINED && ev.status!==STATUS.NOT_PURSUING) g.pipelineValue += totalCost(ev);
  });
  const yearRollups = Object.values(yearGroups).sort((a,b)=> b.year.localeCompare(a.year));
  const maxSubmittedValue = Math.max(1, ...yearRollups.map(g=>g.submittedValue));

  const yearTrendsHtml = yearRollups.length===0
    ? `<div class="empty" style="padding:24px;"><div class="empty-title" style="font-size:15px;">Not enough dated events yet</div><div>Once events have start dates spanning more than one year, a year-over-year comparison will show up here.</div></div>`
    : `<div class="region-table-wrap" style="padding:16px 18px;">` + yearRollups.map(g=>`
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;font-family:var(--font-mono);font-size:12px;">
            <span style="font-weight:700;color:var(--ink);">${escapeHtml(g.year)}</span>
            <span style="color:var(--ink-faint);">${g.count} event${g.count===1?'':'s'} · ${g.submittedCount} submitted · ${money(g.submittedValue)} contracted</span>
          </div>
          <div style="height:10px;background:var(--bg);border-radius:5px;overflow:hidden;">
            <div style="height:100%;width:${(g.submittedValue/maxSubmittedValue*100).toFixed(1)}%;background:var(--green);border-radius:5px;"></div>
          </div>
        </div>
      `).join('') + `</div>`;

  return `
    ${kpiHtml}
    ${actionStripHtml}
    <div class="overview-layout">
      <div>
        ${sectionHeader('regionSummary', 'Full Summary by Region', null, '📊')}
        ${state.overviewSectionsOpen.regionSummary ? `
          <div class="hint" style="margin:-6px 0 10px 2px;">Click a region to see its branch-level breakdown.</div>
          ${periodFilterHtml}
          ${regionTableHtml}
        ` : ''}

        ${sectionHeader('yearTrends', 'Year-Over-Year Trends', null, '📈')}
        ${state.overviewSectionsOpen.yearTrends ? `
          <div class="hint" style="margin:-6px 0 10px 2px;">Submitted contract value by year, grouped by each event's start date.</div>
          ${yearTrendsHtml}
        ` : ''}

        ${sectionHeader('activity', 'Recent Activity', null, '📋')}
        ${state.overviewSectionsOpen.activity ? renderActivityFeed(20) : ''}
      </div>

      <div>
        ${sectionHeader('awaitingContract', `Awaiting Contract Processing — Submitted for Approval (${awaitingContract.length})`, 'pendingApprovalSection', '📨')}
        ${state.overviewSectionsOpen.awaitingContract ? awaitingContractHtml : ''}

        ${sectionHeader('needsDecision', `Needs a Decision — next ${DECISION_WINDOW_DAYS} days (${needsDecision.length})`, 'needsDecisionSection', '⏰')}
        ${state.overviewSectionsOpen.needsDecision ? `
          ${needsDecisionHtml}
          ${excludedCount>0 && needsDecision.length>0 ? `<div class="hint" style="margin:8px 0 0 2px;">${excludedCount} more researching event${excludedCount===1?'':'s'} not shown — no date set or starting beyond ${DECISION_WINDOW_DAYS} days out.</div>` : ''}
        ` : ''}

        ${sectionHeader('staleResearch', `Stale Research — Needs Attention (${staleResearch.length})`, 'staleResearchSection', '⚠️')}
        ${state.overviewSectionsOpen.staleResearch ? `
          <div class="hint" style="margin:-6px 0 10px 2px;">Researching events with no start date, a passed submission cutoff, or a start date already behind us. Use Not Pursuing or Edit right here to clear these out.</div>
          ${eventPassedCount>0 ? `<div style="margin-bottom:10px;"><button class="btn btn-red btn-sm" id="bulkCleanupEventPassed">🧹 Mark all ${eventPassedCount} "Event Date Passed" as Not Pursuing</button></div>` : ''}
          ${staleResearchHtml}
        ` : ''}
      </div>
    </div>
  `;
}

// Groups events into Monday-Sunday weeks by Start Date, for the master cross-region view.
function toDateInputValue(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function getCurrentWeekRange(){
  const now = new Date();
  const day = now.getDay();
  const diffToMonday = (day===0 ? 6 : day-1);
  const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate()-diffToMonday);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate()+6);
  return { from: toDateInputValue(monday), to: toDateInputValue(sunday) };
}

function getWeekStart(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d.getTime())) return null;
  const day = d.getDay();
  const diffToMonday = (day===0 ? 6 : day-1);
  const monday = new Date(d);
  monday.setDate(d.getDate() - diffToMonday);
  monday.setHours(0,0,0,0);
  return monday;
}
function formatWeekLabel(monday){
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const startStr = monday.toLocaleDateString(undefined, {month:'short', day:'numeric'});
  const endStr = sunday.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
  return `Week of ${startStr} – ${endStr}`;
}
function renderWeekGroupedEvents(events, descending, showRegion){
  if(showRegion === undefined) showRegion = true;
  const groups = new Map();
  const noDate = [];
  events.forEach(ev=>{
    const monday = getWeekStart(ev.startDate);
    if(!monday){ noDate.push(ev); return; }
    const key = monday.getTime();
    if(!groups.has(key)) groups.set(key, {monday, events:[]});
    groups.get(key).events.push(ev);
  });
  const keys = Array.from(groups.keys()).sort((a,b)=> descending ? b-a : a-b);
  let html = keys.map(key=>{
    const g = groups.get(key);
    return `<div class="week-group">
      <div class="week-group-header">${formatWeekLabel(g.monday)}<span class="week-group-count">${g.events.length} event${g.events.length===1?'':'s'}</span></div>
      <div class="event-list">${g.events.map(ev=>renderEventCard(ev, showRegion)).join('')}</div>
    </div>`;
  }).join('');
  if(noDate.length>0){
    html += `<div class="week-group">
      <div class="week-group-header">No Start Date<span class="week-group-count">${noDate.length} event${noDate.length===1?'':'s'}</span></div>
      <div class="event-list">${noDate.map(ev=>renderEventCard(ev, showRegion)).join('')}</div>
    </div>`;
  }
  return html;
}

function renderEventDetail(ev){
  const region = state.regionNames[ev.region];
  const item = (label, value, isEmpty)=>`<div class="detail-item"><span class="detail-label">${label}</span><span class="detail-value ${isEmpty?'empty-val':''}">${value}</span></div>`;
  const val = (v)=> v ? escapeHtml(v) : '—';
  const isEmptyV = (v)=> !v;

  let decisionButtons = '';
  if(ev.status===STATUS.RESEARCHING){
    const missingApproval = getMissingApprovalFields(ev);
    if(missingApproval.length===0){
      decisionButtons = `
        <div class="decision-note">Determination pending — decide whether to proceed.</div>
        <div class="decision-bar-actions">
          <button class="btn btn-outline btn-sm" data-notpursuing="${ev.id}">Not Pursuing</button>
          <button class="btn btn-blue btn-sm" data-execute="${ev.id}">Submit for Approval</button>
        </div>`;
    } else {
      decisionButtons = `
        <div class="decision-note" style="color:var(--red);">Missing before approval: ${missingApproval.map(escapeHtml).join(', ')}</div>
        <div class="decision-bar-actions">
          <button class="btn btn-outline btn-sm" data-notpursuing="${ev.id}">Not Pursuing</button>
          <button class="btn btn-outline btn-sm" data-edit="${ev.id}">Complete Checklist</button>
          <button class="btn btn-blue btn-sm" disabled title="Complete the pre-approval checklist before submitting for approval">Submit for Approval</button>
        </div>`;
    }
  } else if(ev.status===STATUS.EXECUTE){
    const missing = getMissingFields(ev);
    const authorized = isAuthorizedApprover();
    if(missing.length===0){
      decisionButtons = `
        <div class="decision-note">Approved — a PDF summary was downloaded. Email and Teams notification are optional, below. Ready to process contract.${!authorized ? ` <span style="color:var(--red);">Only authorized approvers can submit for contract processing — ${state.userName ? `"${escapeHtml(state.userName)}" isn't on that list` : 'set your name first'}.</span>` : ''}</div>
        <div class="decision-bar-actions">
          <button class="btn btn-outline btn-sm" data-research="${ev.id}">Return to Research</button>
          <button class="btn btn-outline btn-sm" data-regen="${ev.id}">Download PDF Again</button>
          <button class="btn btn-outline btn-sm" data-email-supervisor="${ev.id}">Email Supervisor</button>
          ${authorized
            ? `<button class="btn btn-outline btn-sm" data-email-contracting="${ev.id}">📧 Email for Contracting</button>`
            : `<button class="btn btn-outline btn-sm" disabled title="Only authorized approvers can send this">📧 Email for Contracting</button>`}
          ${state.teamsWebhookUrl ? `<button class="btn btn-outline btn-sm" data-notify-teams="${ev.id}">Notify Teams</button>` : ''}
          <button class="btn btn-outline btn-sm" data-notpursuing="${ev.id}">Not Pursuing</button>
          <button class="btn btn-red btn-sm" data-deny="${ev.id}">Denied by Supervisor</button>
          ${authorized
            ? `<button class="btn btn-green btn-sm" data-submit="${ev.id}">Submit for Contract Processing</button>`
            : `<button class="btn btn-green btn-sm" disabled title="Only authorized approvers can submit for contract processing">Submit for Contract Processing</button>`}
        </div>`;
    } else {
      decisionButtons = `
        <div class="decision-note" style="color:var(--red);">Missing before contract submission: ${missing.map(escapeHtml).join(', ')}</div>
        <div class="decision-bar-actions">
          <button class="btn btn-outline btn-sm" data-research="${ev.id}">Return to Research</button>
          <button class="btn btn-outline btn-sm" data-edit="${ev.id}">Complete Event Details</button>
          <button class="btn btn-outline btn-sm" data-notpursuing="${ev.id}">Not Pursuing</button>
          <button class="btn btn-red btn-sm" data-deny="${ev.id}">Denied by Supervisor</button>
          <button class="btn btn-green btn-sm" disabled title="Fill in all fields before submitting for contract processing">Submit for Contract Processing</button>
        </div>`;
    }
  } else if(ev.status===STATUS.DECLINED){
    decisionButtons = `
      <div class="decision-note">${ev.deniedBySupervisor ? `Denied by supervisor${ev.deniedAt ? ' on '+new Date(ev.deniedAt).toLocaleDateString() : ''}.` : 'Declined — not moving forward.'}</div>
      <div class="decision-bar-actions">
        <button class="btn btn-outline btn-sm" data-research="${ev.id}">Reopen for Research</button>
      </div>`;
  } else if(ev.status===STATUS.NOT_PURSUING){
    decisionButtons = `
      <div class="decision-note">Not pursuing${ev.notPursuingAt ? ' — decided on '+new Date(ev.notPursuingAt).toLocaleDateString() : ''}${ev.notPursuingReason ? ` — Reason: ${escapeHtml(ev.notPursuingReason)}` : ''}.</div>
      <div class="decision-bar-actions">
        <button class="btn btn-outline btn-sm" data-research="${ev.id}">Reopen for Research</button>
      </div>`;
  } else if(ev.status===STATUS.SUBMITTED){
    const d = ev.submittedAt ? new Date(ev.submittedAt).toLocaleDateString() : '';
    decisionButtons = `
      <div class="decision-note">Submitted for contract processing${d ? ' on '+d : ''}.</div>
      ${ev.exhibitDaySyncedAt ? `<div class="hint" style="margin:2px 0 8px 2px;">📊 Last synced to Exhibit Day: ${new Date(ev.exhibitDaySyncedAt).toLocaleString()}</div>` : ''}
      <div class="decision-bar-actions">
        <button class="btn btn-outline btn-sm" data-redownload="${ev.id}">Download Summary Again</button>
        <button class="btn btn-outline btn-sm" data-email-contracting="${ev.id}">📧 Email for Contracting Again</button>
        <button class="btn btn-outline btn-sm" data-sync-exhibitday="${ev.id}">📊 ${ev.exhibitDaySyncedAt ? 'Re-sync' : 'Sync'} to Exhibit Day</button>
      </div>`;
  }

  return `
  <div class="event-detail">
    ${isLegacyImportEvent(ev) ? `<div class="hint" style="background:#EDE7F6;color:#6A4C93;padding:8px 12px;border-radius:6px;margin-bottom:14px;font-weight:600;">🗂️ This event came from the original bulk import and hasn't necessarily been reviewed for accuracy — double-check the details, including status, before relying on them.</div>` : ''}
    ${ev.onMasterList ? `<div class="hint" style="background:var(--green-soft);color:var(--green);padding:8px 12px;border-radius:6px;margin-bottom:14px;font-weight:600;">📑 This event matched an entry (by name) in the most recently uploaded master list${ev.masterListCheckedAt ? ' — checked '+new Date(ev.masterListCheckedAt).toLocaleDateString() : ''}.</div>` : ''}
    <div class="detail-grid">
      <div class="detail-section-label">Event Details</div>
      ${item('Region', val(region))}
      ${item('Branch', val(ev.branch), isEmptyV(ev.branch))}
      ${item('Venue Name', val(ev.venueName), isEmptyV(ev.venueName))}
      ${item('Venue Address', val(venueAddressDisplay(ev)), !hasVenueAddress(ev))}
      ${item('Location Zip Code', val(ev.zip), isEmptyV(ev.zip))}
      ${item('Event Organizer Company Name', val(ev.organizer), isEmptyV(ev.organizer))}
      ${item('Website', val(ev.website), isEmptyV(ev.website))}

      <div class="detail-section-label">Financials</div>
      ${item('Contract Cost', moneyOrText(ev.contractCost))}
      ${item('Forecasted Labor Hours', val(ev.laborHours), isEmptyV(ev.laborHours))}
      ${item('Labor Cost (@ $20/hr)', money(laborDollars(ev)))}
      ${item('Forecasted Mileage', mileageDisplay(ev))}
      ${item('Mileage Cost (@ $0.725/mi after 30 free)', money(mileageDollars(ev)))}
      ${item('Hotel Nights', val(ev.hotelNights), isEmptyV(ev.hotelNights))}
      ${item('Hotel Cost (@ $150/night)', money(hotelDollars(ev)))}
      ${item('Per Diem (@ $43/night)', money(perDiemDollars(ev)))}
      ${item('Misc. Costs', moneyOrText(ev.miscCosts))}
      ${item('Total Costs', money(totalCost(ev)))}
      ${item('Target Opps', val(ev.forecastedOpps), isEmptyV(ev.forecastedOpps))}
      ${item('Cost Per Opp', costPerOppDisplayFlagged(ev))}

      <div class="detail-section-label">Contact</div>
      ${item('Name of Contact', val(ev.contactName), isEmptyV(ev.contactName))}
      ${item('Phone', val(ev.contactPhone), isEmptyV(ev.contactPhone))}
      ${item('Email', val(ev.contactEmail), isEmptyV(ev.contactEmail))}

      <div class="detail-section-label">Pre-Approval Checklist</div>
      ${item('Serviceable Area', val(zipCheckDisplayLabel(ev)))}
      ${item('Confirmed Acceptance w/ Promoter', val(ev.confirmedAcceptance==='yes'?'Yes':ev.confirmedAcceptance==='no'?'No':''), isEmptyV(ev.confirmedAcceptance))}
      ${item("Supervisor's Email", val(ev.supervisorEmail), isEmptyV(ev.supervisorEmail))}
      ${item('Priority Level', val(ev.priorityLevel ? ev.priorityLevel.charAt(0).toUpperCase()+ev.priorityLevel.slice(1) : ''), isEmptyV(ev.priorityLevel))}
      ${item('Submission Type', val(ev.submissionType==='new'?'New Show':ev.submissionType==='renewal'?'Show Renewal':''), isEmptyV(ev.submissionType))}
      ${ev.submissionType==='renewal' ? item('Historical Show Code', val(ev.historicalShowCode), isEmptyV(ev.historicalShowCode)) : ''}
      ${item('Show Registration Link', val(ev.registrationLink), isEmptyV(ev.registrationLink))}
      ${ev.contractFileName
          ? `<div class="detail-item"><span class="detail-label">Contract Document</span><span class="detail-value"><a href="data:${escapeHtml(ev.contractFileType||'application/octet-stream')};base64,${ev.contractFileData}" download="${escapeHtml(ev.contractFileName)}" style="color:var(--accent-dark);text-decoration:underline;">${escapeHtml(ev.contractFileName)}</a></span></div>`
          : item('Contract Document', val(''), true)}
      ${item('Payment Due Date', val(ev.paymentDueDate), isEmptyV(ev.paymentDueDate))}
      ${item('Payment Method', val(ev.paymentMethod==='credit_card'?'Credit Card':ev.paymentMethod==='pay_at_gate'?'Pay at the Gate':ev.paymentMethod==='phone_payment'?'Phone Payment':ev.paymentMethod==='check'?'Check (not preferred)':ev.paymentMethod==='other'?'Other':''), isEmptyV(ev.paymentMethod))}
      ${ev.paymentMethod==='credit_card' ? item('Credit Card Payment Link', val(ev.creditCardLink), isEmptyV(ev.creditCardLink)) : ''}
      ${ev.paymentMethod==='phone_payment' ? item('Payment Phone Number', val(ev.paymentPhoneNumber), isEmptyV(ev.paymentPhoneNumber)) : ''}
      ${item('COI Required', val(ev.coiRequired==='yes'?'Yes':ev.coiRequired==='no'?'No':''), isEmptyV(ev.coiRequired))}
      ${ev.coiRequired==='yes' ? item('COI Certificate Holder', val(ev.coiCertificateHolder), isEmptyV(ev.coiCertificateHolder)) : ''}
      ${ev.coiRequired==='yes' ? item('COI Certificate Holder Address', val(coiAddressDisplay(ev)), !hasCoiAddress(ev)) : ''}
      ${item('3rd Party Payment Requests', val(ev.thirdPartyPayment==='yes'?'Yes':ev.thirdPartyPayment==='no'?'No':''), isEmptyV(ev.thirdPartyPayment))}
      ${ev.thirdPartyPayment==='yes' ? item('3rd Party Name', val(ev.thirdPartyName), isEmptyV(ev.thirdPartyName)) : ''}
      ${ev.thirdPartyPayment==='yes' ? item('3rd Party Phone', val(ev.thirdPartyPhone), isEmptyV(ev.thirdPartyPhone)) : ''}
      ${ev.thirdPartyPayment==='yes' ? item('3rd Party Payment Info', val(ev.thirdPartyPaymentInfo), isEmptyV(ev.thirdPartyPaymentInfo)) : ''}
      ${ev.paymentNotes ? `<div class="detail-item" style="grid-column:1/-1;"><span class="detail-label">Payment Notes</span><span class="detail-value">${escapeHtml(ev.paymentNotes)}</span></div>` : ''}
      ${ev.finalNotes ? `<div class="detail-item" style="grid-column:1/-1;"><span class="detail-label">Final Notes</span><span class="detail-value">${escapeHtml(ev.finalNotes)}</span></div>` : ''}

      ${ev.notes ? `<div class="detail-section-label">Research Notes</div><div class="detail-item" style="grid-column:1/-1;"><span class="detail-value">${escapeHtml(ev.notes)}</span></div>` : ''}
    </div>
    ${ev.history && ev.history.length>0 ? `
      <div class="event-history">
        <div class="event-history-title">Activity History</div>
        ${ev.history.slice(0,25).map(h=>`
          <div class="event-history-row">
            <span class="event-history-time">${new Date(h.ts).toLocaleString(undefined,{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}</span>
            <span class="event-history-user">${escapeHtml(h.user)}</span>
            <span class="event-history-action">${escapeHtml(h.action)}${h.details ? ` — ${escapeHtml(h.details)}` : ''}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}
    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;">
      ${ev.status===STATUS.SUBMITTED
        ? `<span class="decision-note" style="margin:0;">Locked — submitted events can't be edited or deleted.</span>`
        : `<button class="btn btn-outline btn-sm" data-edit="${ev.id}">Edit Event</button>`}
      <button class="btn btn-outline btn-sm" data-download-event="${ev.id}">📄 Download / Print PDF</button>
      <button class="btn btn-outline btn-sm" data-duplicate-event="${ev.id}">📅 Duplicate for Next Year</button>
      ${ev.status!==STATUS.SUBMITTED
        ? `<button class="btn btn-red btn-sm" data-delete="${ev.id}" style="margin-left:auto;">Delete</button>`
        : ''}
    </div>
    <div class="decision-bar">${decisionButtons}</div>
  </div>`;
}

function renderNotifyPrompt(){
  const ev = state.events.find(e=>e.id===state.notifyPromptEventId);
  if(!ev) return '';
  return `
  <div class="notify-prompt">
    <div class="notify-prompt-title">Submitted for Approval ✓</div>
    <div class="notify-prompt-body">"<strong>${escapeHtml(ev.eventName)}</strong>" is ready — let your supervisor know?</div>
    <div class="notify-prompt-actions">
      <button class="btn btn-outline btn-sm" id="notifyPromptSkip">Skip</button>
      ${state.teamsWebhookUrl ? `<button class="btn btn-outline btn-sm" id="notifyPromptTeams">Notify Teams</button>` : ''}
      <button class="btn btn-primary btn-sm" id="notifyPromptEmail">Email Supervisor</button>
    </div>
  </div>`;
}

function renderNotPursuingPrompt(){
  const ev = state.events.find(e=>e.id===state.notPursuingPromptEventId);
  if(!ev) return '';
  const isOther = state.notPursuingReasonSelect === 'Other';
  return `
  <div class="notify-prompt">
    <div class="notify-prompt-title">Mark as Not Pursuing</div>
    <div class="notify-prompt-body">"<strong>${escapeHtml(ev.eventName)}</strong>" — this is separate from Declined and can be reopened later. What's the reason?</div>
    <div class="field" style="margin-bottom:${isOther?'10px':'20px'};">
      <label>Reason</label>
      <select id="notPursuingReasonSelect">
        <option value="" ${!state.notPursuingReasonSelect?'selected':''}>Select a reason…</option>
        ${NOT_PURSUING_REASONS.map(r=>`<option value="${escapeHtml(r)}" ${state.notPursuingReasonSelect===r?'selected':''}>${escapeHtml(r)}</option>`).join('')}
      </select>
    </div>
    ${isOther ? `
    <div class="field" style="margin-bottom:20px;">
      <label>Please specify</label>
      <input id="notPursuingReasonOther" value="${escapeHtml(state.notPursuingReasonOther)}" placeholder="Reason..."/>
    </div>` : ''}
    <div class="notify-prompt-actions">
      <button class="btn btn-outline btn-sm" id="notPursuingCancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="notPursuingConfirm">Confirm</button>
    </div>
  </div>`;
}

function renderSettingsPanel(){

  <div class="panel-header">

    <button class="panel-close" id="closeSettingsBtn">✕</button>
  </div>
  <div class="panel-body">
    <div class="field-group">
      <div class="field-group-title">Exhibit Day Custom Fields (one-time setup)</div>
      <div class="hint" style="margin-bottom:10px;">Lists the custom fields configured in your Exhibit Day workspace, including each one's internal field_name (e.g. "custom_123456") needed to sync data directly into it. Click, then check the browser console (press F12, click "Console") for the full list.</div>
      <button class="btn btn-outline btn-sm" id="listExhibitDayFieldsBtn">🔍 List Custom Field Names</button>
      ${state.exhibitDayFieldsStatus ? `<div class="hint" style="margin-top:10px;color:var(--accent-dark);font-weight:600;">${escapeHtml(state.exhibitDayFieldsStatus)}</div>` : ''}
    </div>

    <div class="field-group">
      <div class="field-group-title">Master List Cross-Reference</div>
      <div class="hint" style="margin-bottom:10px;">Upload a master list (.xlsx) to flag which dashboard events also appear on it, matched by Event Name. Re-run this anytime with an updated file — each run replaces the previous results, so events that dropped off the list get un-flagged automatically.</div>
      <input type="file" id="masterListFile" accept=".xlsx"/>
      ${state.masterListStatus ? `<div class="hint" style="margin-top:10px;color:var(--accent-dark);font-weight:600;">${escapeHtml(state.masterListStatus)}</div>` : ''}
    </div>

    <div class="field-group">
      <div class="field-group-title">Approval Access Control</div>
      <div class="hint" style="margin-bottom:10px;">Restrict who can click "Submit for Contract Processing" to specific people, by name. This is a workflow guardrail, not real security — this dashboard has no login system, so it only checks against whatever name someone's typed in for themselves. Leave this empty to let anyone submit (the default).</div>
      <div class="field">
        <label>Authorized Approvers (one name per line)</label>
        <textarea id="f_authorizedApprovers" rows="4" placeholder="Jane Smith&#10;John Doe">${escapeHtml((state.authorizedApprovers||[]).join('\n'))}</textarea>
      </div>
      <div class="hint" style="margin-top:6px;">Matched case-insensitively against the signed-in account's name, or the part of their email before the @ if no display name is set on their Firebase account (e.g. "jane.doe" for jane.doe@company.com).</div>
      ${state.approversStatus ? `<div class="hint" style="margin-top:8px;color:var(--accent-dark);font-weight:600;">${escapeHtml(state.approversStatus)}</div>` : ''}
      <div style="margin-top:10px;">
        <button class="btn btn-primary btn-sm" id="saveApproversBtn">Save Approvers</button>
      </div>
    </div>

    <div class="field-group">
      <div class="field-group-title">Microsoft Teams Webhook</div>
      <div class="hint" style="margin-bottom:10px;">Paste an Incoming Webhook URL from a Teams channel (Channel ⋯ → Connectors → Incoming Webhook). When an event is submitted for approval, a card is posted there automatically — shared across everyone using this dashboard.</div>
      <div class="field">
        <label>Webhook URL</label>
        <input id="f_teamsWebhook" value="${escapeHtml(state.teamsWebhookUrl)}" placeholder="https://yourtenant.webhook.office.com/..."/>
      </div>
      <div class="field">
        <label>Alert Sender Name</label>
        <input id="f_teamsAlertName" value="${escapeHtml(state.teamsAlertName)}" placeholder="Regional Events Dashboard"/>
      </div>
      <div class="hint" style="margin-top:6px;">This name appears as the sender on every card posted to the channel, so it's clear where the alert came from.</div>
      <div class="hint" style="margin-top:6px;">This request is sent directly from your browser. Some tenants block this due to CORS — use "Send Test Message" below to confirm it actually arrives before relying on it. If it's blocked, a Power Automate "When an HTTP request is received" flow works as a reliable substitute for this URL.</div>
      ${state.teamsWebhookStatus ? `<div class="hint" style="margin-top:10px;color:var(--accent-dark);font-weight:600;">${escapeHtml(state.teamsWebhookStatus)}</div>` : ''}
    </div>
  </div>
  <div class="panel-footer">
    <button class="btn btn-outline" id="testWebhookBtn">Send Test Message</button>
    <button class="btn btn-primary" id="saveWebhookBtn">Save</button>
  </div>
  `;
}

function renderPanel(){

      <div class="field">
        <label>Event Name <span style="color:var(--red);">*</span></label>

        </div>

      </div>
      <div class="field">

      </div>
      <div class="field">
        <label>Street</label><input id="f_venueStreet" value="${escapeHtml(d.venueStreet)}" placeholder="123 Main St"/>
      </div>
      <div class="field-row">
        <div class="field"><label>City</label><input id="f_venueCity" value="${escapeHtml(d.venueCity)}" placeholder="Springfield"/></div>

          <label>State</label>
          <select id="f_venueState">
            <option value="" ${!d.venueState?'selected':''}>Select…</option>

        </div>

      <div class="field"><label>Website</label><input id="f_website" value="${escapeHtml(d.website)}" placeholder="https://"/></div>
    </div>

    <div class="field-group">
      <div class="field-group-title">Contact</div>
      <div class="field-row">
        <div class="field"><label>Name of Contact</label><input id="f_contactName" value="${escapeHtml(d.contactName)}"/></div>

      <div class="field"><label>Email</label><input id="f_contactEmail" type="email" value="${escapeHtml(d.contactEmail)}"/></div>

    <div class="field-group">
      <div class="field-group-title">Financials</div>
      <div class="field-row">
        <div class="field"><label>Contract Cost ($)</label><input id="f_contractCost" type="text" class="${(d.contractCost && !isPlainNumeric(d.contractCost))?'field-warning':''}" value="${escapeHtml(d.contractCost)}" placeholder="e.g. 500"/></div>
        <div class="field"><label>Misc. Costs ($)</label><input id="f_miscCosts" type="text" class="${(d.miscCosts && !isPlainNumeric(d.miscCosts))?'field-warning':''}" value="${escapeHtml(d.miscCosts)}" placeholder="e.g. 10"/></div>
      </div>
      <div id="costFieldWarning">${((d.contractCost && !isPlainNumeric(d.contractCost)) || (d.miscCosts && !isPlainNumeric(d.miscCosts))) ? `<div class="field-note-warn" style="color:var(--amber);">Non-numeric cost entries (like "TBD") won't count toward Total Costs until replaced with a number.</div>` : ''}</div>
      <div class="field-row">
        <div class="field"><label>Forecasted Labor Hours</label><input id="f_laborHours" type="text" value="${escapeHtml(d.laborHours)}" placeholder="e.g. 24"/></div>
        <div class="field"><label>Number of Travel Days</label><input id="f_travelDays" type="text" value="${escapeHtml(d.travelDays)}" placeholder="e.g. 3"/></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Miles Per Day</label><input id="f_milesPerDay" type="text" value="${escapeHtml(d.milesPerDay)}" placeholder="e.g. 120"/></div>

    <div class="field-group">

  </div>
  <div class="panel-footer">

}

// Reads the current form field values directly from the DOM (not state.draft, so it works
// mid-edit without needing a full re-render) and refreshes every piece of conditional
// formatting in the Pre-Approval Checklist / Financials sections.
function refreshLiveFormValidation(){
 try{
  const g = id => document.getElementById(id);
  const val = id => g(id) ? g(id).value : '';
  if(!g('f_eventName')) return; // panel isn't open

  const live = {
    confirmedAcceptance: val('f_confirmedAcceptance'),
    supervisorEmail: val('f_supervisorEmail'),
    submissionType: val('f_submissionType'),
    historicalShowCode: val('f_historicalShowCode'),
    priorityLevel: val('f_priorityLevel'),
    organizer: val('f_organizer'),
    venueName: val('f_venueName'),
    venueStreet: val('f_venueStreet'),
    venueCity: val('f_venueCity'),
    venueState: val('f_venueState'),
    venueAddress: state.draft ? state.draft.venueAddress : '',
    registrationLink: val('f_registrationLink'),
    contractFileName: state.draft ? state.draft.contractFileName : '',
    paymentDueDate: val('f_paymentDueDate'),
    paymentMethod: val('f_paymentMethod'),
    creditCardLink: val('f_creditCardLink'),
    paymentPhoneNumber: val('f_paymentPhoneNumber'),
    coiRequired: val('f_coiRequired'),
    coiCertificateHolder: val('f_coiCertificateHolder'),
    coiStreet: val('f_coiStreet'),
    coiCity: val('f_coiCity'),
    coiState: val('f_coiState'),
    coiZip: val('f_coiZip'),
    coiAddress: state.draft ? state.draft.coiAddress : '',
    thirdPartyPayment: val('f_thirdPartyPayment'),
    thirdPartyName: val('f_thirdPartyName'),
    thirdPartyPhone: val('f_thirdPartyPhone'),
    thirdPartyPaymentInfo: val('f_thirdPartyPaymentInfo')
  };

  // 1. Checklist progress counter
  const missing = getMissingApprovalFields(live);
  const progressEl = g('checklistProgress');
  if(progressEl){
    progressEl.classList.remove('state-red','state-amber','state-green');
    if(missing.length===0){
      progressEl.classList.add('state-green');
      progressEl.textContent = '✓ Ready to submit for approval';
    } else {
      progressEl.classList.add(missing.length>=6 ? 'state-red' : 'state-amber');
      progressEl.textContent = `${missing.length} item${missing.length===1?'':'s'} remaining before approval`;
    }
  }

  // 2. Yes/No compliance highlighting
  if(g('f_confirmedAcceptance')) g('f_confirmedAcceptance').classList.toggle('field-invalid', live.confirmedAcceptance==='no');

  // 3. Either/or satisfied indicator
  const regNote = g('regOrContractNote');
  if(regNote){
    regNote.innerHTML = (live.registrationLink || live.contractFileName)
      ? `<div class="field-note-ok">✓ Requirement satisfied</div>` : '';
  }

  // 4. Free-text cost field warning
  const ccInput = g('f_contractCost'), mcInput = g('f_miscCosts');
  const ccWarn = ccInput && ccInput.value && !isPlainNumeric(ccInput.value);
  const mcWarn = mcInput && mcInput.value && !isPlainNumeric(mcInput.value);
  if(ccInput) ccInput.classList.toggle('field-warning', !!ccWarn);
  if(mcInput) mcInput.classList.toggle('field-warning', !!mcWarn);
  const costWarnEl = g('costFieldWarning');
  if(costWarnEl){
    costWarnEl.innerHTML = (ccWarn || mcWarn)
      ? `<div class="field-note-warn" style="color:var(--amber);">Non-numeric cost entries (like "TBD") won't count toward Total Costs until replaced with a number.</div>` : '';
  }

  // 5. Date sanity check
  const sd = val('f_startDate'), ed = val('f_endDate');
  const dateBad = !!(sd && ed && ed < sd);
  if(g('f_startDate')) g('f_startDate').classList.toggle('field-invalid', dateBad);
  if(g('f_endDate')) g('f_endDate').classList.toggle('field-invalid', dateBad);
  const dateWarnEl = g('dateSanityWarning');
  if(dateWarnEl){
    dateWarnEl.innerHTML = dateBad ? `<div class="field-note-warn">End Date is before Start Date — double-check these.</div>` : '';
  }

  // 6. Priority color coding
  const prioritySelect = g('f_priorityLevel');
  if(prioritySelect){
    prioritySelect.classList.remove('priority-high','priority-medium','priority-low');
    if(live.priorityLevel) prioritySelect.classList.add('priority-'+live.priorityLevel);
  }

  // 7. Conditional sub-field grouping boxes are static (CSS class always applied); their
  // show/hide is already handled by toggleWrap() elsewhere.
 }catch(e){
  console.error('Live form validation hit an error (form data is unaffected, only the live checklist/warnings):', e);
 }
}

function attachHandlers(){
  document.querySelectorAll('[data-region]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const raw = btn.getAttribute('data-region');
      const newRegion = (raw==='overview' || raw==='master') ? raw : parseInt(raw,10);
      const isRegionOrMaster = raw==='master' || raw!=='overview';
      if(isRegionOrMaster && newRegion !== state.activeRegion){
        // Region tabs and All Events always open scoped to the current week onward (no future cutoff)
        const range = getCurrentWeekRange();
        state.filterDateFrom = range.from;
        state.filterDateTo = '';
        state.sortBy = 'startDateAsc';
      }
      state.activeRegion = newRegion;
      state.expandedEventId = null;
      render();
    });
  });

  document.querySelectorAll('[data-goto-region]').forEach(row=>{
    row.addEventListener('click', (e)=>{
      e.stopPropagation();
      state.activeRegion = parseInt(row.getAttribute('data-goto-region'),10);
      state.expandedEventId = null;
      render();
    });
  });

  document.querySelectorAll('[data-toggle-region]').forEach(row=>{
    row.addEventListener('click', ()=>{
      const idx = parseInt(row.getAttribute('data-toggle-region'),10);
      state.expandedOverviewRegion = state.expandedOverviewRegion === idx ? null : idx;
      render();
    });
  });

  document.querySelectorAll('[data-goto-event]').forEach(row=>{
    row.addEventListener('click', ()=>{
      state.activeRegion = parseInt(row.getAttribute('data-goto-event-region'),10);
      state.expandedEventId = row.getAttribute('data-goto-event');
      // Clear any filters left over from previous browsing on that tab -- otherwise the target
      // event can end up excluded from the filtered list and never actually appear on screen.
      state.searchQuery = '';
      state.filterBranch = '';
      state.filterStatus = '';
      state.filterDateFrom = '';
      state.filterDateTo = '';
      state.sortBy = 'startDateAsc';
      render();
      setTimeout(()=>{
        const card = document.querySelector(`[data-toggle="${state.expandedEventId}"]`);
        if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
      }, 50);
    });
  });

  const regionInput = document.getElementById('regionNameInput');
  if(regionInput){
    regionInput.addEventListener('change', ()=>{
      renameRegion(state.activeRegion, regionInput.value.trim());
      render();
    });
  }

  const searchInput = document.getElementById('regionSearchInput');
  if(searchInput){
    searchInput.addEventListener('input', ()=>{
      const cursorPos = searchInput.selectionStart;
      state.searchQuery = searchInput.value;
      render();
      const newInput = document.getElementById('regionSearchInput');
      if(newInput){
        newInput.focus();
        newInput.setSelectionRange(cursorPos, cursorPos);
      }
    });
  }
  const clearSearchBtn = document.getElementById('clearSearchBtn');
  if(clearSearchBtn){
    clearSearchBtn.addEventListener('click', ()=>{
      state.searchQuery = '';
      render();
    });
  }
  const sortSelect = document.getElementById('regionSortSelect');
  if(sortSelect){
    sortSelect.addEventListener('change', ()=>{
      state.sortBy = sortSelect.value;
      render();
    });
  }
  const filterBranchSelect = document.getElementById('regionFilterBranch');
  if(filterBranchSelect){
    filterBranchSelect.addEventListener('change', ()=>{
      state.filterBranch = filterBranchSelect.value;
      render();
    });
  }
  const filterRegionSelect = document.getElementById('regionFilterRegion');
  if(filterRegionSelect){
    filterRegionSelect.addEventListener('change', ()=>{
      state.filterRegion = filterRegionSelect.value;
      state.filterBranch = ''; // branch options change with region, so the old selection may no longer apply
      render();
    });
  }
  const filterStatusSelect = document.getElementById('regionFilterStatus');
  if(filterStatusSelect){
    filterStatusSelect.addEventListener('change', ()=>{
      state.filterStatus = filterStatusSelect.value;
      render();
    });
  }
  const filterDateFromInput = document.getElementById('regionFilterDateFrom');
  if(filterDateFromInput){
    filterDateFromInput.addEventListener('change', ()=>{
      state.filterDateFrom = filterDateFromInput.value;
      render();
    });
  }
  const filterDateToInput = document.getElementById('regionFilterDateTo');
  if(filterDateToInput){
    filterDateToInput.addEventListener('change', ()=>{
      state.filterDateTo = filterDateToInput.value;
      render();
    });
  }
  const clearFiltersBtn = document.getElementById('clearFiltersBtn');
  if(clearFiltersBtn){
    clearFiltersBtn.addEventListener('click', ()=>{
      state.filterBranch = '';
      state.filterStatus = '';
      state.filterDateFrom = '';
      state.filterDateTo = '';
      state.filterRegion = '';
      state.filterDataSource = '';
      render();
    });
  }
  const filterDataSourceSelect = document.getElementById('regionFilterDataSource');
  if(filterDataSourceSelect){
    filterDataSourceSelect.addEventListener('change', ()=>{
      state.filterDataSource = filterDataSourceSelect.value;
      render();
    });
  }

  const userNameInput = document.getElementById('userNameInput');
  const saveUserNameBtn = document.getElementById('saveUserNameBtn');
  if(userNameInput){
    userNameInput.addEventListener('input', ()=>{
      state.userNameDraft = userNameInput.value;
    });
    userNameInput.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' && userNameInput.value.trim()){
        saveUserName(userNameInput.value).then(render);
      }
    });
  }
  if(saveUserNameBtn){
    saveUserNameBtn.addEventListener('click', ()=>{
      const val = userNameInput ? userNameInput.value.trim() : '';
      if(!val){ alert('Please enter a name first.'); return; }
      saveUserName(val).then(render);
    });
  }

  const pendingApprovalBadge = document.getElementById('pendingApprovalBadge');
  if(pendingApprovalBadge){
    pendingApprovalBadge.addEventListener('click', ()=>{
      const goToSection = () => {
        const el = document.getElementById('pendingApprovalSection');
        if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
      };
      state.overviewSectionsOpen.awaitingContract = true;
      if(state.activeRegion === 'overview'){
        render();
        setTimeout(goToSection, 50);
      } else {
        state.activeRegion = 'overview';
        render();
        setTimeout(goToSection, 50);
      }
    });

        zipLookupStatusEl.textContent = '';
        return;
      }
      zipLookupStatusEl.textContent = 'Looking up city/state…';
      const result = await lookupZipCityState(zipVal);
      // Bail out quietly if the panel closed or the zip changed again while the lookup was in flight.
      if(!state.draft || document.getElementById('f_zip')?.value.trim() !== zipVal) return;
      if(!result){
        zipLookupStatusEl.textContent = '⚠ ZIP code not recognized — double-check it, or fill in City/State manually.';

      const cityEl = document.getElementById('f_venueCity');
      const stateEl = document.getElementById('f_venueState');
      let filled = [];
      if(cityEl && !cityEl.value.trim()){ cityEl.value = result.city; filled.push('City'); }

      const before = paymentPhoneInput.value;
      const cleaned = before.replace(/[^\d\s()+-]/g, '');
      if(cleaned !== before){
        paymentPhoneInput.value = cleaned;
        const diff = before.length - cleaned.length;
        paymentPhoneInput.setSelectionRange(cursorPos-diff, cursorPos-diff);

        contractFileInput.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result; // "data:<mime>;base64,<data>"
        const commaIdx = dataUrl.indexOf(',');
        readDraftFromForm(); // preserve any other in-progress field edits before re-rendering
        state.draft.contractFileName = file.name;
        state.draft.contractFileType = file.type || 'application/octet-stream';

      };
      reader.readAsDataURL(file);
    });
  }

      e.preventDefault();

        setText('computedTotal', totalCost(draftLike));

        const mileageTotalOut = document.getElementById('mileageTotalDisplay');
        if(mileageTotalOut) mileageTotalOut.textContent = eventTotalMileage(draftLike) + ' mi';
      });
    }
  });
}

// Signs a user in with email/password. Accounts are created ahead of time by an admin in the
// Firebase console (Authentication -> Users -> Add user) -- there's no self-serve sign-up here.
async function signIn(email, password){
  state.signInError = '';
  state.signInLoading = true;
  render();
  try{
    await fbAuth().signInWithEmailAndPassword(email, password);
    // onAuthStateChanged below picks up the result and loads the dashboard.
  }catch(e){
    state.signInLoading = false;
    state.signInError = e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'
      ? 'Incorrect email or password.'
      : `Sign-in failed: ${e.message}`;
    render();
  }
}
async function signOutUser(){
  try{ await fbAuth().signOut(); }catch(e){ console.error('Sign out failed', e); }
}

if(FIREBASE_CONFIGURED){
  fbAuth().onAuthStateChanged(function(user){
    state.authChecked = true;
    state.currentUser = user;
    state.signInLoading = false;
    if(user){
      state.userName = user.displayName || (user.email ? user.email.split('@')[0] : 'Someone');
      loadData();
    } else {
      render();
    }
  });
  render(); // initial paint while Firebase resolves the current auth state
} else {
  // No real Firebase project configured yet -- skip auth entirely so the existing "Firebase
  // isn't configured" warning banner is what people see, not a sign-in screen that can't work.
  state.authChecked = true;
  state.currentUser = { email: 'unconfigured' };
  loadData();
}
</script>
