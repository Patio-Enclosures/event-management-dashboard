<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional Events Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF1EE;
    --surface:#FFFFFF;
    --ink:#1B2A32;
    --ink-soft:#57666C;
    --ink-faint:#8B9A9F;
    --accent:#2F7A78;
    --accent-dark:#20585A;
    --accent-soft:#DCEBEA;
    --amber:#B5791F;
    --amber-soft:#F6E9D2;
    --blue:#3B6EA5;
    --blue-soft:#E1EAF4;
    --green:#3E7C59;
    --green-soft:#E2EFE7;
    --red:#AD4A4D;
    --red-soft:#F5E3E3;
    --slate:#6B7785;
    --slate-soft:#E7E9EC;
    --border:#D9DED6;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:var(--font-body);
    color:var(--ink);
    min-height:100vh;
  }
  #root{min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- Header ---------- */
  .header{
    background:var(--ink);
    color:#F2F4F1;
    padding:22px 28px 0 28px;
  }
  .header-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:16px;
    padding-bottom:18px;
    border-bottom:1px solid rgba(255,255,255,0.12);
  }
  .brand-eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:#9FC7C5;
    margin-bottom:4px;
  }
  .brand-title{
    font-family:var(--font-display);
    font-size:28px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }
  .header-stats{
    display:flex;
    gap:26px;
    flex-wrap:wrap;
    align-items:center;
  }
  .pending-approval-badge{
    font-family:var(--font-mono);
    font-weight:700;
    font-size:13px;
    color:#fff;
    background:var(--red);
    border:none;
    border-radius:20px;
    padding:8px 16px;
    cursor:pointer;
    align-self:center;
    animation:pending-pulse 2.2s ease-in-out infinite;
  }
  .pending-approval-badge:hover{ filter:brightness(1.1); }
  @keyframes pending-pulse{
    0%, 100% { box-shadow:0 0 0 0 rgba(173,74,77,0.55); }
    50% { box-shadow:0 0 0 7px rgba(173,74,77,0); }
  }
  .stat{
    text-align:right;
  }
  .stat-label{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#9BB0AE;
    margin-bottom:3px;
  }
  .stat-value{
    font-family:var(--font-mono);
    font-size:19px;
    font-weight:600;
    color:#F2F4F1;
  }

  /* ---------- Region Tabs (ledger folder tabs) ---------- */
  .sp-warning-banner{
    background:var(--red-soft);
    border-bottom:1px solid var(--red);
    padding:10px 28px;
    font-family:var(--font-body);
    font-size:13px;
    color:var(--red);
  }
  .sp-warning-banner code{
    font-family:var(--font-mono);
    background:rgba(0,0,0,0.06);
    padding:1px 5px;
    border-radius:4px;
  }
  .name-banner{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    background:var(--accent-soft);
    border-bottom:1px solid var(--accent);
    padding:10px 28px;
    font-family:var(--font-body);
    font-size:13px;
    color:var(--accent-dark);
  }
  .name-banner input{
    font-family:var(--font-body);
    font-size:13px;
    padding:6px 10px;
    border:1px solid var(--accent);
    border-radius:6px;
    background:var(--surface);
    color:var(--ink);
    max-width:200px;
  }
  .tab-strip{
    display:flex;
    gap:4px;
    padding-top:14px;
    overflow-x:auto;
    scrollbar-width:thin;
  }
  .tab-strip::-webkit-scrollbar{height:5px;}
  .tab-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px;}
  .region-tab{
    position:relative;
    flex:0 0 auto;
    padding:9px 18px 9px 16px;
    font-family:var(--font-mono);
    font-size:12.5px;
    letter-spacing:0.02em;
    color:#B7C6C4;
    background:rgba(255,255,255,0.05);
    border:none;
    border-radius:8px 8px 0 0;
    cursor:pointer;
    white-space:nowrap;
    transition:background 0.15s, color 0.15s, transform 0.15s;
    clip-path:polygon(0 0, 100% 0, 92% 100%, 8% 100%);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .region-tab:hover{background:rgba(255,255,255,0.11);color:#EAF2F1;}
  .region-tab.active{
    background:var(--bg);
    color:var(--ink);
    transform:translateY(2px);
    font-weight:600;
    box-shadow:inset 0 3px 0 0 var(--region-color, transparent);
  }
  .region-tab-dot{
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    flex-shrink:0;
    vertical-align:middle;
    box-shadow:0 0 0 1px rgba(0,0,0,0.15);
  }
  .region-tab .tab-count{
    font-size:10px;
    color:inherit;
    opacity:0.65;
  }
  .region-tab.overview-tab{
    background:rgba(159,199,197,0.18);
    color:#CDE7E5;
    font-weight:600;
  }
  .region-tab.overview-tab:hover{background:rgba(159,199,197,0.28);color:#EAF7F6;}
  .region-tab.overview-tab.active{background:var(--bg);color:var(--accent-dark);}
  .region-tab.master-tab{
    background:rgba(224,122,95,0.18);
    color:#F4CFC2;
    font-weight:600;
  }
  .region-tab.master-tab:hover{background:rgba(224,122,95,0.28);color:#FBE3DA;}
  .region-tab.master-tab.active{background:var(--bg);color:var(--accent-dark);}
  .week-group{ margin-bottom:22px; }
  .week-group-header{
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    padding-bottom:8px;
    margin-bottom:10px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .week-group-count{
    font-weight:400;
    color:var(--ink-faint);
    text-transform:none;
    letter-spacing:normal;
  }
  .tab-divider{
    flex:0 0 auto;
    width:1px;
    background:rgba(255,255,255,0.15);
    margin:6px 6px 8px 6px;
  }

  /* ---------- Overview ---------- */
  .signin-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
  }
  .signin-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:36px 34px;
    width:100%;
    max-width:380px;
    box-shadow:0 12px 40px rgba(0,0,0,0.1);
  }
  .action-strip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
  .action-pill{
    display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12.5px;font-weight:600;
    padding:9px 16px;border-radius:20px;cursor:pointer;border:1px solid transparent;
  }
  .action-pill:hover{ filter:brightness(0.97); }
  .action-pill.urgent{background:var(--red-soft);color:var(--red);border-color:var(--red);}
  .action-pill.warn{background:var(--amber-soft);color:var(--amber);border-color:var(--amber);}
  .action-pill.info{background:var(--blue-soft);color:var(--blue);border-color:var(--blue);}
  .action-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  .time-badge{
    font-family:var(--font-mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;
    background:var(--red-soft);color:var(--red);white-space:nowrap;
  }
  .time-badge.soon{background:var(--amber-soft);color:var(--amber);}
  .time-badge.normal{background:var(--slate-soft);color:var(--slate);}

  .mix-bar{display:flex;height:6px;width:70px;border-radius:3px;overflow:hidden;margin-top:5px;background:var(--bg);}
  .mix-seg.researching{background:var(--amber);}
  .mix-seg.execute{background:var(--blue);}
  .mix-seg.submitted{background:var(--green);}
  .mix-seg.declined{background:var(--slate);}

  .overview-layout{display:grid;grid-template-columns:1.1fr 1fr;gap:24px;align-items:start;}
  @media(max-width:920px){ .overview-layout{grid-template-columns:1fr;} }

  .kpi-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:12px;
    margin-bottom:22px;
  }
  .kpi-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px 16px;
    border-top:3px solid var(--ink-faint);
  }
  .kpi-card.researching{border-top-color:var(--amber);}
  .kpi-card.execute{border-top-color:var(--blue);}
  .kpi-card.submitted{border-top-color:var(--green);}
  .kpi-card.declined{border-top-color:var(--red);}
  .kpi-card.not_pursuing{border-top-color:var(--slate);}
  .kpi-card.total{border-top-color:var(--accent);}
  .kpi-card.hero{
    background:var(--accent-dark);
    border:none;
    color:#fff;
    grid-column:span 2;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .kpi-card.hero .kpi-label{ color:#9FC7C5; }
  .kpi-card.hero .kpi-value{ font-size:32px; color:#fff; }
  .kpi-card.hero .kpi-sub{ color:#B7D9D7; }
  .kpi-label{
    font-family:var(--font-mono);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-faint);
    margin-bottom:6px;
  }
  .kpi-value{
    font-family:var(--font-display);
    font-size:26px;
    font-weight:600;
    color:var(--ink);
  }
  .kpi-sub{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-faint);
    margin-top:2px;
  }

  .overview-section-title{
    font-family:var(--font-body);
    font-weight:700;
    font-size:12.5px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--accent-dark);
    margin:26px 0 12px 0;
  }
  .collapsible-section-title{
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    margin:18px 0 0 -10px;
    border-radius:7px;
    user-select:none;
  }
  .collapsible-section-title:hover{ background:var(--surface); }
  .section-chevron{
    display:inline-block;
    font-size:10px;
    color:var(--ink-faint);
    transition:transform 0.15s;
  }
  .section-chevron.open{ transform:rotate(90deg); }
  .region-bars{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px 18px;
  }
  .region-table-wrap{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    overflow-x:auto;
  }
  .region-table{
    width:100%;
    border-collapse:collapse;
    font-family:var(--font-mono);
    font-size:12.5px;
  }
  .region-table thead th{
    text-align:right;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--ink-faint);
    font-weight:600;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  .region-table thead th:first-child{ text-align:left; }
  .region-table tbody td{
    text-align:right;
    padding:9px 14px;
    border-bottom:1px solid var(--border);
    color:var(--ink);
  }
  .region-table tbody tr:last-child td{ border-bottom:none; }
  .region-table tbody tr{ cursor:pointer; }
  .region-table tbody tr:hover{ background:#FBFCFA; }
  .region-table-name{
    text-align:left !important;
    font-family:var(--font-body);
    font-weight:600;
    color:var(--ink);
  }
  .region-table-chevron{
    display:inline-block;
    font-size:10px;
    color:var(--ink-faint);
    margin-right:8px;
    transition:transform 0.15s;
  }
  .region-table-chevron.open{ transform:rotate(90deg); }
  .region-table-subrow{ cursor:default; background:#FBFCFA; }
  .region-table-subrow:hover{ background:#FBFCFA; }
  .region-table-subrow td{ font-family:var(--font-mono); font-size:12px; }
  .region-table-value{
    font-weight:700;
    color:var(--accent-dark);
  }
  .region-bar-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 0;
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .region-bar-row:last-child{border-bottom:none;}
  .region-bar-row:hover .region-bar-name{color:var(--accent-dark);}
  .region-bar-name{
    font-family:var(--font-mono);
    font-size:12.5px;
    color:var(--ink);
    width:150px;
    flex-shrink:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .region-bar-track{
    flex:1;
    height:16px;
    background:var(--bg);
    border-radius:4px;
    overflow:hidden;
    display:flex;
  }
  .region-bar-seg{height:100%;}
  .region-bar-seg.researching{background:var(--amber);}
  .region-bar-seg.execute{background:var(--blue);}
  .region-bar-seg.submitted{background:var(--green);}
  .region-bar-seg.declined{background:var(--red);}
  .region-bar-value{
    font-family:var(--font-mono);
    font-size:12px;
    font-weight:600;
    color:var(--ink);
    width:100px;
    text-align:right;
    flex-shrink:0;
  }
  .region-bar-count{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-faint);
    width:56px;
    text-align:right;
    flex-shrink:0;
  }
  .legend{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--border);
  }
  .legend-item{
    display:flex;align-items:center;gap:6px;
    font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);
  }
  .legend-dot{width:9px;height:9px;border-radius:2px;}
  .legend-dot.researching{background:var(--amber);}
  .legend-dot.execute{background:var(--blue);}
  .legend-dot.submitted{background:var(--green);}
  .legend-dot.declined{background:var(--red);}

  .needs-decision-list{
    display:flex;flex-direction:column;gap:8px;
  }
  .needs-decision-row{
    background:var(--surface);
    border:1px solid var(--border);
    border-left:4px solid var(--amber);
    border-radius:8px;
    padding:11px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    cursor:pointer;
    flex-wrap:wrap;
  }
  .needs-decision-row:hover{background:#FBFCFA;}
  .needs-decision-main{display:flex;flex-direction:column;gap:2px;}
  .needs-decision-name{font-family:var(--font-display);font-size:14.5px;font-weight:600;color:var(--ink);}
  .needs-decision-meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);}

  /* ---------- Main content ---------- */
  .main{
    flex:1;
    padding:24px 28px 60px 28px;
    max-width:1180px;
    width:100%;
    margin:0 auto;
  }
  .region-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    gap:12px;
    flex-wrap:wrap;
  }
  .search-sort-bar{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .search-box{
    position:relative;
    flex:1;
    min-width:220px;
  }
  .search-box input{
    width:100%;
    font-family:var(--font-body);
    font-size:13px;
    padding:8px 32px 8px 12px;
    border:1px solid var(--border);
    border-radius:7px;
    background:var(--surface);
    color:var(--ink);
  }
  .search-box input:focus{
    outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);
  }
  .search-clear{
    position:absolute;
    right:8px;top:50%;transform:translateY(-50%);
    background:none;border:none;
    color:var(--ink-faint);
    font-size:13px;
    cursor:pointer;
    padding:2px 4px;
  }
  .search-clear:hover{ color:var(--ink); }
  .search-sort-bar select{
    font-family:var(--font-body);
    font-size:13px;
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:7px;
    background:var(--surface);
    color:var(--ink);
  }
  .search-result-count{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-faint);
    white-space:nowrap;
  }
  .filter-row{
    margin-top:-4px;
  }
  .filter-row select{
    font-family:var(--font-body);
    font-size:12.5px;
    padding:7px 10px;
    border:1px solid var(--border);
    border-radius:7px;
    background:var(--surface);
    color:var(--ink);
  }
  .filter-date-label{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .filter-date-label input{
    font-family:var(--font-body);
    font-size:12.5px;
    padding:6px 8px;
    border:1px solid var(--border);
    border-radius:7px;
    background:var(--surface);
    color:var(--ink);
  }
  .region-name-wrap{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .region-name-input{
    font-family:var(--font-display);
    font-size:22px;
    font-weight:600;
    color:var(--ink);
    background:transparent;
    border:none;
    border-bottom:1px dashed transparent;
    padding:2px 0;
    width:auto;
    min-width:120px;
  }
  .region-name-input:hover, .region-name-input:focus{
    border-bottom:1px dashed var(--ink-faint);
    outline:none;
  }
  .region-sub{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--ink-faint);
  }
  .btn{
    font-family:var(--font-body);
    font-weight:600;
    font-size:13.5px;
    border-radius:7px;
    padding:9px 16px;
    cursor:pointer;
    border:1px solid transparent;
    transition:filter 0.12s, transform 0.05s;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-outline{background:transparent;color:var(--ink);border-color:var(--border);}
  .btn-header{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.3);}
  .btn-header:hover{background:rgba(255,255,255,0.2);}
  .btn-outline:hover{background:var(--surface);}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-blue:hover{filter:brightness(1.08);}
  .btn-red{background:transparent;color:var(--red);border-color:var(--red);}
  .btn-red:hover{background:var(--red-soft);}
  .btn-green{background:var(--green);color:#fff;}
  .btn-green:hover{filter:brightness(1.08);}
  .btn-sm{padding:6px 12px;font-size:12.5px;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}

  /* ---------- Empty state ---------- */
  .empty{
    background:var(--surface);
    border:1px dashed var(--border);
    border-radius:12px;
    padding:48px 24px;
    text-align:center;
    color:var(--ink-soft);
  }
  .empty-title{
    font-family:var(--font-display);
    font-size:19px;
    color:var(--ink);
    margin-bottom:6px;
  }

  /* ---------- Event cards ---------- */
  .event-list{display:flex;flex-direction:column;gap:10px;}
  .event-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    display:flex;
  }
  .status-rail{width:5px;flex-shrink:0;}
  .status-rail.researching{background:var(--amber);}
  .status-rail.execute{background:var(--blue);}

   This dashboard was originally built to run inside Claude.ai, which provides

   3. Go to Project settings (gear icon) -> General -> "Your apps" -> click the

   4. Paste your real values into FIREBASE_CONFIG below, replacing every
      "PASTE_..." placeholder.
   ============================================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAcff37-OjCVKkY83HiSA3iwSkqYQOlxVQ",
  authDomain: "event-management-dashboa-caf40.firebaseapp.com",

const FIREBASE_CONFIGURED = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith('PASTE_');
const FS_COLLECTION = 'dashboardStorage';

// Personal, per-user values (currently just the display name) are kept in this browser's
// localStorage rather than round-tripped to Firestore -- simpler, and perfectly fine here since
// this page (unlike the Claude.ai version) is a normal, unsandboxed browser page.
const FB_PERSONAL_KEYS = new Set(['user-display-name']);

let _fbInitialized = false;
function fbInit(){
  if(!_fbInitialized){
    firebase.initializeApp(FIREBASE_CONFIG);
    _fbInitialized = true;
  }
}
let _fbDb = null;
function fbDb(){
  if(_fbDb) return _fbDb;
  fbInit();
  _fbDb = firebase.firestore();
  return _fbDb;
}
let _fbAuth = null;
function fbAuth(){
  if(_fbAuth) return _fbAuth;
  fbInit();
  _fbAuth = firebase.auth();
  return _fbAuth;
}
let _fbFunctions = null;
function fbFunctions(){
  if(_fbFunctions) return _fbFunctions;
  fbInit();
  _fbFunctions = firebase.functions();
  return _fbFunctions;
}

if(FIREBASE_CONFIGURED){
  window.storage = {
    async get(key, shared){
      if(FB_PERSONAL_KEYS.has(key)){
        const v = localStorage.getItem('dash-' + key);
        return v !== null ? { key, value: v, shared: false } : null;
      }
      try{
        const doc = await fbDb().collection(FS_COLLECTION).doc(key).get();
        if(!doc.exists) return null;
        return { key, value: doc.data().value, shared: !!shared };
      }catch(e){
        console.error('Firestore read failed for', key, e);
        return null;
      }
    },
    async set(key, value, shared){
      if(FB_PERSONAL_KEYS.has(key)){
        localStorage.setItem('dash-' + key, value);
        return { key, value, shared: false };
      }
      try{
        await fbDb().collection(FS_COLLECTION).doc(key).set({ value, updatedAt: Date.now() });
        return { key, value, shared: !!shared };
      }catch(e){
        console.error('Firestore write failed for', key, e);
        return null;
      }
    },
    async delete(key, shared){
      if(FB_PERSONAL_KEYS.has(key)){
        localStorage.removeItem('dash-' + key);
        return { key, deleted: true, shared: false };
      }
      try{
        await fbDb().collection(FS_COLLECTION).doc(key).delete();
        return { key, deleted: true, shared: !!shared };
      }catch(e){
        console.error('Firestore delete failed for', key, e);
        return null;
      }
    },
    async list(prefix, shared){
      try{
        const snap = await fbDb().collection(FS_COLLECTION).get();
        const keys = snap.docs.map(d=>d.id).filter(k => !prefix || k.startsWith(prefix));
        return { keys, prefix, shared };
      }catch(e){
        console.error('Firestore list failed', e);
        return null;
      }
    }
  };
}

// Submission cutoff = last day of the month before the event's start date.
// Month/quarter period helpers, used by the region summary's date filter on Overview.
function eventMonthKey(ev){
  if(!ev.startDate) return null;
  return ev.startDate.slice(0,7); // "YYYY-MM"
}
function eventQuarterKey(ev){
  if(!ev.startDate) return null;
  const [y, m] = ev.startDate.split('-');
  const q = Math.ceil(parseInt(m,10)/3);
  return `${y}-Q${q}`;
}
function monthKeyLabel(key){
  const [y,m] = key.split('-');
  const d = new Date(parseInt(y,10), parseInt(m,10)-1, 1);
  return d.toLocaleDateString(undefined, {month:'long', year:'numeric'});
}
function eventMatchesPeriod(ev, type, period){
  if(type==='all' || !period) return true;
  if(type==='month') return eventMonthKey(ev) === period;
  if(type==='quarter') return eventQuarterKey(ev) === period;
  return true;
}
function getAvailablePeriods(allEvents, type){
  if(type==='all') return [];
  const keyFn = type==='month' ? eventMonthKey : eventQuarterKey;
  const keys = new Set();
  allEvents.forEach(ev=>{ const k = keyFn(ev); if(k) keys.add(k); });
  return Array.from(keys).sort();
}

function getSubmissionCutoff(startDate){
  if(!startDate) return null;
  const d = new Date(startDate + 'T00:00:00');
  if(isNaN(d.getTime())) return null;
  const cutoff = new Date(d.getFullYear(), d.getMonth(), 0); // day 0 = last day of previous month
  cutoff.setHours(0,0,0,0);
  return cutoff;
}

// Flags a Researching event as stale: no start date, the event date itself has passed, or the
// submission cutoff (last day of the prior month) has passed while the event is still upcoming.
// Returns null for anything not Researching or not stale.
function getStalenessFlag(ev){
  if(ev.status !== STATUS.RESEARCHING) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if(!ev.startDate) return 'missing_date';
  const eventDate = new Date(ev.startDate + 'T00:00:00');
  if(isNaN(eventDate.getTime())) return 'missing_date';
  if(eventDate < today) return 'event_passed';
  const cutoff = getSubmissionCutoff(ev.startDate);
  if(cutoff && cutoff < today) return 'cutoff_passed';
  if(cutoff){
    const daysUntilCutoff = Math.round((cutoff - today) / 86400000);
    if(daysUntilCutoff <= CUTOFF_WARNING_DAYS) return 'cutoff_soon';
  }
  return null;
}

// Turns a "YYYY-MM-DD" date into a quick, scannable relative label ("in 3 days", "tomorrow",
// "2 days overdue") plus an urgency bucket for color-coding, used on Overview's date-driven lists.
function relativeTimeBadge(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d.getTime())) return null;
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diffDays = Math.round((d - today) / 86400000);
  if(diffDays < 0){
    const n = Math.abs(diffDays);
    return { text: `${n} day${n===1?'':'s'} overdue`, urgency: 'urgent' };
  }
  if(diffDays === 0) return { text: 'today', urgency: 'urgent' };
  if(diffDays === 1) return { text: 'tomorrow', urgency: 'urgent' };
  if(diffDays <= 7) return { text: `in ${diffDays} days`, urgency: 'urgent' };
  if(diffDays <= 21) return { text: `in ${diffDays} days`, urgency: 'soon' };
  return { text: `in ${diffDays} days`, urgency: 'normal' };
}
function relativeTimeBadgeHtml(dateStr){
  const b = relativeTimeBadge(dateStr);
  if(!b) return '';
  return `<span class="time-badge ${b.urgency}">${b.text}</span>`;
}

function num(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function money(v){ return '$' + num(v).toLocaleString(undefined,{minimumFractionDigits:0, maximumFractionDigits:0}); }
function isPlainNumeric(v){
  if(v===undefined || v===null) return false;
  const s = String(v).trim().replace(/[$,]/g,'');
  return s!=='' && !isNaN(parseFloat(s)) && isFinite(s);
}

// Builds a display address from the split Street/City/State fields. Falls back to the legacy
// single "venueAddress" field for events imported before the address was split out.
function venueAddressDisplay(ev){
  const parts = [ev.venueStreet, ev.venueCity, ev.venueState].filter(v=>v && String(v).trim());
  if(parts.length>0) return parts.join(', ');
  return ev.venueAddress || '';
}
function hasVenueAddress(ev){

    || !!(ev.venueState && ev.venueState.trim()) || !!(ev.venueAddress && ev.venueAddress.trim());

// Same pattern as the venue address helpers above, for the COI certificate holder's mailing
// address -- this is a different address than the venue (often the venue owner, a management
// company, or a municipality), so it includes its own zip rather than reusing the event's.
function coiAddressDisplay(ev){
  const parts = [ev.coiStreet, ev.coiCity, [ev.coiState, ev.coiZip].filter(Boolean).join(' ')].filter(v=>v && String(v).trim());
  if(parts.length>0) return parts.join(', ');
  return ev.coiAddress || '';
}
function hasCoiAddress(ev){
  return !!(ev.coiStreet && ev.coiStreet.trim()) || !!(ev.coiCity && ev.coiCity.trim())
    || !!(ev.coiState && ev.coiState.trim()) || !!(ev.coiZip && ev.coiZip.trim()) || !!(ev.coiAddress && ev.coiAddress.trim());
}

function moneyOrText(v){
  if(v===undefined || v===null || String(v).trim()==='') return money(0);
  return isPlainNumeric(v) ? money(v) : escapeHtml(String(v).trim());
}
// Shows a quantity field with its unit suffix when numeric (e.g. "120 mi"), or the raw
// free-text entry as-is when it's not (e.g. "TBD") -- avoids awkward output like "TBD mi".
function withUnit(v, unit){
  if(v===undefined || v===null || String(v).trim()==='') return '0' + unit;
  return isPlainNumeric(v) ? (String(v).trim() + unit) : escapeHtml(String(v).trim());
}

// Looks up whether a ZIP code is in a given branch's serviceable territory. Branch is passed
// as the full "CODE - Name" label used elsewhere in the app (e.g. "HOU - Houston"); this pulls
// just the code prefix to match SERVICEABLE_ZIPS_BY_BRANCH's keys.
// Returns 'yes' | 'no' | 'unknown' (no data loaded yet for this branch, or inputs are incomplete).
// Looks up City/State for a US ZIP code via the free, no-key Zippopotam.us API, used to
// auto-fill (and lightly validate) the Venue City/State fields once someone enters a ZIP.
// This is a convenience aid only -- community-sourced data, not authoritative, and every
// field it touches stays fully editable. Returns null on any failure (bad zip, network, etc).
async function lookupZipCityState(zip){
  try{
    const res = await fetch(`https://api.zippopotam.us/us/${encodeURIComponent(zip)}`);
    if(!res.ok) return null;
    const data = await res.json();
    const place = data.places && data.places[0];
    if(!place) return null;
    return { city: place['place name'], state: place['state abbreviation'] };
  }catch(e){
    return null;
  }
}

function checkZipServiceable(branchLabelValue, zip){
  if(!branchLabelValue || !zip) return 'unknown';
  const code = branchLabelValue.split(' - ')[0].trim();
  const list = SERVICEABLE_ZIPS_BY_BRANCH[code];
  if(!list) return 'unknown';
  return list.includes(String(zip).trim()) ? 'yes' : 'no';
}

// Builds the small advisory banner shown next to the manual Verified Service Area dropdown.
// This is deliberately advisory only -- it never sets the Yes/No answer automatically, since
// that field represents a person's actual confirmation, not just a data lookup.
// Prominent, hard-to-miss warning shown directly under the ZIP Code field itself -- separate
// from the calmer indicator in the Serviceable Area section below. Only renders anything when
// there's an actual mismatch, so it doesn't clutter the form when things are fine; the goal is
// catching a ZIP typo right where it was typed, before the person keeps filling out the rest
// of the form around a mistake.
function renderZipTypoWarning(branchLabelValue, zip){
  if(!branchLabelValue || !zip) return '';
  const result = checkZipServiceable(branchLabelValue, zip);
  if(result !== 'no') return '';
  const branchCode = (branchLabelValue||'').split(' - ')[0];
  return `<div class="zip-typo-warning">⚠ This ZIP doesn't match ${escapeHtml(branchCode)}'s territory — double-check it for a typo before continuing.</div>`;
}

function renderZipCheckIndicator(branchLabelValue, zip){
  const result = checkZipServiceable(branchLabelValue, zip);
  if(result==='yes'){
    return `<div class="field-note-ok">✓ Auto-check: ZIP ${escapeHtml(zip)} is within ${escapeHtml((branchLabelValue||'').split(' - ')[0])}'s serviceable territory.</div>`;
  }
  if(result==='no'){
    return `<div class="field-note-warn">⚠ Auto-check: ZIP ${escapeHtml(zip)} does not appear to be in ${escapeHtml((branchLabelValue||'').split(' - ')[0])}'s serviceable territory — double-check before confirming.</div>`;
  }
  return `<div class="hint" style="margin:0;">No automatic service-area data loaded for this branch yet — confirm manually using the Map Viewer above.</div>`;
}

// Plain-text version of the same check, for the PDF, email, and detail view.
function zipCheckDisplayLabel(ev){
  const result = checkZipServiceable(ev.branch, ev.zip);
  if(result==='yes') return 'In Territory (auto-verified)';
  if(result==='no') return 'NOT In Territory — flagged by auto-check';
  return 'No data loaded for this branch';
}

function renderBranchOptions(regionIdx, selectedBranch){
  const regionName = state.regionNames[regionIdx];
  const branches = BRANCHES.filter(b=>b.region===regionName);
  let html = `<option value="">Select branch…</option>`;
  html += branches.map(b=>{
    const label = branchLabel(b);
    const sel = label===selectedBranch ? 'selected' : '';
    return `<option value="${escapeHtml(label)}" ${sel}>${escapeHtml(label)}</option>`;
  }).join('');
  if(branches.length===0){
    html += `<option value="" disabled>No branches mapped to this region</option>`;
  }
  return html;
}

function laborDollars(ev){ return num(ev.laborHours) * LABOR_RATE; }

// Mileage is now driven by Travel Days x Miles Per Day, since the 30-free-miles allowance
// applies per day traveled, not once for the whole trip. Events entered before this change only
// have a single flat "mileage" total with no day breakdown -- for those, we fall back to the
// old behavior (30 free miles total, as if it were a single day) so historical costs don't shift.
function eventTotalMileage(ev){
  if(ev.travelDays && ev.milesPerDay){
    return num(ev.travelDays) * num(ev.milesPerDay);
  }
  return num(ev.mileage); // legacy fallback
}
function eventMileageFreeMiles(ev){
  if(ev.travelDays && ev.milesPerDay){
    return MILEAGE_FREE_MILES_PER_DAY * num(ev.travelDays);
  }
  return MILEAGE_FREE_MILES_PER_DAY; // legacy fallback -- treated as a single day
}
// Shows the day breakdown when available ("3 days x 120 mi/day = 360 mi"), otherwise falls
// back to the legacy flat total for events entered before this was split out.
function mileageDisplay(ev){
  if(ev.travelDays && ev.milesPerDay){
    return `${escapeHtml(ev.travelDays)} day${num(ev.travelDays)===1?'':'s'} × ${escapeHtml(ev.milesPerDay)} mi/day = ${eventTotalMileage(ev)} mi`;
  }
  return withUnit(ev.mileage, ' mi');
}
function mileageDollars(ev){ return Math.max(0, eventTotalMileage(ev) - eventMileageFreeMiles(ev)) * MILEAGE_RATE; }
function perDiemDollars(ev){ return num(ev.hotelNights) * PER_DIEM_RATE; }
function hotelDollars(ev){ return num(ev.hotelNights) * HOTEL_RATE; }
function totalCost(ev){
  return num(ev.contractCost) + laborDollars(ev) + mileageDollars(ev) + hotelDollars(ev) + perDiemDollars(ev) + num(ev.miscCosts);
}

// Cost per opp = Total Costs / Target Opps. Returns null when opps isn't a positive number
// (can't divide by zero or by free-text like "TBD").
const CPO_TARGET = 350;
function costPerOpp(ev){
  const opps = num(ev.forecastedOpps);
  if(opps <= 0) return null;
  return totalCost(ev) / opps;
}
function costPerOppDisplay(ev){
  const cpo = costPerOpp(ev);
  return cpo===null ? '—' : money(cpo);
}
// Same as costPerOppDisplay, but wraps the value in a red span when it's over the $350 target,
// for use anywhere CPO needs to visually flag as a warning (event cards, detail view).
function costPerOppDisplayFlagged(ev){
  const cpo = costPerOpp(ev);
  if(cpo===null) return '—';
  return cpo > CPO_TARGET
    ? `<span style="color:var(--red);font-weight:700;">${money(cpo)}</span>`
    : money(cpo);
}

const REQUIRED_FIELDS = [
  ['eventName','Event Name'],
  ['branch','Branch'],
  ['zip','Location Zip Code'],
  ['startDate','Start Date'],
  ['endDate','End Date'],
  ['contractCost','Contract Cost'],
  ['laborHours','Forecasted Labor Hours'],
  ['hotelNights','# of Hotel Nights'],
  ['miscCosts','Misc. Costs'],
  ['forecastedOpps','Target Opps'],
  ['organizer','Event Organizer'],
  ['contactName','Name of Contact'],
  ['contactPhone','Phone'],
  ['contactEmail','Email'],
  ['website','Website']
];

function getMissingFields(ev){
  const missing = REQUIRED_FIELDS
    .filter(([key])=>{
      const v = ev[key];
      return v===undefined || v===null || String(v).trim()==='';
    })
    .map(([, label])=>label);
  // Mileage moved from one flat field to Travel Days x Miles Per Day -- accept either the new
  // pair, or (for older events that haven't been re-edited yet) the legacy flat total.
  const hasNewMileage = ev.travelDays && String(ev.travelDays).trim()!=='' && ev.milesPerDay && String(ev.milesPerDay).trim()!=='';
  const hasLegacyMileage = ev.mileage && String(ev.mileage).trim()!=='';
  if(!hasNewMileage && !hasLegacyMileage){
    missing.push('Forecasted Mileage (Travel Days & Miles Per Day)');
  }
  return missing;
}

function getMissingApprovalFields(ev){
  const missing = [];
  const blank = (v) => v===undefined || v===null || String(v).trim()==='';

  const zipCheck = checkZipServiceable(ev.branch, ev.zip);
  if(zipCheck === 'no') missing.push('Zip code is not within the selected branch\'s serviceable territory');
  if(ev.confirmedAcceptance !== 'yes') missing.push('Confirmed acceptance with show promoter — must confirm Yes');
  if(blank(ev.supervisorEmail)) missing.push("Supervisor's Email");
  if(blank(ev.submissionType)) missing.push('Show Submission Type');
  if(ev.submissionType === 'renewal' && blank(ev.historicalShowCode)) missing.push('Historical Show Code');
  if(blank(ev.priorityLevel)) missing.push('Priority Level');
  if(blank(ev.organizer)) missing.push('Event Organizer Company Name');
  if(blank(ev.venueName)) missing.push('Venue Name');
  if(!hasVenueAddress(ev)) missing.push('Venue Address (Street, City, State)');
  if(blank(ev.registrationLink) && blank(ev.contractFileName)){
    missing.push('Show Registration Link or Contract Document Upload (at least one required)');
  }
  if(blank(ev.paymentDueDate)) missing.push('Payment Due Date');
  if(blank(ev.paymentMethod)) missing.push('Payment Method');
  if(ev.paymentMethod === 'credit_card' && blank(ev.creditCardLink)) missing.push('Credit Card Payment Link');
  if(ev.paymentMethod === 'phone_payment' && blank(ev.paymentPhoneNumber)) missing.push('Payment Phone Number');
  if(blank(ev.coiRequired)) missing.push('Certificate of Insurance required? (Yes/No)');
  if(ev.coiRequired === 'yes' && blank(ev.coiCertificateHolder)) missing.push('COI Certificate Holder Name');
  if(ev.coiRequired === 'yes' && !hasCoiAddress(ev)) missing.push('COI Certificate Holder Address');
  if(blank(ev.thirdPartyPayment)) missing.push('3rd Party Payment Requests? (Yes/No)');
  if(ev.thirdPartyPayment === 'yes'){
    if(blank(ev.thirdPartyName)) missing.push('3rd Party Name');
    if(blank(ev.thirdPartyPhone)) missing.push('3rd Party Phone');
    if(blank(ev.thirdPartyPaymentInfo)) missing.push('3rd Party Payment Information');
  }

  return missing;

// Every event ID that came from the original historical bulk import (before this dashboard had
// a proper add-event form) -- that data had real quality issues, so these get flagged distinctly
// from anything added normally afterward. Computed directly from the import arrays above rather
// than a stored flag, so it works with zero data migration and stays accurate automatically.
const LEGACY_IMPORT_IDS = new Set([
  ...IMPORTED_EVENTS_V1, ...IMPORTED_EVENTS_V2, ...IMPORTED_EVENTS_V3, ...IMPORTED_EVENTS_V4,
  ...IMPORTED_EVENTS_V5, ...IMPORTED_EVENTS_V6, ...IMPORTED_EVENTS_V7
].map(e => e.id));
function isLegacyImportEvent(ev){
  return LEGACY_IMPORT_IDS.has(ev.id);
}

// Normalizes an event name for matching: lowercase, trim, collapse whitespace, strip common
// punctuation. Real-world event names in both this dashboard and any master list tend to have
// inconsistent capitalization/spacing, so an exact string match would miss a lot of true matches.
function normalizeEventName(name){
  return String(name||'')
    .toLowerCase()
    .replace(/[^\w\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// Tries to find the column in a parsed spreadsheet's header row that holds the event name,
// preferring an exact "event name" match, then "name", then "event", falling back to the first
// column if nothing obvious is found (better to guess than to silently do nothing).
function findEventNameColumn(headerRow){
  const normalized = headerRow.map(h => String(h||'').toLowerCase().trim());
  let idx = normalized.findIndex(h => h.includes('event') && h.includes('name'));
  if(idx===-1) idx = normalized.findIndex(h => h === 'name' || h.includes('name'));
  if(idx===-1) idx = normalized.findIndex(h => h.includes('event'));
  if(idx===-1) idx = 0;
  return idx;
}

// Parses an uploaded .xlsx master list, matches it against every current event by normalized
// Event Name, and updates ev.onMasterList (+ ev.masterListCheckedAt) on ALL events -- so
// re-running this later with an updated master list correctly un-flags anything that dropped
// off the list, not just adds new matches.
async function crossReferenceMasterList(file){
  const buf = await file.arrayBuffer();
  const workbook = XLSX.read(buf, { type: 'array' });
  const firstSheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[firstSheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
  if(rows.length < 2){
    alert('That file doesn\'t seem to have any data rows below the header.');
    return;
  }
  const nameColIdx = findEventNameColumn(rows[0]);
  const masterNames = new Set();
  for(let i=1; i<rows.length; i++){
    const raw = rows[i][nameColIdx];
    const norm = normalizeEventName(raw);
    if(norm) masterNames.add(norm);
  }

  let matchedCount = 0;
  const now = Date.now();
  state.events.forEach(ev=>{
    const isMatch = masterNames.has(normalizeEventName(ev.eventName));
    ev.onMasterList = isMatch;
    ev.masterListCheckedAt = now;
    if(isMatch) matchedCount++;
  });

  persist();
  logActivity(null, null, 'Cross-referenced master list', `${file.name} — ${matchedCount} of ${state.events.length} events matched`);
  state.masterListStatus = `Matched ${matchedCount} of ${state.events.length} dashboard events against ${masterNames.size} names in "${file.name}" (column: "${rows[0][nameColIdx]}"). Checked just now.`;
  render();
}

// Reads a "#event=<id>" hash (added to links in approval emails) and jumps straight to that
// event's region tab, expanded, so a supervisor clicking the email link lands on it directly.
function applyDeepLinkFromHash(){
  const hash = window.location.hash || '';
  const match = hash.match(/#event=([a-z0-9_]+)/i);
  if(!match) return;
  const targetId = match[1];
  const ev = state.events.find(e=>e.id===targetId);
  if(ev){
    state.activeRegion = ev.region;
    state.expandedEventId = ev.id;
  }
}

function getEventDeepLink(ev){
  const base = window.location.href.split('#')[0];
  return `${base}#event=${ev.id}`;
}

// Records one entry in the shared, dashboard-wide activity feed, and (when an eventId is given)
// mirrors a lighter version onto that event's own history for its detail-view timeline.
function logActivity(eventId, eventName, action, details){
  const entry = {
    ts: Date.now(),
    user: state.userName || 'Someone',
    action,
    eventId: eventId || null,
    eventName: eventName || null,
    details: details || ''
  };
  state.activityLog.unshift(entry);
  if(state.activityLog.length > 500) state.activityLog.length = 500;
  persistActivityLog();

  if(eventId){
    const ev = state.events.find(e=>e.id===eventId);
    if(ev){
      if(!ev.history) ev.history = [];
      ev.history.unshift({ ts: entry.ts, user: entry.user, action, details: entry.details });
      if(ev.history.length > 100) ev.history.length = 100;
    }
  }
}

// Soft, name-based gate on who can submit for contract processing -- NOT real security (this
// app has no login system, only a self-reported display name), just a workflow guardrail to
// help prevent accidental submissions by the wrong person. If the list is empty, everyone can
// submit (the restriction is simply "off").
function isAuthorizedApprover(){
  if(!state.authorizedApprovers || state.authorizedApprovers.length===0) return true;
  const name = (state.userName || '').trim().toLowerCase();
  if(!name) return false;
  return state.authorizedApprovers.some(a => a.trim().toLowerCase() === name);
}

function humanizeFieldKey(key){
  return key.replace(/([A-Z])/g, ' $1').replace(/^./, c=>c.toUpperCase()).trim();
}

// Compares two event objects and returns a short, human-readable list of which fields changed --
// used to summarize an edit in the activity log without dumping every old/new value.
function diffEventFields(oldEv, newEv){
  const changed = [];
  const keys = new Set([...Object.keys(oldEv||{}), ...Object.keys(newEv||{})]);
  keys.forEach(k=>{
    if(DIFF_IGNORE_KEYS.has(k)) return;
    const a = oldEv ? oldEv[k] : undefined;
    const b = newEv ? newEv[k] : undefined;
    if(JSON.stringify(a) !== JSON.stringify(b)) changed.push(humanizeFieldKey(k));
  });
  return changed;
}

// Safety net against lost in-progress form data (e.g. a browser hiccup, an accidental tab
// close, or any JS error interrupting a render). Every keystroke in the New/Edit Event form
// mirrors the current draft to localStorage; if the panel ever gets closed without an explicit
// Cancel or Save, the next time that same form opens, we offer to restore it.
const DRAFT_RECOVERY_KEY = 'event-ledger-draft-recovery-v1';
function saveDraftToLocalStorage(){
  if(!state.draft) return;
  try{
    localStorage.setItem(DRAFT_RECOVERY_KEY, JSON.stringify({
      editingEventId: state.editingEventId,
      draft: state.draft,
      savedAt: Date.now()
    }));
  }catch(e){
    // localStorage might be unavailable (private browsing, storage quota) -- this is only a
    // safety net, so fail silently rather than interrupt the person's typing.
  }
}
function clearDraftRecovery(){
  try{ localStorage.removeItem(DRAFT_RECOVERY_KEY); }catch(e){}
}
function checkForDraftRecovery(){
  try{
    const raw = localStorage.getItem(DRAFT_RECOVERY_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){
    return null;
  }
}
function minutesAgoLabel(ts){
  const mins = Math.round((Date.now()-ts)/60000);
  return mins<1 ? 'less than a minute ago' : `${mins} minute${mins===1?'':'s'} ago`;
}

function openAddPanel(){
  const recovery = checkForDraftRecovery();
  if(recovery && recovery.draft && recovery.editingEventId===null){
    if(confirm(`We found an unsaved new-event draft from ${minutesAgoLabel(recovery.savedAt)} (possibly lost to a browser issue). Restore it and keep editing?\n\nChoose Cancel to discard it and start a fresh blank event instead.`)){
      state.draft = recovery.draft;
      state.editingEventId = null;
      state.panelOpen = true;
      render();
      return;
    }
    clearDraftRecovery();
  }
  state.draft = emptyDraft(state.activeRegion);
  state.editingEventId = null;
  state.panelOpen = true;
  render();
}
function openEditPanel(ev){
  if(ev.status===STATUS.SUBMITTED){
    alert('This event has already been submitted for contract processing and can no longer be edited.');
    return;
  }
  if(ev.status===STATUS.EXECUTE && !isAuthorizedApprover()){
    alert('This event is Submitted for Approval and awaiting review. Only authorized approvers can edit it while it\'s in this state -- ask an approver to make changes, or wait until it moves to contract processing.');
    return;
  }
  const recovery = checkForDraftRecovery();
  if(recovery && recovery.draft && recovery.editingEventId===ev.id){
    if(confirm(`We found unsaved changes to "${ev.eventName}" from ${minutesAgoLabel(recovery.savedAt)} (possibly lost to a browser issue). Restore them and keep editing?\n\nChoose Cancel to discard them and open the event as it's currently saved instead.`)){
      state.draft = recovery.draft;
      state.editingEventId = ev.id;
      state.panelOpen = true;
      render();
      return;
    }
    clearDraftRecovery();
  }
  state.draft = Object.assign({}, ev);
  // Older events only ever had a single flat mileage total (no day breakdown). If this one
  // hasn't been split into Travel Days / Miles Per Day yet, seed a reasonable starting point
  // (treat it as a single day) so opening it to edit doesn't lose the existing mileage data.
  if(!state.draft.travelDays && !state.draft.milesPerDay && state.draft.mileage){
    state.draft.travelDays = '1';
    state.draft.milesPerDay = state.draft.mileage;
  }
  state.editingEventId = ev.id;
  state.panelOpen = true;
  render();
}
// Compares the in-progress draft against its baseline (a blank draft for a new event, or the
// saved event for an edit) to tell whether there's anything a person would actually lose by
// closing right now. Used to guard every "close" path except a just-completed save.
function draftHasChanges(){
  if(!state.draft) return false;
  const baseline = state.editingEventId
    ? state.events.find(e=>e.id===state.editingEventId)
    : emptyDraft(state.draft.region);
  if(!baseline) return true; // can't compare -- safest assumption is that there's something to lose
  const ignore = new Set(['id','history']);
  const keys = new Set([...Object.keys(state.draft), ...Object.keys(baseline)]);
  for(const k of keys){
    if(ignore.has(k)) continue;
    if(JSON.stringify(state.draft[k]) !== JSON.stringify(baseline[k])) return true;
  }
  return false;
}

// `force` skips the confirmation -- used only right after a successful save, where the data is
// already safely stored and there's nothing left to lose.
function closePanel(force){
  if(!force && draftHasChanges()){
    if(!confirm('You have unsaved changes on this event. Discard them and close?')) return;
  }
  clearDraftRecovery();
  state.panelOpen = false;
  state.draft = null;
  render();
}

const REQUIRED_BASE_FIELDS = [
  ['eventName', 'Event Name'],
  ['branch', 'Branch'],
  ['zip', 'Location Zip Code'],
  ['startDate', 'Start Date'],
  ['endDate', 'End Date']
];

function saveDraft(){
  const d = state.draft;
  const missing = REQUIRED_BASE_FIELDS
    .filter(([key])=> !d[key] || !String(d[key]).trim())
    .map(([, label])=>label);
  if(missing.length>0){
    alert('Please complete the following before saving this event:\n\n' + missing.join('\n'));
    return;
  }
  if(state.editingEventId){
    const idx = state.events.findIndex(e=>e.id===state.editingEventId);
    const before = state.events[idx];
    const changedFields = diffEventFields(before, d);
    d.history = before ? before.history : [];
    state.events[idx] = d;
    if(changedFields.length>0){
      logActivity(d.id, d.eventName, 'Edited event', changedFields.join(', '));
    }
  } else {
    d.id = uid();
    d.history = [];
    state.events.push(d);
    logActivity(d.id, d.eventName, 'Created event');
  }
  persist();
  closePanel(true);
  render();
}

function deleteEvent(id){
  const ev = state.events.find(e=>e.id===id);
  if(ev && ev.status===STATUS.SUBMITTED){
    alert('This event has already been submitted for contract processing and can no longer be deleted.');
    return;
  }
  if(!confirm('Delete this event from the ledger? This cannot be undone.')) return;
  logActivity(null, ev ? ev.eventName : 'Unknown event', 'Deleted event');
  state.events = state.events.filter(e=>e.id!==id);
  persist();
  render();
}

// Shifts a "YYYY-MM-DD" date forward exactly one year, same month/day -- except Feb 29, which
// rolls to Feb 28 if the following year isn't a leap year.
function shiftDateNextYear(dateStr){
  if(!dateStr) return '';
  const parts = dateStr.split('-').map(Number);
  const y = parts[0], m = parts[1], d = parts[2];
  if(!y || !m || !d) return dateStr;
  const newYear = y + 1;
  const isLeap = yr => (yr%4===0 && yr%100!==0) || yr%400===0;
  const newDay = (m===2 && d===29 && !isLeap(newYear)) ? 28 : d;
  return `${newYear}-${String(m).padStart(2,'0')}-${String(newDay).padStart(2,'0')}`;
}

// Copies an event to a new Researching entry one year later (same month/day). Approval-specific
// fields (checklist answers, submission timestamps, contract attachment) are cleared, since
// those need to be re-verified for the new year rather than carried over automatically.
function duplicateEventNextYear(id){
  const original = state.events.find(e=>e.id===id);
  if(!original) return;
  const newStart = shiftDateNextYear(original.startDate);
  if(!confirm(`Duplicate "${original.eventName}" for next year${newStart ? ' ('+newStart+')' : ''}? This creates a new Researching event marked as a Show Renewal, with the checklist and contract attachment cleared for re-verification.`)) return;

  const copy = JSON.parse(JSON.stringify(original));
  copy.id = uid();
  copy.startDate = newStart;
  copy.endDate = shiftDateNextYear(original.endDate);
  copy.status = STATUS.RESEARCHING;
  copy.createdAt = Date.now();
  copy.submittedAt = null;
  copy.deniedAt = null;
  copy.deniedBySupervisor = false;
  copy.notPursuingAt = null;
  copy.verifiedServiceArea = '';
  copy.confirmedAcceptance = '';
  copy.contractFileName = '';
  copy.contractFileType = '';
  copy.contractFileData = '';
  copy.history = [];
  // A duplicated event is, by definition, a renewal of a show that already ran -- mark it as
  // such so the pre-approval checklist requires a Historical Show Code before it can move
  // forward. If the original already had a code, carry it over as a starting point (still
  // editable) rather than making the person re-type something that's often unchanged year to year.
  copy.submissionType = 'renewal';

  state.events.push(copy);
  logActivity(copy.id, copy.eventName, 'Created event', 'Duplicated from previous year\'s event');
  persist();
  state.expandedEventId = copy.id;
  state.activeRegion = copy.region;
  render();
}

// Posts a payload to a Teams webhook and tries hard to get a REAL answer about whether it
// worked, instead of always guessing. First attempts a normal fetch (readable response) --
// this works fine outside sandboxed environments like Claude.ai's artifact viewer, and gives a
// definitive success/failure. Only if that's blocked (a genuine CORS restriction from the
// webhook's own server) does it fall back to a blind no-cors send, which can't confirm delivery.
async function postToTeamsWebhook(url, payload){
  try{
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if(res.ok){
      return { status: 'confirmed-success', message: `Delivered successfully (HTTP ${res.status}).` };
    }
    let bodyText = '';
    try{ bodyText = await res.text(); }catch(e){}
    return { status: 'confirmed-failure', message: `Teams rejected the request (HTTP ${res.status}). ${bodyText ? 'Response: ' + bodyText.slice(0,300) : 'Check that the webhook URL is correct and still active.'}` };
  }catch(e){
    // Real network/CORS block -- fall back to a blind send so the message still has a chance
    // of arriving, but be honest that we can't confirm it.
    try{
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      return { status: 'sent-blind', message: `Could not read a response (likely a CORS restriction: "${e.message}"), so this was sent blind. Check the Teams channel directly to confirm.` };
    }catch(e2){
      return { status: 'failed', message: `Failed to send at all: "${e2.message}". This usually means the URL itself is wrong or unreachable.` };
    }
  }
}

// Posts an Adaptive-Card-style notification to a Teams Incoming Webhook via postToTeamsWebhook
// above, which now gives a real, confirmed result whenever the hosting environment allows it.
async function notifyTeams(ev){
  if(!state.teamsWebhookUrl) return;
  const region = state.regionNames[ev.region];
  const senderName = state.teamsAlertName || 'Regional Events Dashboard';
  const payload = {
    "@type": "MessageCard",
    "@context": "http://schema.org/extensions",
    "summary": `Approval needed: ${ev.eventName}`,
    "themeColor": "2F7A78",
    "title": `Approval Request: ${ev.eventName}`,
    "sections": [{
      "activityTitle": senderName,
      "activitySubtitle": `Approval Request — ${region}`,
      "facts": [
        { "name": "Region / Branch", "value": `${region} / ${ev.branch || '—'}` },
        { "name": "Dates", "value": `${ev.startDate || '—'} to ${ev.endDate || '—'}` },
        { "name": "Total Estimated Cost", "value": money(totalCost(ev)) },
        { "name": "Priority", "value": ev.priorityLevel ? ev.priorityLevel.charAt(0).toUpperCase()+ev.priorityLevel.slice(1) : '—' },
        { "name": "Supervisor Email", "value": ev.supervisorEmail || '—' }
      ],
      "text": "This event has cleared the pre-approval checklist and is ready for review."
    }]
  };
  const result = await postToTeamsWebhook(state.teamsWebhookUrl, payload);
  console.log('Teams notification result:', result.status, '-', result.message);
  if(result.status === 'confirmed-failure' || result.status === 'failed'){
    console.error('Teams notification did not succeed:', result.message);
  }
}

function submitContract(id){
  const ev = state.events.find(e=>e.id===id);
  const missing = getMissingFields(ev);
  if(missing.length>0){
    alert('This event is missing required information and cannot be submitted for contract processing yet:\n\n' + missing.join(', '));
    return;
  }
  if(!isAuthorizedApprover()){
    alert(state.userName
      ? `"${state.userName}" isn't on the list of authorized approvers, so this event can't be submitted for contract processing. Check with whoever manages the approver list in Settings.`
      : 'Only authorized approvers can submit for contract processing. Set your name first (top of the page), then check with whoever manages the approver list.');

  ev.status = STATUS.SUBMITTED;

}

function generateApprovalPDF(ev){
  if(!(window.jspdf && window.jspdf.jsPDF)){
    console.error('jsPDF failed to load; skipping PDF generation.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'letter' });
  const marginX = 48;
  const pageHeight = doc.internal.pageSize.getHeight();
  const pageWidth = doc.internal.pageSize.getWidth();
  const maxWidth = pageWidth - marginX*2;
  let y = 56;

  function ensureSpace(lines){
    if(y + lines*13 > pageHeight - 48){
      doc.addPage();
      y = 56;
    }
  }
  function addTitle(text){
    ensureSpace(2);
    doc.setFont('helvetica','bold'); doc.setFontSize(18);
    doc.text(text, marginX, y);
    y += 22;
  }
  function addSubtitle(text){
    ensureSpace(1);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(100);
    doc.text(text, marginX, y);
    doc.setTextColor(0);
    y += 20;
  }
  function addSectionHeader(text){
    ensureSpace(2);
    y += 6;
    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text(text.toUpperCase(), marginX, y);
    y += 4;
    doc.setDrawColor(180);
    doc.line(marginX, y, pageWidth-marginX, y);
    y += 14;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
  }
  function addRow(label, value){
    const text = label ? `${label}: ${(value===undefined||value===null||value==='') ? '—' : value}` : (value || '');
    if(!text) return;
    const wrapped = doc.splitTextToSize(text, maxWidth);
    ensureSpace(wrapped.length);
    doc.text(wrapped, marginX, y);
    y += wrapped.length * 13;
  }

  const region = state.regionNames[ev.region];

  addTitle('Event Approval Summary');
  addSubtitle(`Generated ${new Date().toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'})}`);

  addSectionHeader('Event Overview');
  addRow('Event Name', ev.eventName);
  addRow('Region', region);
  addRow('Branch', ev.branch);
  addRow('Venue Name', ev.venueName);
  addRow('Venue Address', venueAddressDisplay(ev));
  addRow('Location Zip Code', ev.zip);
  addRow('Start Date', ev.startDate);
  addRow('End Date', ev.endDate);
  addRow('Event Organizer Company Name', ev.organizer);
  addRow('Website', ev.website);
  addRow('Target Opps', ev.forecastedOpps);

  addSectionHeader('Financials');
  addRow('Contract Cost', moneyOrText(ev.contractCost));
  addRow('Forecasted Labor Hours', ev.laborHours);
  addRow('Labor Cost (@ $20/hr)', money(laborDollars(ev)));
  addRow('Forecasted Mileage', mileageDisplay(ev));
  addRow('Mileage Cost (@ $0.725/mi after 30 free)', money(mileageDollars(ev)));
  addRow('Hotel Nights', ev.hotelNights);
  addRow('Hotel Cost (@ $150/night)', money(hotelDollars(ev)));
  addRow('Per Diem (@ $43/night)', money(perDiemDollars(ev)));
  addRow('Misc. Costs', moneyOrText(ev.miscCosts));
  addRow('Total Costs', money(totalCost(ev)));

  addSectionHeader('Contact');
  addRow('Name of Contact', ev.contactName);
  addRow('Phone', ev.contactPhone);
  addRow('Email', ev.contactEmail);

  addSectionHeader('Pre-Approval Checklist');
  addRow('Serviceable Area', zipCheckDisplayLabel(ev));
  addRow('Confirmed Acceptance w/ Promoter', ev.confirmedAcceptance==='yes'?'Yes':ev.confirmedAcceptance==='no'?'No':'');
  addRow("Supervisor's Email", ev.supervisorEmail);
  addRow('Priority Level', ev.priorityLevel ? ev.priorityLevel.charAt(0).toUpperCase()+ev.priorityLevel.slice(1) : '');
  addRow('Submission Type', ev.submissionType==='new'?'New Show':ev.submissionType==='renewal'?'Show Renewal':'');
  if(ev.submissionType==='renewal') addRow('Historical Show Code', ev.historicalShowCode);
  addRow('Show Registration Link', ev.registrationLink);
  addRow('Contract Document', ev.contractFileName ? `${ev.contractFileName} (attached to approval email)` : '');

  addSectionHeader('Payment Information');
  addRow('Due Date', ev.paymentDueDate);
  addRow('Payment Method', ev.paymentMethod==='credit_card'?'Credit Card':ev.paymentMethod==='pay_at_gate'?'Pay at the Gate':ev.paymentMethod==='phone_payment'?'Phone Payment':ev.paymentMethod==='check'?'Check (not preferred)':ev.paymentMethod==='other'?'Other':'');
  if(ev.paymentMethod==='credit_card') addRow('Credit Card Payment Link', ev.creditCardLink);
  if(ev.paymentMethod==='phone_payment') addRow('Payment Phone Number', ev.paymentPhoneNumber);
  addRow('Payment Notes', ev.paymentNotes);
  addRow('COI Required', ev.coiRequired==='yes'?'Yes':ev.coiRequired==='no'?'No':'');
  if(ev.coiRequired==='yes') addRow('COI Certificate Holder', ev.coiCertificateHolder);
  if(ev.coiRequired==='yes') addRow('COI Certificate Holder Address', coiAddressDisplay(ev));
  addRow('3rd Party Payment Requests', ev.thirdPartyPayment==='yes'?'Yes':ev.thirdPartyPayment==='no'?'No':'');
  if(ev.thirdPartyPayment==='yes'){
    addRow('3rd Party Name', ev.thirdPartyName);
    addRow('3rd Party Phone', ev.thirdPartyPhone);
    addRow('3rd Party Payment Info', ev.thirdPartyPaymentInfo);
  }

  if(ev.notes){
    addSectionHeader('Research Notes');
    addRow('', ev.notes);
  }
  if(ev.finalNotes){
    addSectionHeader('Final Notes');
    addRow('', ev.finalNotes);
  }

  const filename = `approval-summary_${(ev.eventName||'event').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.pdf`;
  doc.save(filename);
}

function autoLink(value){
  const v = value ? String(value).trim() : '';
  if(!v) return '—';
  let href = null;
  if(/^https?:\/\//i.test(v)) href = v;
  else if(/^www\./i.test(v)) href = 'https://' + v;
  if(href){
    return `<a href="${escapeHtml(href)}" style="color:var(--accent-dark,#20585A);">${escapeHtml(v)}</a>`;
  }
  return escapeHtml(v); // not a URL (e.g. a filed-location note) -- shown as plain text
}

function sanitizeHeader(v){
  return String(v||'').replace(/[\r\n]+/g,' ').trim();
}

// Wraps a base64 string at 76 chars/line, as required by the MIME spec for attachment bodies.
function wrapBase64(b64){
  return b64.replace(/.{76}/g, '$&\r\n');
}

  let bodyText = 'Hi,\n\nThe following event is ready for review:\n\n' + buildFullEventTextSummary(ev);

// Maps a dashboard event onto the fields the Exhibit Day sync Cloud Function expects. Travel
// costs (mileage + hotel + per diem) are combined into Exhibit Day's single budget_travel field,
// since Exhibit Day doesn't break those out separately the way this dashboard does.
function buildExhibitDaySyncPayload(ev){
  const paymentMethodLabel = ev.paymentMethod==='credit_card' ? 'Credit Card'
    : ev.paymentMethod==='pay_at_gate' ? 'Pay at the Gate'
    : ev.paymentMethod==='phone_payment' ? 'Phone Payment'
    : ev.paymentMethod==='check' ? 'Check' : ev.paymentMethod==='other' ? 'Other' : '';
  const paymentLink = ev.paymentMethod==='credit_card' ? ev.creditCardLink : '';

  // Venue Address has no custom field configured in Exhibit Day, so it's the only one still
  // folded into event_notes. Everything else below goes straight into its own custom field.
  const researchNotes = [ev.notes, ev.finalNotes].filter(Boolean).join('\n\n');
  const event_notes = `Venue Address: ${venueAddressDisplay(ev) || '—'}` + (researchNotes ? '\n\n' + researchNotes : '');

  // Maps dashboard fields directly onto Exhibit Day's custom field_names, as configured in
  // your workspace (Settings -> Exhibit Day Custom Fields -> List Custom Field Names).
  const custom_fields = {
    custom_123549: state.regionNames[ev.region] || '',       // Region
    custom_245675: ev.branch || '',                          // Branch
    custom_267566: ev.contactName || '',                     // Contact Name
    custom_267568: ev.contactPhone || '',                     // Contact Phone
    custom_267567: ev.contactEmail || '',                     // Contact Email
    custom_267570: paymentMethodLabel || '',                  // Payment Type
    custom_267573: paymentLink || '',                         // Payment Link
    custom_223428: ev.forecastedOpps ? String(ev.forecastedOpps) : '' // Target Opps Goal
  };

  return {
    dashboardEventId: ev.id,
    dashboardStatus: STATUS_LABEL[ev.status] || '',
    name: ev.eventName,
    start_date: ev.startDate,
    end_date: ev.endDate,
    venue_name: ev.venueName || '',
    website_url: ev.website || ev.registrationLink || '',
    event_notes,
    budget_notes: `Synced from Regional Events Dashboard.`,
    budget_booth_reservation: num(ev.contractCost),

    budget_misc_expenses: num(ev.miscCosts),
    budget_attendee_registrations: laborDollars(ev),
    custom_fields
  };
}

function downloadContractFile(ev){
  if(!(ev.contractFileName && ev.contractFileData)) return;
  const mime = ev.contractFileType || 'application/octet-stream';
  const blob = (function(){
    const byteChars = atob(ev.contractFileData);
    const byteNumbers = new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++) byteNumbers[i] = byteChars.charCodeAt(i);
    return new Blob([new Uint8Array(byteNumbers)], { type: mime });
  })();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = ev.contractFileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Escapes a single CSV field: wraps in quotes and doubles up any internal quotes whenever the
// value contains a comma, quote, or newline that would otherwise break the CSV structure.

  const s = String(v);
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

// Simple, dependency-free CSV parser: handles quoted fields, commas/newlines inside quotes,
// and doubled-up "" as an escaped quote. Returns an array of rows, each an array of field strings.
function parseCSV(text){
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  // Normalize line endings so \r\n and \r alone don't produce phantom blank rows.
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  for(let i=0; i<text.length; i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += c;
      }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field = ''; }
      else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if(field.length>0 || row.length>0){ row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length===1 && r[0].trim()===''));
}

  'branch': (ev,v)=>{ ev.branch = v; },

// Parses CSV text and returns { events, skipped } -- new event drafts ready to add to
// state.events, plus a count of rows skipped for missing an Event Name (the one field we
// can't sensibly default). Every row becomes a brand-new event with a fresh ID -- this does
// not try to match against or overwrite existing events.
function parseEventsFromCSV(text){
  const rows = parseCSV(text);
  if(rows.length < 2) return { events: [], skipped: 0 };
  const headers = rows[0].map(h => h.trim().toLowerCase());
  const events = [];
  let skipped = 0;
  for(let r=1; r<rows.length; r++){
    const cells = rows[r];
    if(cells.every(c => c.trim()==='')) continue; // blank row
    const draft = emptyDraft(0);
    headers.forEach((h, colIdx)=>{
      const setter = CSV_IMPORT_COLUMNS[h];
      if(setter && cells[colIdx]!==undefined) setter(draft, cells[colIdx].trim());
    });
    if(!draft.eventName.trim()){ skipped++; continue; }
    draft.id = uid();
    draft.createdAt = Date.now();
    draft.history = [];
    events.push(draft);
  }
  return { events, skipped };
}

function importEventsFromCSVFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    const { events, skipped } = parseEventsFromCSV(String(reader.result));
    if(events.length === 0){
      alert(skipped>0
        ? `No events could be imported -- ${skipped} row${skipped===1?'':'s'} skipped for missing an Event Name.`
        : 'No rows found in that file.');
      return;
    }
    const skipNote = skipped>0 ? ` (${skipped} row${skipped===1?'':'s'} skipped for missing an Event Name)` : '';
    if(!confirm(`Import ${events.length} event${events.length===1?'':'s'} from "${file.name}"?${skipNote}\n\nThese will be added as brand-new events -- this does not check for or merge duplicates.`)) return;
    state.events = state.events.concat(events);
    logActivity(null, null, 'Bulk imported events', `${events.length} events from ${file.name}`);
    persist();
    render();
    alert(`Imported ${events.length} event${events.length===1?'':'s'}.`);
  };
  reader.onerror = () => alert('Could not read that file. Please try again.');
  reader.readAsText(file);
}

    <tr class="total-row"><td>Total Costs</td><td>${money(totalCost(ev))}</td></tr>
  </table>

  <h2>Event Organizer &amp; Contact</h2>
  <table>
    <tr><td class="label">Event Organizer</td><td>${escapeHtml(ev.organizer)||'—'}</td></tr>
    <tr><td class="label">Name of Contact</td><td>${escapeHtml(ev.contactName)||'—'}</td></tr>
    <tr><td class="label">Phone</td><td>${escapeHtml(ev.contactPhone)||'—'}</td></tr>
    <tr><td class="label">Email</td><td>${escapeHtml(ev.contactEmail)||'—'}</td></tr>
    <tr><td class="label">Website</td><td>${escapeHtml(ev.website)||'—'}</td></tr>
  </table>

  ${ev.notes ? `<h2>Notes</h2><p style="font-size:13.5px;">${escapeHtml(ev.notes)}</p>` : ''}

  <div class="footer">Regional Events Dashboard — Contract Processing Document — Event ID ${ev.id}</div>
  </body></html>`;

  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `contract-summary_${(ev.eventName||'event').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escapeHtml(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function renameRegion(idx, newName){
  state.regionNames[idx] = newName || `Region ${idx+1}`;

function attachSignInHandlers(){
  const emailInput = document.getElementById('signInEmail');
  const passwordInput = document.getElementById('signInPassword');
  const submitBtn = document.getElementById('signInSubmit');
  if(emailInput){
    emailInput.addEventListener('input', ()=>{ state.signInEmail = emailInput.value; });
  }
  const doSignIn = () => {
    const email = emailInput ? emailInput.value.trim() : '';
    const password = passwordInput ? passwordInput.value : '';
    if(!email || !password){
      state.signInError = 'Enter both your email and password.';
      render();
      return;
    }
    signIn(email, password);
  };
  if(passwordInput){
    passwordInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') doSignIn(); });
  }
  if(submitBtn){
    submitBtn.addEventListener('click', doSignIn);
  }
}
